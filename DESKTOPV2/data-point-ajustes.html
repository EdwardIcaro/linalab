<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Point — Ajustes e Afastamentos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/api.js"></script>
  <style>
    :root {
      --teal800:#064e3b;--teal700:#0f766e;--teal600:#0d9488;
      --teal500:#14b8a6;--teal400:#2dd4bf;--teal200:#99f6e4;--teal100:#ccfbf1;--teal50:#f0fdfa;
      --p800:#5b21b6;--p700:#6d28d9;--p600:#7c3aed;--p500:#8b5cf6;--p100:#ede9fe;
      --gray900:#111827;--gray800:#1f2937;--gray700:#374151;--gray600:#4b5563;
      --gray500:#6b7280;--gray400:#9ca3af;--gray300:#d1d5db;--gray200:#e5e7eb;
      --gray100:#f3f4f6;--gray50:#f9fafb;--white:#ffffff;
      --green:#059669;--green-bg:#d1fae5;
      --amber:#d97706;--amber-bg:#fef3c7;
      --red:#dc2626;--red-bg:#fee2e2;
      --blue:#2563eb;--blue-bg:#dbeafe;
    }
    *{font-family:'Inter',sans-serif;box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(145deg,var(--teal800) 0%,var(--teal700) 30%,var(--p700) 70%,var(--p800) 100%);color:var(--gray900);overflow-x:hidden;position:relative}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(6,78,59,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.12);padding:0 28px;display:flex;align-items:center;height:58px}
    .tb-brand{display:flex;align-items:center;gap:10px;padding-right:20px;border-right:1px solid rgba(255,255,255,.14)}
    .tb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(145deg,var(--p600),var(--p800));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white}
    .tb-lina{font-size:15px;font-weight:800;color:white}
    .tb-sys{display:flex;align-items:center;gap:8px;margin-left:20px;padding-right:20px;border-right:1px solid rgba(255,255,255,.14)}
    .tb-sys-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,var(--teal600),var(--teal800));display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid rgba(255,255,255,.15)}
    .tb-sys-name{font-size:14px;font-weight:700;color:var(--teal200)}
    .tb-company{margin-left:20px;display:flex;align-items:center;gap:7px;font-size:13px;color:rgba(255,255,255,.65)}
    .tb-company strong{color:rgba(255,255,255,.9);font-weight:700}
    .tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .tb-icon-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s;font-family:inherit}
    .tb-icon-btn:hover{background:rgba(255,255,255,.15);color:white}
    .tb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(145deg,var(--p500),var(--p800));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white}

    /* LOADER */
    .loader-wrap{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,78,59,.95)}
    .loader-spin{width:44px;height:44px;border:3px solid rgba(45,212,191,.3);border-top-color:var(--teal400);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-text{margin-top:16px;font-size:14px;color:var(--teal200);font-weight:500}
    .hidden{display:none!important}

    /* LAYOUT */
    .main{padding:28px 28px 60px;max-width:1100px;margin:0 auto;position:relative;z-index:1}
    .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
    .ph-title{font-size:26px;font-weight:800;background:linear-gradient(135deg,#ffffff,var(--teal200));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .ph-sub{font-size:13px;color:rgba(255,255,255,.55);margin-top:3px}

    /* ABAS */
    .tabs{display:flex;gap:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:4px;margin-bottom:20px;width:fit-content}
    .tab-btn{padding:8px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:rgba(255,255,255,.7);background:transparent;transition:all .18s;display:flex;align-items:center;gap:7px}
    .tab-btn.on{background:white;color:var(--gray900);box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .tab-badge{background:var(--red);color:white;font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px;min-width:16px;text-align:center}

    /* CARD */
    .card{background:rgba(255,255,255,.97);border:1px solid var(--gray200);border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 16px;border-bottom:1px solid var(--gray200)}
    .card-title{font-size:15px;font-weight:800;color:var(--gray900);display:flex;align-items:center;gap:8px}
    .ct-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px}
    .ct-amber{background:var(--amber-bg);color:var(--amber)}
    .ct-blue{background:var(--blue-bg);color:var(--blue)}
    .ct-teal{background:var(--teal100);color:var(--teal700)}

    /* FILTRO */
    .filter-bar{display:flex;gap:7px;padding:14px 22px;border-bottom:1px solid var(--gray200);overflow-x:auto;scrollbar-width:none}
    .filter-bar::-webkit-scrollbar{display:none}
    .fbtn{white-space:nowrap;padding:5px 13px;border-radius:8px;border:1px solid var(--gray300);background:var(--white);color:var(--gray600);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
    .fbtn.on{background:var(--teal600);border-color:var(--teal600);color:white}
    .fbtn:not(.on):hover{border-color:var(--teal400);color:var(--teal700);background:var(--teal50)}

    /* LISTA AJUSTES */
    .ajuste-row{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;padding:16px 22px;border-bottom:1px solid var(--gray100);transition:background .15s}
    .ajuste-row:last-child{border-bottom:none}
    .ajuste-row:hover{background:var(--gray50)}
    .aj-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
    .aj-nome{font-size:14px;font-weight:700;color:var(--gray900)}
    .aj-data{font-size:12px;color:var(--gray500);font-weight:600}
    .aj-tipo-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px}
    .tipo-falta{background:#fef3c7;color:#92400e}
    .tipo-hora{background:#e0f2fe;color:#075985}
    .tipo-outro{background:#f3f4f6;color:#374151}
    .aj-desc{font-size:13px;color:var(--gray700);line-height:1.5;margin-bottom:6px}
    .aj-meta{font-size:11px;color:var(--gray400)}
    .aj-status{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap}
    .st-pendente{background:#fef3c7;color:#92400e}
    .st-aprovado{background:var(--green-bg);color:var(--green)}
    .st-rejeitado{background:var(--red-bg);color:var(--red)}
    .aj-actions{display:flex;gap:8px;flex-shrink:0;margin-top:4px}
    .btn-aprovar{padding:7px 14px;border-radius:9px;background:var(--green);border:none;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
    .btn-rejeitar{padding:7px 14px;border-radius:9px;background:white;border:1.5px solid var(--red);color:var(--red);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
    .btn-aprovar:hover{opacity:.85}
    .btn-rejeitar:hover{background:var(--red-bg)}
    .aj-resp{font-size:11px;color:var(--gray500);margin-top:4px;font-style:italic}

    /* AFASTAMENTOS */
    .btn-primary{padding:10px 18px;border-radius:10px;background:linear-gradient(135deg,var(--teal500),var(--teal700));border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;box-shadow:0 2px 8px rgba(13,148,136,.4)}
    .btn-primary:hover{opacity:.9}
    .afas-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:14px 22px;border-bottom:1px solid var(--gray100);transition:background .15s}
    .afas-row:last-child{border-bottom:none}
    .afas-row:hover{background:var(--gray50)}
    .afas-nome{font-size:14px;font-weight:700;color:var(--gray900)}
    .afas-tipo{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
    .afas-ferias{background:#dbeafe;color:#1e40af}
    .afas-atestado{background:#fee2e2;color:#991b1b}
    .afas-licenca{background:#ede9fe;color:#5b21b6}
    .afas-folga{background:#d1fae5;color:#065f46}
    .afas-outro{background:#f3f4f6;color:#374151}
    .afas-periodo{font-size:12px;color:var(--gray600);margin-top:3px}
    .afas-desc{font-size:11px;color:var(--gray400);margin-top:2px}
    .afas-actions{display:flex;gap:6px}
    .act-btn{width:30px;height:30px;border-radius:8px;background:var(--gray100);border:1px solid var(--gray200);color:var(--gray600);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
    .act-btn:hover{background:var(--gray200)}
    .act-btn.red:hover{background:var(--red-bg);border-color:#fca5a5;color:var(--red)}

    /* EMPTY */
    .empty{padding:48px 20px;text-align:center}
    .empty i{font-size:38px;color:var(--gray300);margin-bottom:12px;display:block}
    .empty p{font-size:13px;color:var(--gray400)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--gray200)}
    .modal-title{font-size:16px;font-weight:800;color:var(--gray900)}
    .modal-close{width:30px;height:30px;border-radius:8px;background:var(--gray100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gray500);font-family:inherit}
    .modal-close:hover{background:var(--gray200)}
    .modal-body{padding:20px 24px}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--gray200)}
    .form-group{margin-bottom:16px}
    .form-label{font-size:12px;font-weight:700;color:var(--gray700);margin-bottom:5px;display:block}
    .form-label span{color:var(--red)}
    .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--gray300);font-size:13px;font-family:inherit;outline:none;color:var(--gray900)}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--teal500);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .btn-cancel{padding:9px 18px;border-radius:9px;border:1px solid var(--gray300);background:white;color:var(--gray700);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-save{padding:9px 18px;border-radius:9px;background:linear-gradient(135deg,var(--teal500),var(--teal700));border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;min-width:100px;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-save:disabled{opacity:.6;cursor:not-allowed}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;z-index:400;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;animation:slideIn .2s ease}
    @keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .toast.success{background:var(--green);color:white}
    .toast.error{background:var(--red);color:white}

    @media(max-width:768px){.topbar{padding:0 16px}.tb-sys,.tb-company{display:none}.main{padding:16px 14px 48px}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>

  <div id="loader" class="loader-wrap">
    <div class="loader-spin"></div>
    <div class="loader-text">Carregando...</div>
  </div>

  <header class="topbar">
    <div class="tb-brand"><div class="tb-logo">L</div><span class="tb-lina">Lina</span></div>
    <div class="tb-sys"><div class="tb-sys-icon">⏰</div><span class="tb-sys-name">Data Point</span></div>
    <div class="tb-company"><i class="fa fa-building" style="font-size:11px;color:rgba(255,255,255,.35)"></i><strong id="tbEmpresaNome">—</strong></div>
    <div class="tb-right">
      <button class="tb-icon-btn" onclick="location.href='data-point-dashboard.html'" title="Voltar"><i class="fa fa-arrow-left"></i></button>
      <div class="tb-avatar" id="tbAvatar">?</div>
    </div>
  </header>

  <main id="mainContent" class="main hidden">

    <div class="page-header">
      <div>
        <div class="ph-title">Ajustes e Afastamentos</div>
        <div class="ph-sub">Gerencie solicitações dos funcionários e registre afastamentos</div>
      </div>
    </div>

    <!-- Abas -->
    <div class="tabs">
      <button class="tab-btn on" id="tabAjustes" onclick="mudarAba('ajustes')">
        <i class="fa fa-inbox"></i> Ajustes
        <span class="tab-badge hidden" id="badgeAjustes">0</span>
      </button>
      <button class="tab-btn" id="tabAfastamentos" onclick="mudarAba('afastamentos')">
        <i class="fa fa-calendar-xmark"></i> Afastamentos
      </button>
    </div>

    <!-- ABA AJUSTES -->
    <div id="secaoAjustes">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="ct-icon ct-amber"><i class="fa fa-inbox"></i></div> Solicitações de Ajuste</div>
        </div>
        <div class="filter-bar" id="filterAjustes">
          <button class="fbtn on" onclick="setFiltroAjuste('TODOS',this)">Todos</button>
          <button class="fbtn" onclick="setFiltroAjuste('PENDENTE',this)">Pendentes</button>
          <button class="fbtn" onclick="setFiltroAjuste('APROVADO',this)">Aprovados</button>
          <button class="fbtn" onclick="setFiltroAjuste('REJEITADO',this)">Rejeitados</button>
        </div>
        <div id="listaAjustes"></div>
      </div>
    </div>

    <!-- ABA AFASTAMENTOS -->
    <div id="secaoAfastamentos" class="hidden">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><div class="ct-icon ct-blue"><i class="fa fa-calendar-xmark"></i></div> Afastamentos Registrados</div>
          <button class="btn-primary" onclick="abrirModalAfastamento()"><i class="fa fa-plus"></i> Registrar</button>
        </div>
        <div id="listaAfastamentos"></div>
      </div>
    </div>

  </main>

  <!-- MODAL RESPOSTA AJUSTE -->
  <div id="modalResposta" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modalRespostaTitulo">Responder ajuste</div>
        <button class="modal-close" onclick="fecharModalResposta()"><i class="fa fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div id="modalRespostaInfo" style="background:var(--gray50);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--gray700);line-height:1.5"></div>
        <div class="form-group">
          <label class="form-label">Observação para o funcionário <span style="color:var(--gray400);font-weight:500">(opcional)</span></label>
          <textarea class="form-textarea" id="obsGestor" placeholder="Ex: Marcação corrigida conforme registro físico..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="fecharModalResposta()">Cancelar</button>
        <button class="btn-save" style="background:var(--red);box-shadow:none" id="btnRejeitar" onclick="responder('REJEITADO')"><i class="fa fa-times"></i> Rejeitar</button>
        <button class="btn-save" id="btnAprovar" onclick="responder('APROVADO')"><i class="fa fa-check"></i> Aprovar</button>
      </div>
    </div>
  </div>

  <!-- MODAL AFASTAMENTO -->
  <div id="modalAfastamento" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modalAfasTitulo">Registrar Afastamento</div>
        <button class="modal-close" onclick="fecharModalAfastamento()"><i class="fa fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Funcionário <span>*</span></label>
          <select class="form-select" id="afasFuncId"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Tipo <span>*</span></label>
            <select class="form-select" id="afasTipo">
              <option value="FERIAS">Férias</option>
              <option value="ATESTADO">Atestado médico</option>
              <option value="LICENCA">Licença</option>
              <option value="FOLGA_COMP">Folga compensatória</option>
              <option value="OUTRO">Outro</option>
            </select>
          </div>
          <div class="form-group" style="opacity:0"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Data início <span>*</span></label>
            <input class="form-input" type="date" id="afasInicio">
          </div>
          <div class="form-group">
            <label class="form-label">Data fim <span>*</span></label>
            <input class="form-input" type="date" id="afasFim">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Observação</label>
          <textarea class="form-textarea" id="afasDesc" placeholder="Ex: CID X00, dias aprovados em folha..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="fecharModalAfastamento()">Cancelar</button>
        <button class="btn-save" id="btnSalvarAfas" onclick="salvarAfastamento()"><i class="fa fa-check"></i> Salvar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

<script>
let abaAtiva = 'ajustes';
let filtroAjuste = 'TODOS';
let todosAjustes = [];
let todosAfastamentos = [];
let todosFuncionarios = [];
let ajusteRespondendoId = null;
let afastamentoEditandoId = null;

document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  if (!token) return (location.href = 'login.html');
  document.getElementById('tbAvatar').textContent = (localStorage.getItem('usuarioNome') || '?').charAt(0).toUpperCase();
  document.getElementById('tbEmpresaNome').textContent = localStorage.getItem('empresaNome') || '—';

  document.getElementById('loader').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');

  await Promise.all([carregarAjustes(), carregarFuncionarios()]);
});

// ── Abas ──────────────────────────────────────────────────────────────────────
function mudarAba(aba) {
  abaAtiva = aba;
  document.getElementById('secaoAjustes').classList.toggle('hidden', aba !== 'ajustes');
  document.getElementById('secaoAfastamentos').classList.toggle('hidden', aba !== 'afastamentos');
  document.getElementById('tabAjustes').classList.toggle('on', aba === 'ajustes');
  document.getElementById('tabAfastamentos').classList.toggle('on', aba === 'afastamentos');
  if (aba === 'afastamentos' && todosAfastamentos.length === 0) carregarAfastamentos();
}

// ── Ajustes ───────────────────────────────────────────────────────────────────
async function carregarAjustes() {
  try {
    const data = await window.api.getDpAjustes();
    todosAjustes = data.ajustes || [];
    const pendentes = todosAjustes.filter(a => a.status === 'PENDENTE').length;
    const badge = document.getElementById('badgeAjustes');
    if (pendentes > 0) { badge.textContent = pendentes; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
    renderAjustes();
  } catch { mostrarToast('Erro ao carregar ajustes', 'error'); }
}

function setFiltroAjuste(status, btn) {
  filtroAjuste = status;
  document.querySelectorAll('#filterAjustes .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderAjustes();
}

function renderAjustes() {
  const lista = document.getElementById('listaAjustes');
  const filtrados = filtroAjuste === 'TODOS' ? todosAjustes : todosAjustes.filter(a => a.status === filtroAjuste);

  if (filtrados.length === 0) {
    lista.innerHTML = '<div class="empty"><i class="fa fa-inbox"></i><p>Nenhuma solicitação encontrada.</p></div>';
    return;
  }

  lista.innerHTML = filtrados.map(a => {
    const tipoCls = { JUSTIFICAR_FALTA: 'tipo-falta', CORRIGIR_HORA: 'tipo-hora', OUTRO: 'tipo-outro' }[a.tipo] || 'tipo-outro';
    const tipoLabel = { JUSTIFICAR_FALTA: 'Justificar falta', CORRIGIR_HORA: 'Corrigir horário', OUTRO: 'Outro' }[a.tipo] || a.tipo;
    const stCls = { PENDENTE: 'st-pendente', APROVADO: 'st-aprovado', REJEITADO: 'st-rejeitado' }[a.status] || '';
    const dataBR = formatarDataBR(a.data);
    const criado = new Date(a.createdAt).toLocaleDateString('pt-BR');
    const isPendente = a.status === 'PENDENTE';

    return `
      <div class="ajuste-row">
        <div>
          <div class="aj-header">
            <span class="aj-nome">${a.funcionario?.nome || '—'}</span>
            <span class="aj-data"><i class="fa fa-calendar" style="font-size:10px"></i> ${dataBR}</span>
            <span class="aj-tipo-badge ${tipoCls}">${tipoLabel}</span>
          </div>
          <div class="aj-desc">${escapeHtml(a.descricao)}</div>
          <div class="aj-meta">Solicitado em ${criado}${a.aprovadoPor ? ` · Respondido por ${a.aprovadoPor}` : ''}</div>
          ${a.obsGestor ? `<div class="aj-resp"><i class="fa fa-reply" style="font-size:10px"></i> "${escapeHtml(a.obsGestor)}"</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <span class="aj-status ${stCls}">${a.status}</span>
          ${isPendente ? `
            <div class="aj-actions">
              <button class="btn-aprovar" onclick="abrirModalResposta('${a.id}','APROVADO')"><i class="fa fa-check"></i> Aprovar</button>
              <button class="btn-rejeitar" onclick="abrirModalResposta('${a.id}','REJEITADO')"><i class="fa fa-times"></i> Rejeitar</button>
            </div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function abrirModalResposta(id, tipoDefault) {
  ajusteRespondendoId = id;
  const ajuste = todosAjustes.find(a => a.id === id);
  if (!ajuste) return;

  const tipoCls = { JUSTIFICAR_FALTA: 'tipo-falta', CORRIGIR_HORA: 'tipo-hora', OUTRO: 'tipo-outro' }[ajuste.tipo] || 'tipo-outro';
  document.getElementById('modalRespostaTitulo').textContent = 'Responder Solicitação';
  document.getElementById('modalRespostaInfo').innerHTML = `
    <strong>${ajuste.funcionario?.nome}</strong> — ${formatarDataBR(ajuste.data)}<br>
    <span class="aj-tipo-badge ${tipoCls}" style="margin-top:6px;display:inline-flex">${ajuste.tipo}</span><br><br>
    <em>${escapeHtml(ajuste.descricao)}</em>`;
  document.getElementById('obsGestor').value = '';
  document.getElementById('modalResposta').classList.remove('hidden');
}

function fecharModalResposta() {
  document.getElementById('modalResposta').classList.add('hidden');
  ajusteRespondendoId = null;
}

async function responder(status) {
  if (!ajusteRespondendoId) return;
  const obsGestor = document.getElementById('obsGestor').value.trim();
  const btn = document.getElementById(status === 'APROVADO' ? 'btnAprovar' : 'btnRejeitar');
  btn.disabled = true;
  try {
    await window.api.responderAjuste(ajusteRespondendoId, { status, obsGestor });
    mostrarToast(`Ajuste ${status === 'APROVADO' ? 'aprovado' : 'rejeitado'}.`, 'success');
    fecharModalResposta();
    await carregarAjustes();
  } catch { mostrarToast('Erro ao responder ajuste.', 'error'); }
  finally { btn.disabled = false; }
}

// ── Afastamentos ──────────────────────────────────────────────────────────────
async function carregarAfastamentos() {
  try {
    const data = await window.api.getDpAfastamentos();
    todosAfastamentos = data.afastamentos || [];
    renderAfastamentos();
  } catch { mostrarToast('Erro ao carregar afastamentos', 'error'); }
}

async function carregarFuncionarios() {
  try {
    const data = await window.api.getDpFuncionarios('ATIVO');
    todosFuncionarios = data.funcionarios || [];
    const sel = document.getElementById('afasFuncId');
    sel.innerHTML = todosFuncionarios.map(f => `<option value="${f.id}">${f.nome}${f.cargo ? ' · ' + f.cargo : ''}</option>`).join('');
  } catch {}
}

function renderAfastamentos() {
  const lista = document.getElementById('listaAfastamentos');
  if (todosAfastamentos.length === 0) {
    lista.innerHTML = '<div class="empty"><i class="fa fa-calendar-xmark"></i><p>Nenhum afastamento registrado.</p></div>';
    return;
  }

  const tipoMap = { FERIAS:'Férias', ATESTADO:'Atestado', LICENCA:'Licença', FOLGA_COMP:'Folga comp.', OUTRO:'Outro' };
  const tipoCls = { FERIAS:'afas-ferias', ATESTADO:'afas-atestado', LICENCA:'afas-licenca', FOLGA_COMP:'afas-folga', OUTRO:'afas-outro' };
  const tipoIco = { FERIAS:'fa-umbrella-beach', ATESTADO:'fa-file-medical', LICENCA:'fa-file-signature', FOLGA_COMP:'fa-clock-rotate-left', OUTRO:'fa-calendar' };

  lista.innerHTML = todosAfastamentos.map(af => `
    <div class="afas-row">
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          <span class="afas-nome">${af.funcionario?.nome || '—'}</span>
          <span class="afas-tipo ${tipoCls[af.tipo] || 'afas-outro'}">
            <i class="fa ${tipoIco[af.tipo] || 'fa-calendar'}" style="font-size:9px"></i>
            ${tipoMap[af.tipo] || af.tipo}
          </span>
        </div>
        <div class="afas-periodo"><i class="fa fa-calendar-days" style="font-size:10px"></i> ${formatarDataBR(af.dataInicio)} → ${formatarDataBR(af.dataFim)} · ${diasEntre(af.dataInicio, af.dataFim)} dia(s)</div>
        ${af.descricao ? `<div class="afas-desc">${escapeHtml(af.descricao)}</div>` : ''}
      </div>
      <div class="afas-actions">
        <button class="act-btn" title="Editar" onclick="editarAfastamento('${af.id}')"><i class="fa fa-pencil-alt"></i></button>
        <button class="act-btn red" title="Excluir" onclick="excluirAfastamento('${af.id}')"><i class="fa fa-trash"></i></button>
      </div>
    </div>`).join('');
}

function abrirModalAfastamento() {
  afastamentoEditandoId = null;
  document.getElementById('modalAfasTitulo').textContent = 'Registrar Afastamento';
  document.getElementById('afasTipo').value = 'FERIAS';
  document.getElementById('afasInicio').value = '';
  document.getElementById('afasFim').value = '';
  document.getElementById('afasDesc').value = '';
  document.getElementById('modalAfastamento').classList.remove('hidden');
}

function fecharModalAfastamento() {
  document.getElementById('modalAfastamento').classList.add('hidden');
  afastamentoEditandoId = null;
}

function editarAfastamento(id) {
  const af = todosAfastamentos.find(a => a.id === id);
  if (!af) return;
  afastamentoEditandoId = id;
  document.getElementById('modalAfasTitulo').textContent = 'Editar Afastamento';
  document.getElementById('afasFuncId').value = af.funcionarioId;
  document.getElementById('afasTipo').value = af.tipo;
  document.getElementById('afasInicio').value = af.dataInicio;
  document.getElementById('afasFim').value = af.dataFim;
  document.getElementById('afasDesc').value = af.descricao || '';
  document.getElementById('modalAfastamento').classList.remove('hidden');
}

async function salvarAfastamento() {
  const funcionarioId = document.getElementById('afasFuncId').value;
  const tipo = document.getElementById('afasTipo').value;
  const dataInicio = document.getElementById('afasInicio').value;
  const dataFim = document.getElementById('afasFim').value;
  const descricao = document.getElementById('afasDesc').value.trim();

  if (!funcionarioId || !dataInicio || !dataFim) { mostrarToast('Preencha todos os campos obrigatórios.', 'error'); return; }
  if (dataFim < dataInicio) { mostrarToast('Data fim deve ser após a data início.', 'error'); return; }

  const btn = document.getElementById('btnSalvarAfas');
  btn.disabled = true;
  try {
    const payload = { funcionarioId, tipo, dataInicio, dataFim, descricao: descricao || null };
    if (afastamentoEditandoId) {
      await window.api.atualizarDpAfastamento(afastamentoEditandoId, payload);
      mostrarToast('Afastamento atualizado.', 'success');
    } else {
      await window.api.criarDpAfastamento(payload);
      mostrarToast('Afastamento registrado.', 'success');
    }
    fecharModalAfastamento();
    await carregarAfastamentos();
  } catch { mostrarToast('Erro ao salvar afastamento.', 'error'); }
  finally { btn.disabled = false; }
}

async function excluirAfastamento(id) {
  if (!confirm('Excluir este afastamento?')) return;
  try {
    await window.api.excluirDpAfastamento(id);
    mostrarToast('Afastamento excluído.', 'success');
    await carregarAfastamentos();
  } catch { mostrarToast('Erro ao excluir.', 'error'); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatarDataBR(iso) {
  if (!iso) return '—';
  const [a, m, d] = iso.split('-');
  return `${d}/${m}/${a}`;
}

function diasEntre(ini, fim) {
  const d1 = new Date(ini + 'T12:00:00');
  const d2 = new Date(fim + 'T12:00:00');
  return Math.round((d2 - d1) / 86400000) + 1;
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function mostrarToast(msg, tipo = 'success') {
  const t = document.getElementById('toast');
  t.className = `toast ${tipo}`;
  t.innerHTML = `<i class="fa ${tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
}
</script>
