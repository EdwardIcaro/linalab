<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Point — Funcionários</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/api.js"></script>
  <style>
    :root {
      --teal800: #064e3b; --teal700: #0f766e; --teal600: #0d9488;
      --teal500: #14b8a6; --teal400: #2dd4bf; --teal200: #99f6e4;
      --teal100: #ccfbf1; --teal50:  #f0fdfa;
      --p800: #5b21b6; --p700: #6d28d9; --p600: #7c3aed;
      --p500: #8b5cf6; --p100: #ede9fe; --p50: #f5f3ff;
      --gray900: #111827; --gray800: #1f2937; --gray700: #374151;
      --gray600: #4b5563; --gray500: #6b7280; --gray400: #9ca3af;
      --gray300: #d1d5db; --gray200: #e5e7eb; --gray100: #f3f4f6;
      --white: #ffffff;
      --green: #059669; --green-bg: #d1fae5;
      --amber: #d97706; --amber-bg: #fef3c7;
      --red: #dc2626;   --red-bg: #fee2e2;
      --blue: #2563eb;  --blue-bg: #dbeafe;
    }
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, var(--teal800) 0%, var(--teal700) 30%, var(--p700) 70%, var(--p800) 100%);
      color: var(--gray900); overflow-x: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 85% 5%, rgba(255,255,255,.1) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 5% 85%, rgba(91,33,182,.3) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,78,59,.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.12);
      padding: 0 28px; display: flex; align-items: center; height: 58px;
    }
    .tb-brand { display: flex; align-items: center; gap: 10px; padding-right: 20px; border-right: 1px solid rgba(255,255,255,.14); }
    .tb-logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(145deg, var(--p600), var(--p800));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white;
    }
    .tb-lina { font-size: 15px; font-weight: 800; color: white; }
    .tb-sys { display: flex; align-items: center; gap: 8px; margin-left: 20px; padding-right: 20px; border-right: 1px solid rgba(255,255,255,.14); }
    .tb-sys-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(145deg, var(--teal600), var(--teal800));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; border: 1px solid rgba(255,255,255,.15);
    }
    .tb-sys-name { font-size: 14px; font-weight: 700; color: var(--teal200); }
    .tb-company { margin-left: 20px; display: flex; align-items: center; gap: 7px; font-size: 13px; color: rgba(255,255,255,.65); }
    .tb-company strong { color: rgba(255,255,255,.9); font-weight: 700; }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .tb-icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.7); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .18s; font-family: inherit;
    }
    .tb-icon-btn:hover { background: rgba(255,255,255,.15); color: white; }
    .tb-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(145deg, var(--p500), var(--p800));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: white; cursor: pointer;
    }

    /* ── LOADER ── */
    .loader-wrap {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(6,78,59,.95);
    }
    .loader-spin {
      width: 44px; height: 44px; border: 3px solid rgba(45,212,191,.3);
      border-top-color: var(--teal400); border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { margin-top: 16px; font-size: 14px; color: var(--teal200); font-weight: 500; }
    .hidden { display: none !important; }

    /* ── LAYOUT ── */
    .main {
      padding: 28px 28px 60px; max-width: 1100px;
      margin: 0 auto; position: relative; z-index: 1;
    }
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 22px;
    }
    .ph-title {
      font-size: 26px; font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--teal200));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .ph-sub { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 3px; }

    /* ── BOTÃO PRIMÁRIO ── */
    .btn-primary {
      padding: 10px 18px; border-radius: 10px;
      background: linear-gradient(135deg, var(--teal500), var(--teal700));
      border: none; color: white; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 7px; transition: all .18s;
      box-shadow: 0 2px 8px rgba(13,148,136,.4);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,148,136,.5); }
    .btn-ghost {
      padding: 9px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.85);
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 7px; transition: all .18s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.15); }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: rgba(255,255,255,.12); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.15); border-radius: 16px;
      padding: 18px 20px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all .18s;
    }
    .stat-card:hover, .stat-card.active { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.3); }
    .stat-card.active { border-color: var(--teal400); }
    .sc-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .sc-val { font-size: 26px; font-weight: 900; color: white; line-height: 1; }
    .sc-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.65); text-transform: uppercase; letter-spacing: .7px; margin-top: 2px; }

    /* ── CARD ── */
    .card {
      background: rgba(255,255,255,.97); border: 1px solid var(--gray200);
      border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 0;
    }
    .card-title { font-size: 15px; font-weight: 800; color: var(--gray900); display: flex; align-items: center; gap: 8px; }
    .ct-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .ct-teal { background: var(--teal100); color: var(--teal700); }

    /* ── SEARCH / FILTER ── */
    .search-filter {
      display: flex; gap: 10px; padding: 14px 22px;
      border-bottom: 1px solid var(--gray200); align-items: center;
    }
    .search-input-wrap { position: relative; flex: 1; max-width: 320px; }
    .search-input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--gray400); font-size: 13px; }
    .search-input {
      width: 100%; padding: 8px 12px 8px 34px; border-radius: 9px;
      border: 1px solid var(--gray300); font-size: 13px; font-family: inherit;
      outline: none; color: var(--gray800); background: var(--gray100);
    }
    .search-input:focus { border-color: var(--teal500); background: white; }
    .filter-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .ftab {
      white-space: nowrap; padding: 5px 13px; border-radius: 8px;
      border: 1px solid var(--gray300); background: var(--white);
      color: var(--gray600); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .ftab.on { background: var(--teal600); border-color: var(--teal600); color: white; }
    .ftab:not(.on):hover { border-color: var(--teal400); color: var(--teal700); background: var(--teal50); }

    /* ── LISTA FUNCIONÁRIOS ── */
    .func-row {
      display: grid; grid-template-columns: 48px 1fr auto;
      align-items: center; gap: 14px;
      padding: 16px 22px; border-bottom: 1px solid var(--gray100);
      transition: background .15s;
    }
    .func-row:last-child { border-bottom: none; }
    .func-row:hover { background: var(--gray50); }
    .func-row.desligado { opacity: .5; }
    .func-avatar {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); flex-shrink: 0;
    }
    .func-name { font-size: 14px; font-weight: 700; color: var(--gray900); display: flex; align-items: center; gap: 8px; }
    .func-meta { font-size: 11px; color: var(--gray500); margin-top: 3px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .func-meta i { font-size: 10px; }
    .badge {
      padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700;
      white-space: nowrap; display: inline-flex; align-items: center; gap: 4px;
    }
    .badge-ativo    { background: var(--teal100);   color: var(--teal700); }
    .badge-afastado { background: var(--amber-bg);  color: var(--amber); }
    .badge-ferias   { background: var(--blue-bg);   color: var(--blue); }
    .badge-desligado{ background: var(--gray200);   color: var(--gray600); }
    .badge-linawash { background: var(--p100);      color: var(--p700); }
    .badge-pin      { background: var(--green-bg);  color: var(--green); }
    .badge-nopin    { background: var(--red-bg);    color: var(--red); }

    /* Ações do row */
    .func-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .act-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--gray100); border: 1px solid var(--gray200);
      color: var(--gray600); cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s;
    }
    .act-btn:hover { background: var(--gray200); color: var(--gray900); }
    .act-btn.teal:hover { background: var(--teal50); border-color: var(--teal300); color: var(--teal700); }
    .act-btn.red:hover  { background: var(--red-bg); border-color: #fca5a5; color: var(--red); }
    .act-btn.amber:hover{ background: var(--amber-bg); border-color: #fcd34d; color: var(--amber); }

    /* ── EMPTY ── */
    .empty { padding: 52px 20px; text-align: center; }
    .empty i { font-size: 40px; color: var(--gray300); margin-bottom: 14px; display: block; }
    .empty p { font-size: 13px; color: var(--gray400); }
    .empty .empty-btn {
      margin-top: 16px; display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 9px;
      background: var(--teal600); color: white; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: white; border-radius: 20px;
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px 18px; border-bottom: 1px solid var(--gray200); position: sticky; top: 0;
      background: white; z-index: 1;
    }
    .modal-title { font-size: 17px; font-weight: 800; color: var(--gray900); display: flex; align-items: center; gap: 10px; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--gray100); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--gray500); font-family: inherit;
    }
    .modal-close:hover { background: var(--gray200); color: var(--gray900); }
    .modal-body { padding: 22px 24px; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 18px 24px; border-top: 1px solid var(--gray200);
      position: sticky; bottom: 0; background: white;
    }

    /* Form */
    .form-section { margin-bottom: 24px; }
    .form-section-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .8px; color: var(--gray500); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--gray200);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--gray700); }
    .form-label span { color: var(--red); margin-left: 2px; }
    .form-input, .form-select {
      padding: 9px 12px; border-radius: 9px;
      border: 1px solid var(--gray300); font-size: 13px; font-family: inherit;
      outline: none; color: var(--gray900); background: white; width: 100%;
    }
    .form-input:focus, .form-select:focus { border-color: var(--teal500); box-shadow: 0 0 0 3px rgba(20,184,166,.1); }
    .form-hint { font-size: 11px; color: var(--gray400); }

    /* Jornada override toggle */
    .jornada-toggle {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      padding: 10px 14px; background: var(--teal50); border-radius: 10px;
      border: 1px solid var(--teal100); cursor: pointer;
    }
    .jornada-toggle input[type=checkbox] { accent-color: var(--teal600); width: 16px; height: 16px; cursor: pointer; }
    .jornada-toggle-label { font-size: 13px; font-weight: 600; color: var(--teal700); }
    .jornada-toggle-hint { font-size: 11px; color: var(--gray500); margin-left: auto; }

    /* Botões do modal */
    .btn-cancel {
      padding: 10px 20px; border-radius: 9px;
      border: 1px solid var(--gray300); background: white;
      color: var(--gray700); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-cancel:hover { background: var(--gray100); }
    .btn-save {
      padding: 10px 20px; border-radius: 9px;
      background: linear-gradient(135deg, var(--teal500), var(--teal700));
      border: none; color: white; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; min-width: 120px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-save:hover { opacity: .9; }
    .btn-save:disabled { opacity: .6; cursor: not-allowed; }

    /* Status select no modal (edição) */
    .status-section { margin-top: 6px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 400;
      padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.2); max-width: 320px;
      display: flex; align-items: center; gap: 10px; animation: slideIn .2s ease;
    }
    @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast.success { background: var(--green); color: white; }
    .toast.error   { background: var(--red);   color: white; }
    .toast.info    { background: var(--teal700); color: white; }

    /* ── CONFIRM OVERLAY ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 350;
      background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .confirm-box {
      background: white; border-radius: 16px; padding: 28px 28px 22px;
      max-width: 380px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,.3);
      text-align: center;
    }
    .confirm-icon { font-size: 36px; margin-bottom: 14px; display: block; }
    .confirm-title { font-size: 16px; font-weight: 800; color: var(--gray900); margin-bottom: 8px; }
    .confirm-desc  { font-size: 13px; color: var(--gray500); line-height: 1.5; }
    .confirm-btns  { display: flex; gap: 10px; margin-top: 22px; justify-content: center; }
    .btn-confirm {
      padding: 10px 22px; border-radius: 9px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-confirm.danger  { background: var(--red);       color: white; }
    .btn-confirm.amber   { background: var(--amber);     color: white; }
    .btn-confirm.neutral { background: var(--gray200);   color: var(--gray800); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .topbar { padding: 0 16px; }
      .tb-sys, .tb-company { display: none; }
      .main { padding: 16px 14px 48px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .form-row { grid-template-columns: 1fr; }
      .func-row { grid-template-columns: 42px 1fr; }
      .func-actions { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader" class="loader-wrap">
    <div class="loader-spin"></div>
    <div class="loader-text">Carregando funcionários...</div>
  </div>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="tb-brand">
      <div class="tb-logo">L</div>
      <span class="tb-lina">Lina</span>
    </div>
    <div class="tb-sys">
      <div class="tb-sys-icon">⏰</div>
      <span class="tb-sys-name">Data Point</span>
    </div>
    <div class="tb-company">
      <i class="fa fa-building" style="font-size:11px;color:rgba(255,255,255,.35)"></i>
      <strong id="tbEmpresaNome">—</strong>
    </div>
    <div class="tb-right">
      <button class="tb-icon-btn" onclick="location.href='data-point-dashboard.html'" title="Voltar ao dashboard"><i class="fa fa-arrow-left"></i></button>
      <div class="tb-avatar" id="tbAvatar">?</div>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main id="mainContent" class="main hidden">

    <div class="page-header">
      <div>
        <div class="ph-title">Funcionários</div>
        <div class="ph-sub" id="phSub">—</div>
      </div>
      <button class="btn-primary" onclick="abrirModalNovo()">
        <i class="fa fa-plus"></i> Adicionar Funcionário
      </button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Card principal -->
    <div class="card">
      <!-- Search + filtros -->
      <div class="search-filter">
        <div class="search-input-wrap">
          <i class="fa fa-search"></i>
          <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nome ou cargo..." oninput="renderLista()">
        </div>
        <div class="filter-tabs" id="filterTabs"></div>
      </div>

      <!-- Lista -->
      <div id="funcList"></div>
    </div>

  </main>

  <!-- ═══════════════ MODAL ADD/EDIT ═══════════════ -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">
          <div class="ct-icon ct-teal" style="width:32px;height:32px"><i class="fa fa-user-plus"></i></div>
          <span id="modalTitle">Novo Funcionário</span>
        </div>
        <button class="modal-close" onclick="fecharModal()"><i class="fa fa-times"></i></button>
      </div>

      <div class="modal-body">

        <!-- Dados pessoais -->
        <div class="form-section">
          <div class="form-section-title">Dados Pessoais</div>
          <div class="form-row full">
            <div class="form-group">
              <label class="form-label">Nome completo <span>*</span></label>
              <input class="form-input" id="fNome" type="text" placeholder="Ex: João da Silva" autocomplete="off">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">CPF</label>
              <input class="form-input" id="fCpf" type="text" placeholder="000.000.000-00" maxlength="14" oninput="formatarCpf(this)">
            </div>
            <div class="form-group">
              <label class="form-label">Cargo</label>
              <input class="form-input" id="fCargo" type="text" placeholder="Ex: Atendente, Lavador">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Salário base (R$)</label>
              <input class="form-input" id="fSalario" type="number" min="0" step="0.01" placeholder="Ex: 1500.00">
            </div>
            <div class="form-group">
              <label class="form-label">Telefone / WhatsApp</label>
              <input class="form-input" id="fTelefone" type="text" placeholder="(99) 99999-9999">
            </div>
          </div>
        </div>

        <!-- Jornada -->
        <div class="form-section">
          <div class="form-section-title">Jornada de Trabalho</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Carga horária semanal (h)</label>
              <input class="form-input" id="fCargaSemanal" type="number" min="1" max="44" placeholder="Ex: 44">
              <span class="form-hint">Horas por semana (ex: 44h CLT)</span>
            </div>
            <div class="form-group">
              <div style="height:22px"></div><!-- spacer -->
            </div>
          </div>

          <label class="jornada-toggle" id="jornadaToggleLabel">
            <input type="checkbox" id="jornadaOverride" onchange="toggleJornadaOverride()">
            <span class="jornada-toggle-label"><i class="fa fa-sliders-h" style="font-size:12px"></i> Jornada individual diferente da empresa</span>
            <span class="jornada-toggle-hint">opcional</span>
          </label>

          <div id="jornadaOverrideFields" class="hidden">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Horário de entrada</label>
                <input class="form-input" id="fJornadaEntrada" type="time" value="08:00">
                <span class="form-hint">Override individual — ignora padrão da empresa</span>
              </div>
              <div class="form-group">
                <label class="form-label">Carga horária/dia (h)</label>
                <input class="form-input" id="fCargaDia" type="number" min="1" max="12" step="0.5" placeholder="Ex: 8">
                <span class="form-hint">Override individual da carga diária</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Status (apenas na edição) -->
        <div class="form-section status-section hidden" id="statusSection">
          <div class="form-section-title">Status</div>
          <div class="form-row full">
            <div class="form-group">
              <label class="form-label">Status do funcionário</label>
              <select class="form-select" id="fStatus">
                <option value="ATIVO">Ativo</option>
                <option value="AFASTADO">Afastado</option>
                <option value="FERIAS">Férias</option>
                <option value="DESLIGADO">Desligado</option>
              </select>
            </div>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="btn-save" id="btnSalvar" onclick="salvarFuncionario()">
          <i class="fa fa-check"></i> Salvar
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ CONFIRM OVERLAY ═══════════════ -->
  <div id="confirmOverlay" class="confirm-overlay hidden">
    <div class="confirm-box">
      <span class="confirm-icon" id="confirmIcon">⚠️</span>
      <div class="confirm-title" id="confirmTitle">Confirmar ação</div>
      <div class="confirm-desc"  id="confirmDesc">Tem certeza?</div>
      <div class="confirm-btns">
        <button class="btn-confirm neutral" onclick="fecharConfirm()">Cancelar</button>
        <button class="btn-confirm danger"  id="confirmBtn" onclick="executarConfirm()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

<script>
// ── Estado ────────────────────────────────────────────────────────────────────
const AVATAR_COLORS = [
  'linear-gradient(145deg,#0d9488,#064e3b)',
  'linear-gradient(145deg,#7c3aed,#5b21b6)',
  'linear-gradient(145deg,#4f46e5,#3730a3)',
  'linear-gradient(145deg,#e11d48,#9f1239)',
  'linear-gradient(145deg,#ea580c,#9a3412)',
  'linear-gradient(145deg,#0891b2,#164e63)',
  'linear-gradient(145deg,#16a34a,#14532d)',
  'linear-gradient(145deg,#ca8a04,#92400e)',
];

let todos = [];
let filtroAtivo = 'TODOS';
let editandoId = null;
let confirmCallback = null;
let cfgEmpresa = {};

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  if (!token) return (location.href = 'login.html');

  const nome = localStorage.getItem('usuarioNome') || '';
  document.getElementById('tbAvatar').textContent = nome.charAt(0).toUpperCase() || '?';

  await Promise.all([carregarConfig(), carregarFuncionarios()]);
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('mainContent').classList.remove('hidden');
});

async function carregarConfig() {
  try {
    const data = await window.api.getStatusDp(localStorage.getItem('empresaId') || '');
    cfgEmpresa = data.config || {};
    const empresaNome = localStorage.getItem('empresaNome') || '—';
    document.getElementById('tbEmpresaNome').textContent = empresaNome;
  } catch {}
}

async function carregarFuncionarios() {
  try {
    const data = await window.api.getDpFuncionarios();
    todos = data.funcionarios || [];
    renderStats();
    renderFiltros();
    renderLista();
    document.getElementById('phSub').textContent =
      `${todos.length} funcionário${todos.length !== 1 ? 's' : ''} cadastrado${todos.length !== 1 ? 's' : ''}`;
  } catch (e) {
    console.error(e);
    mostrarToast('Erro ao carregar funcionários.', 'error');
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const total     = todos.length;
  const ativos    = todos.filter(f => f.status === 'ATIVO').length;
  const afastados = todos.filter(f => f.status === 'AFASTADO' || f.status === 'FERIAS').length;
  const desligados= todos.filter(f => f.status === 'DESLIGADO').length;

  const stats = [
    { key: 'TODOS',    label: 'Total',            val: total,    icon: 'fa-users',         cor: 'rgba(255,255,255,.2)', iconCor: 'rgba(255,255,255,.9)' },
    { key: 'ATIVO',    label: 'Ativos',           val: ativos,   icon: 'fa-user-check',    cor: 'rgba(20,184,166,.3)',  iconCor: '#99f6e4' },
    { key: 'AFASTADO', label: 'Afastados/Férias', val: afastados,icon: 'fa-user-clock',    cor: 'rgba(217,119,6,.3)',   iconCor: '#fcd34d' },
    { key: 'DESLIGADO',label: 'Desligados',       val: desligados,icon: 'fa-user-times',   cor: 'rgba(220,38,38,.3)',   iconCor: '#fca5a5' },
  ];

  const container = document.getElementById('statsRow');
  container.innerHTML = '';
  stats.forEach(s => {
    const div = document.createElement('div');
    div.className = `stat-card${filtroAtivo === s.key ? ' active' : ''}`;
    div.onclick = () => { filtroAtivo = s.key; renderStats(); renderFiltros(); renderLista(); };
    div.innerHTML = `
      <div class="sc-icon" style="background:${s.cor}">
        <i class="fa ${s.icon}" style="color:${s.iconCor}"></i>
      </div>
      <div>
        <div class="sc-val">${s.val}</div>
        <div class="sc-label">${s.label}</div>
      </div>`;
    container.appendChild(div);
  });
}

// ── Filtros ───────────────────────────────────────────────────────────────────
function renderFiltros() {
  const counts = {
    TODOS:    todos.length,
    ATIVO:    todos.filter(f => f.status === 'ATIVO').length,
    AFASTADO: todos.filter(f => f.status === 'AFASTADO').length,
    FERIAS:   todos.filter(f => f.status === 'FERIAS').length,
    DESLIGADO:todos.filter(f => f.status === 'DESLIGADO').length,
  };
  const tabs = [
    { key: 'TODOS',    label: `Todos (${counts.TODOS})` },
    { key: 'ATIVO',    label: `Ativos (${counts.ATIVO})` },
    { key: 'AFASTADO', label: `Afastados (${counts.AFASTADO})` },
    { key: 'FERIAS',   label: `Férias (${counts.FERIAS})` },
    { key: 'DESLIGADO',label: `Desligados (${counts.DESLIGADO})` },
  ];
  document.getElementById('filterTabs').innerHTML = tabs.map(t =>
    `<button class="ftab${filtroAtivo === t.key ? ' on' : ''}" onclick="setFiltro('${t.key}')">${t.label}</button>`
  ).join('');
}

function setFiltro(key) {
  filtroAtivo = key;
  renderStats();
  renderFiltros();
  renderLista();
}

// ── Lista ─────────────────────────────────────────────────────────────────────
function renderLista() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let lista = filtroAtivo === 'TODOS' ? todos : todos.filter(f => f.status === filtroAtivo);
  if (q) lista = lista.filter(f =>
    f.nome.toLowerCase().includes(q) || (f.cargo || '').toLowerCase().includes(q)
  );

  const container = document.getElementById('funcList');
  if (lista.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <i class="fa fa-users"></i>
        <p>${q ? 'Nenhum funcionário encontrado para essa busca.' : 'Nenhum funcionário neste status.'}</p>
        ${!q && filtroAtivo === 'TODOS' ? '<button class="empty-btn" onclick="abrirModalNovo()"><i class="fa fa-plus"></i> Adicionar Funcionário</button>' : ''}
      </div>`;
    return;
  }

  container.innerHTML = '';
  lista.forEach((f, i) => {
    const row = buildFuncRow(f, i);
    container.appendChild(row);
  });
}

function buildFuncRow(f, idx) {
  const row = document.createElement('div');
  row.className = `func-row${f.status === 'DESLIGADO' ? ' desligado' : ''}`;

  const cor = f.status === 'DESLIGADO'
    ? 'background:var(--gray300);color:var(--gray600)'
    : `background:${AVATAR_COLORS[idx % AVATAR_COLORS.length]}`;

  const initials = iniciaisNome(f.nome);
  const statusBadge = badgeStatus(f.status);
  const jornadaInfo = jornadaLabel(f, cfgEmpresa);
  const pinBadge = f.pinDefinido
    ? '<span class="badge badge-pin"><i class="fa fa-lock"></i> PIN definido</span>'
    : '<span class="badge badge-nopin"><i class="fa fa-unlock"></i> Sem PIN</span>';
  const linaBadge = f.lavadorId
    ? '<span class="badge badge-linawash"><i class="fa fa-link"></i> Lina Wash</span>'
    : '';

  const portalLink = f.portalToken
    ? `${window.location.origin}/p/${f.portalToken}`
    : null;

  row.innerHTML = `
    <div class="func-avatar" style="${cor}">${initials}</div>
    <div>
      <div class="func-name">
        ${f.nome}
        ${statusBadge}
        ${linaBadge}
      </div>
      <div class="func-meta">
        ${f.cargo ? `<span><i class="fa fa-briefcase"></i> ${f.cargo}</span>` : ''}
        ${jornadaInfo ? `<span><i class="fa fa-clock"></i> ${jornadaInfo}</span>` : ''}
        ${pinBadge}
      </div>
    </div>
    <div class="func-actions">
      <button class="act-btn teal" title="Editar" onclick="abrirModalEditar('${f.id}')">
        <i class="fa fa-pencil-alt"></i>
      </button>
      <button class="act-btn teal" title="${portalLink ? 'Copiar link do portal' : 'Link do portal (não disponível)'}"
        onclick="${portalLink ? `copiarLink('${portalLink}')` : "mostrarToast('Portal disponível apenas para funcionários vinculados ao Lina Wash por enquanto.','info')"}">
        <i class="fa fa-link"></i>
      </button>
      <button class="act-btn amber" title="Redefinir PIN" onclick="confirmarResetPin('${f.id}', '${escapar(f.nome)}')">
        <i class="fa fa-key"></i>
      </button>
      <button class="act-btn" title="Mais ações" onclick="abrirMenuStatus('${f.id}', '${f.status}', '${escapar(f.nome)}')">
        <i class="fa fa-ellipsis-v"></i>
      </button>
    </div>
  `;
  return row;
}

// ── Modal Add/Edit ────────────────────────────────────────────────────────────
function abrirModalNovo() {
  editandoId = null;
  document.getElementById('modalTitle').textContent = 'Novo Funcionário';
  document.getElementById('statusSection').classList.add('hidden');
  limparForm();
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('fNome').focus();
}

function abrirModalEditar(id) {
  const f = todos.find(x => x.id === id);
  if (!f) return;

  editandoId = id;
  document.getElementById('modalTitle').textContent = 'Editar Funcionário';
  document.getElementById('statusSection').classList.remove('hidden');

  document.getElementById('fNome').value      = f.nome || '';
  document.getElementById('fCpf').value       = f.cpf || '';
  document.getElementById('fCargo').value     = f.cargo || '';
  document.getElementById('fSalario').value   = f.salarioBase ?? '';
  document.getElementById('fTelefone').value  = f.telefone || '';
  document.getElementById('fCargaSemanal').value = f.cargaHoraria ?? '';
  document.getElementById('fStatus').value    = f.status || 'ATIVO';

  const temOverride = !!(f.jornadaEntrada || f.cargaHorariaDia);
  document.getElementById('jornadaOverride').checked = temOverride;
  if (temOverride) {
    document.getElementById('jornadaOverrideFields').classList.remove('hidden');
    document.getElementById('fJornadaEntrada').value = f.jornadaEntrada || '08:00';
    document.getElementById('fCargaDia').value = f.cargaHorariaDia ?? '';
  } else {
    document.getElementById('jornadaOverrideFields').classList.add('hidden');
  }

  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('fNome').focus();
}

function fecharModal() {
  document.getElementById('modal').classList.add('hidden');
  editandoId = null;
}

function limparForm() {
  ['fNome','fCpf','fCargo','fSalario','fTelefone','fCargaSemanal','fJornadaEntrada','fCargaDia'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('jornadaOverride').checked = false;
  document.getElementById('jornadaOverrideFields').classList.add('hidden');
  document.getElementById('fStatus').value = 'ATIVO';
}

function toggleJornadaOverride() {
  const checked = document.getElementById('jornadaOverride').checked;
  document.getElementById('jornadaOverrideFields').classList.toggle('hidden', !checked);
  if (checked) document.getElementById('fJornadaEntrada').focus();
}

async function salvarFuncionario() {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) {
    mostrarToast('Nome é obrigatório.', 'error');
    document.getElementById('fNome').focus();
    return;
  }

  const override = document.getElementById('jornadaOverride').checked;
  const payload = {
    nome,
    cpf:           document.getElementById('fCpf').value.trim() || null,
    cargo:         document.getElementById('fCargo').value.trim() || null,
    salarioBase:   document.getElementById('fSalario').value || null,
    cargaHoraria:  document.getElementById('fCargaSemanal').value || null,
    telefone:      document.getElementById('fTelefone').value.trim() || null,
    jornadaEntrada:override ? document.getElementById('fJornadaEntrada').value || null : null,
    cargaHorariaDia:override ? document.getElementById('fCargaDia').value || null : null,
  };

  if (editandoId) {
    payload.status = document.getElementById('fStatus').value;
  }

  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Salvando...';

  try {
    if (editandoId) {
      await window.api.atualizarDpFuncionario(editandoId, payload);
      mostrarToast('Funcionário atualizado.', 'success');
    } else {
      await window.api.criarDpFuncionario(payload);
      mostrarToast('Funcionário criado.', 'success');
    }
    fecharModal();
    await carregarFuncionarios();
  } catch (e) {
    console.error(e);
    mostrarToast('Erro ao salvar. Tente novamente.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-check"></i> Salvar';
  }
}

// ── Ações ─────────────────────────────────────────────────────────────────────
function confirmarResetPin(id, nome) {
  abrirConfirm(
    '🔑',
    'Redefinir PIN',
    `Isso vai apagar o PIN de <strong>${nome}</strong> e invalidar a sessão ativa no celular. O funcionário precisará definir um novo PIN no próximo acesso.`,
    'amber',
    async () => {
      try {
        await window.api.resetarPinDpFuncionario(id);
        mostrarToast('PIN redefinido. Sessão invalidada.', 'success');
        await carregarFuncionarios();
      } catch {
        mostrarToast('Erro ao redefinir PIN.', 'error');
      }
    }
  );
}

function abrirMenuStatus(id, statusAtual, nome) {
  const proximo = statusAtual === 'DESLIGADO' ? 'ATIVO'
    : statusAtual === 'AFASTADO' ? 'ATIVO'
    : statusAtual === 'FERIAS' ? 'ATIVO'
    : null;

  if (statusAtual !== 'DESLIGADO') {
    abrirConfirm(
      '⚠️',
      'Alterar status',
      `<div style="text-align:left;margin-top:8px">
        <p style="margin-bottom:12px;color:#6b7280">Selecione o novo status para <strong>${nome}</strong>:</p>
        <div id="statusOptions" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>`,
      null,
      null
    );
    // Popula opções de status
    setTimeout(() => {
      const opts = document.getElementById('statusOptions');
      if (!opts) return;
      const opções = [
        { v: 'ATIVO',    label: 'Ativo',      cor: '#059669' },
        { v: 'AFASTADO', label: 'Afastado',   cor: '#d97706' },
        { v: 'FERIAS',   label: 'Férias',     cor: '#2563eb' },
        { v: 'DESLIGADO',label: 'Desligado',  cor: '#dc2626' },
      ].filter(o => o.v !== statusAtual);
      opções.forEach(o => {
        const btn = document.createElement('button');
        btn.style.cssText = `padding:9px 14px;border-radius:9px;border:1px solid #e5e7eb;background:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:${o.cor};text-align:left`;
        btn.textContent = o.label;
        btn.onclick = async () => {
          fecharConfirm();
          try {
            await window.api.atualizarDpFuncionario(id, { status: o.v });
            mostrarToast(`Status alterado para ${o.label}.`, 'success');
            await carregarFuncionarios();
          } catch { mostrarToast('Erro ao alterar status.', 'error'); }
        };
        opts.appendChild(btn);
      });
      document.getElementById('confirmBtn').classList.add('hidden');
    }, 50);
  } else {
    // Reativar desligado
    abrirConfirm(
      '✅',
      'Reativar funcionário',
      `Deseja reativar <strong>${nome}</strong>? O status será alterado para <strong>Ativo</strong>.`,
      'neutral',
      async () => {
        try {
          await window.api.atualizarDpFuncionario(id, { status: 'ATIVO' });
          mostrarToast('Funcionário reativado.', 'success');
          await carregarFuncionarios();
        } catch { mostrarToast('Erro ao reativar.', 'error'); }
      }
    );
    document.getElementById('confirmBtn').classList.remove('hidden');
    document.getElementById('confirmBtn').className = 'btn-confirm neutral';
    document.getElementById('confirmBtn').textContent = 'Reativar';
  }
}

function copiarLink(link) {
  navigator.clipboard.writeText(link).then(() => {
    mostrarToast('Link do portal copiado!', 'success');
  }).catch(() => {
    prompt('Copie o link manualmente:', link);
  });
}

// ── Confirm overlay ───────────────────────────────────────────────────────────
function abrirConfirm(icon, titulo, desc, btnClass, cb) {
  document.getElementById('confirmIcon').textContent = icon;
  document.getElementById('confirmTitle').textContent = titulo;
  document.getElementById('confirmDesc').innerHTML = desc;

  const btn = document.getElementById('confirmBtn');
  btn.className = `btn-confirm ${btnClass || 'danger'}`;
  btn.textContent = 'Confirmar';
  btn.classList.remove('hidden');

  confirmCallback = cb;
  document.getElementById('confirmOverlay').classList.remove('hidden');
}

function fecharConfirm() {
  document.getElementById('confirmOverlay').classList.add('hidden');
  confirmCallback = null;
}

function executarConfirm() {
  fecharConfirm();
  if (confirmCallback) confirmCallback();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function mostrarToast(msg, tipo = 'info') {
  const t = document.getElementById('toast');
  t.className = `toast ${tipo}`;
  t.innerHTML = `<i class="fa ${tipo === 'success' ? 'fa-check-circle' : tipo === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function iniciaisNome(nome) {
  const parts = (nome || '').trim().split(' ');
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function badgeStatus(status) {
  const map = {
    ATIVO:     '<span class="badge badge-ativo"><i class="fa fa-circle" style="font-size:6px"></i> Ativo</span>',
    AFASTADO:  '<span class="badge badge-afastado"><i class="fa fa-pause-circle" style="font-size:8px"></i> Afastado</span>',
    FERIAS:    '<span class="badge badge-ferias"><i class="fa fa-umbrella-beach" style="font-size:8px"></i> Férias</span>',
    DESLIGADO: '<span class="badge badge-desligado"><i class="fa fa-times-circle" style="font-size:8px"></i> Desligado</span>',
  };
  return map[status] || '';
}

function jornadaLabel(f, cfg) {
  if (f.jornadaEntrada && f.cargaHorariaDia) {
    return `${f.jornadaEntrada} · ${f.cargaHorariaDia}h/dia (individual)`;
  }
  if (f.jornadaEntrada) return `${f.jornadaEntrada} (individual)`;
  if (cfg && cfg.jornadaEntrada && cfg.jornadaSaida) {
    return `${cfg.jornadaEntrada}–${cfg.jornadaSaida} (empresa)`;
  }
  if (f.cargaHoraria) return `${f.cargaHoraria}h/semana`;
  return '';
}

function escapar(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function formatarCpf(input) {
  let v = input.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  input.value = v;
}
</script>
