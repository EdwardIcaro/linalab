<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lina · Registrar Ponto</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6b3fa1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --border: #e2e8f0;
      --text:   #1e293b;
      --muted:  #64748b;
      --green:  #059669;
      --green-l:#d1fae5;
      --red:    #dc2626;
      --red-l:  #fee2e2;
      --amber:  #d97706;
      --amber-l:#fef3c7;
      --purple: #7c3aed;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
      text-align: center;
    }

    .logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(124,58,237,.35);
    }

    /* ── telas ── */
    .tela { display: none; }
    .tela.ativa { display: block; }

    /* loading */
    #tela-loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ready */
    .tipo-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 700; letter-spacing: .5px;
      text-transform: uppercase; margin-bottom: 20px;
    }
    .tipo-badge.entrada { background: var(--green-l); color: var(--green); }
    .tipo-badge.saida   { background: var(--red-l);   color: var(--red); }

    .nome { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .empresa { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .btn {
      width: 100%; padding: 16px;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-green   { background: var(--green);  color: #fff; }
    .btn-red     { background: var(--red);    color: #fff; }

    .gps-hint {
      font-size: 12px; color: var(--muted);
      margin-top: 14px; line-height: 1.5;
    }

    /* success */
    .success-icon {
      font-size: 56px; margin-bottom: 16px;
    }
    .success-hora {
      font-size: 32px; font-weight: 800; margin-bottom: 6px;
    }
    .success-label {
      font-size: 14px; color: var(--muted); margin-bottom: 24px;
    }
    .redirect-hint {
      font-size: 12px; color: var(--muted);
    }
    .progress-bar {
      height: 3px; background: var(--border);
      border-radius: 99px; margin-top: 16px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--purple);
      animation: progress 2.5s linear forwards;
    }
    @keyframes progress { from { width: 0 } to { width: 100% } }

    /* error */
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-msg  { font-size: 15px; color: var(--red); font-weight: 600; margin-bottom: 8px; }
    .error-sub  { font-size: 13px; color: var(--muted); }

    /* gps-loading */
    #tela-gps .gps-spinner {
      width: 52px; height: 52px;
      border: 4px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    #tela-gps p { font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">L</div>

  <!-- Loading inicial -->
  <div id="tela-loading" class="tela ativa">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:14px">Verificando link...</p>
  </div>

  <!-- Pronto para registrar -->
  <div id="tela-ready" class="tela">
    <div id="tipo-badge" class="tipo-badge"></div>
    <div id="nome-func" class="nome"></div>
    <div id="empresa-func" class="empresa"></div>
    <button id="btn-registrar" class="btn btn-primary">📍 Registrar Ponto</button>
    <p id="gps-hint" class="gps-hint"></p>
  </div>

  <!-- Capturando GPS -->
  <div id="tela-gps" class="tela">
    <div class="gps-spinner"></div>
    <p>Capturando sua localização...</p>
    <p style="font-size:12px;color:var(--muted);margin-top:8px">Permita o acesso ao GPS quando solicitado</p>
  </div>

  <!-- Sucesso -->
  <div id="tela-success" class="tela">
    <div id="success-icon" class="success-icon"></div>
    <div id="success-hora" class="success-hora"></div>
    <div id="success-label" class="success-label"></div>
    <div id="redirect-hint" class="redirect-hint"></div>
    <div id="progress-bar" class="progress-bar" style="display:none">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- Erro -->
  <div id="tela-erro" class="tela">
    <div class="error-icon">⚠️</div>
    <div id="error-msg" class="error-msg"></div>
    <div id="error-sub" class="error-sub"></div>
  </div>
</div>

<script>
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3001/api'
    : '/api';

  const params = new URLSearchParams(window.location.search);
  const token  = params.get('t');

  let proximoTipo = 'ENTRADA';

  function show(id) {
    document.querySelectorAll('.tela').forEach(el => el.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
  }

  function showErro(msg, sub = '') {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-sub').textContent = sub;
    show('tela-erro');
  }

  async function validar() {
    if (!token) return showErro('Link inválido.', 'Solicite um novo link digitando "ponto" no WhatsApp.');
    try {
      const res = await fetch(`${API}/p/ponto/validar?t=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (!res.ok) return showErro(data.erro || 'Link inválido ou expirado.', 'Solicite um novo link digitando "ponto" no WhatsApp.');

      proximoTipo = data.proximoTipo;

      const badge = document.getElementById('tipo-badge');
      badge.textContent = proximoTipo === 'ENTRADA' ? '🟢 Entrada' : '🔴 Saída';
      badge.className   = `tipo-badge ${proximoTipo === 'ENTRADA' ? 'entrada' : 'saida'}`;

      document.getElementById('nome-func').textContent    = data.nome;
      document.getElementById('empresa-func').textContent = data.empresaNome;

      const btn = document.getElementById('btn-registrar');
      if (proximoTipo === 'ENTRADA') {
        btn.className   = 'btn btn-green';
        btn.textContent = '📍 Registrar Entrada';
        document.getElementById('gps-hint').textContent = 'Será solicitado acesso à sua localização para validar a entrada.';
      } else {
        btn.className   = 'btn btn-red';
        btn.textContent = '🏁 Registrar Saída';
        document.getElementById('gps-hint').textContent = 'A saída não requer validação de localização.';
      }

      show('tela-ready');
    } catch {
      showErro('Erro de conexão.', 'Verifique sua internet e tente novamente.');
    }
  }

  async function registrar(lat, lng, accuracy) {
    try {
      const res = await fetch(`${API}/p/ponto/confirmar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, lat, lng, accuracy }),
      });
      const data = await res.json();
      if (!res.ok) return showErro(data.erro || 'Erro ao registrar.', 'Tente novamente.');

      const icon  = data.tipo === 'ENTRADA' ? '✅' : '👋';
      const label = data.tipo === 'ENTRADA' ? 'Entrada registrada!' : 'Saída registrada!';
      document.getElementById('success-icon').textContent = icon;
      document.getElementById('success-hora').textContent = data.horaFormatada;
      document.getElementById('success-label').textContent = label;

      if (data.redirectUrl) {
        document.getElementById('redirect-hint').textContent = 'Redirecionando para o seu painel...';
        document.getElementById('progress-bar').style.display = 'block';
        show('tela-success');
        setTimeout(() => { window.location.href = data.redirectUrl; }, 2600);
      } else {
        document.getElementById('redirect-hint').textContent = 'Pode fechar esta página.';
        show('tela-success');
      }
    } catch {
      showErro('Erro de conexão.', 'Verifique sua internet e tente novamente.');
    }
  }

  document.getElementById('btn-registrar').addEventListener('click', () => {
    if (proximoTipo === 'SAIDA') {
      show('tela-gps');
      registrar(null, null, null);
      return;
    }

    if (!navigator.geolocation) {
      return registrar(null, null, null);
    }

    show('tela-gps');
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        registrar(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
      },
      () => {
        // GPS negado → registra mesmo assim (gpsNegado = true no backend)
        registrar(null, null, null);
      },
      { timeout: 12000, maximumAge: 0, enableHighAccuracy: true }
    );
  });

  validar();
</script>
</body>
</html>
