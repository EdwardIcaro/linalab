<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lina · Ponto</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6b3fa1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --border: #e2e8f0;
      --text:   #1e293b;
      --muted:  #64748b;
      --green:  #059669;
      --green-l:#d1fae5;
      --red:    #dc2626;
      --red-l:  #fee2e2;
      --purple: #7c3aed;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
      text-align: center;
    }

    .logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
      margin: 0 auto 24px;
      box-shadow: 0 6px 20px rgba(124,58,237,.35);
    }

    .tela { display: none; }
    .tela.ativa { display: block; }

    /* spinner genérico */
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin: 0 auto 20px;
    }
    .spinner.green { border-top-color: var(--green); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tela-titulo {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 6px;
    }
    .tela-sub {
      font-size: 13px; color: var(--muted); line-height: 1.5;
    }

    /* sucesso */
    .success-icon  { font-size: 56px; margin-bottom: 16px; }
    .success-hora  { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
    .success-label { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
    .success-wpp   { font-size: 13px; color: var(--green); font-weight: 600; margin-bottom: 20px; }
    .redirect-hint { font-size: 12px; color: var(--muted); }
    .progress-bar  { height: 3px; background: var(--border); border-radius: 99px; margin-top: 16px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--purple); animation: progress 2.5s linear forwards; }
    @keyframes progress { from { width: 0 } to { width: 100% } }

    /* erro */
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-msg  { font-size: 15px; color: var(--red); font-weight: 600; margin-bottom: 8px; }
    .error-sub  { font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">L</div>

  <!-- Verificando link -->
  <div id="tela-loading" class="tela ativa">
    <div class="spinner"></div>
    <div class="tela-titulo">Verificando link...</div>
  </div>

  <!-- Capturando GPS -->
  <div id="tela-gps" class="tela">
    <div class="spinner green"></div>
    <div class="tela-titulo">Obtendo localização</div>
    <div class="tela-sub">Permita o acesso à localização quando o navegador solicitar.</div>
  </div>

  <!-- Registrando -->
  <div id="tela-registrando" class="tela">
    <div class="spinner"></div>
    <div class="tela-titulo">Registrando ponto...</div>
  </div>

  <!-- Sucesso -->
  <div id="tela-success" class="tela">
    <div id="success-icon"  class="success-icon"></div>
    <div id="success-hora"  class="success-hora"></div>
    <div id="success-label" class="success-label"></div>
    <div id="success-wpp"   class="success-wpp"></div>
    <div id="redirect-hint" class="redirect-hint"></div>
    <div id="progress-bar"  class="progress-bar" style="display:none">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- Erro -->
  <div id="tela-erro" class="tela">
    <div class="error-icon">⚠️</div>
    <div id="error-msg" class="error-msg"></div>
    <div id="error-sub" class="error-sub"></div>
  </div>
</div>

<script>
  const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3001/api'
    : '/api';

  const token = new URLSearchParams(window.location.search).get('t');

  function show(id) {
    document.querySelectorAll('.tela').forEach(el => el.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
  }

  function showErro(msg, sub) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-sub').textContent = sub || '';
    show('tela-erro');
  }

  async function registrar(lat, lng, accuracy) {
    show('tela-registrando');
    try {
      const res = await fetch(`${API}/p/ponto/confirmar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, lat, lng, accuracy }),
      });
      let data;
      try { data = await res.json(); } catch { data = {}; }

      if (!res.ok) {
        return showErro(data.erro || 'Erro ao registrar.', 'Tente solicitar um novo link pelo WhatsApp.');
      }

      const icon  = data.tipo === 'ENTRADA' ? '✅' : '👋';
      const label = data.tipo === 'ENTRADA' ? 'Entrada registrada com sucesso!' : 'Saída registrada com sucesso!';
      document.getElementById('success-icon').textContent  = icon;
      document.getElementById('success-hora').textContent  = data.horaFormatada;
      document.getElementById('success-label').textContent = label;
      document.getElementById('success-wpp').textContent   = '📱 Confirmação enviada no WhatsApp';

      if (data.redirectUrl) {
        document.getElementById('redirect-hint').textContent = 'Redirecionando para o seu painel...';
        document.getElementById('progress-bar').style.display = 'block';
        show('tela-success');
        setTimeout(() => { window.location.href = data.redirectUrl; }, 2600);
      } else {
        document.getElementById('redirect-hint').textContent = 'Pode fechar esta página.';
        show('tela-success');
      }
    } catch {
      showErro('Serviço indisponível.', 'Tente novamente em alguns minutos.');
    }
  }

  async function validar() {
    if (!token) return showErro('Link inválido.', 'Solicite um novo link digitando "ponto" no WhatsApp.');
    try {
      const res = await fetch(`${API}/p/ponto/validar?t=${encodeURIComponent(token)}`);
      let data;
      try { data = await res.json(); } catch { data = {}; }
      if (!res.ok) return showErro(data.erro || 'Link inválido ou expirado.', 'Solicite um novo link digitando "ponto" no WhatsApp.');

      const proximoTipo = data.proximoTipo;

      // SAÍDA via link (fallback) — registra sem GPS
      if (proximoTipo === 'SAIDA') {
        registrar(null, null, null);
        return;
      }

      // ENTRADA — captura GPS automaticamente
      if (!navigator.geolocation) {
        registrar(null, null, null);
        return;
      }

      show('tela-gps');
      navigator.geolocation.getCurrentPosition(
        (pos) => registrar(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
        ()    => registrar(null, null, null),
        { timeout: 15000, maximumAge: 0, enableHighAccuracy: true }
      );
    } catch {
      showErro('Serviço indisponível.', 'O sistema pode estar em manutenção. Tente novamente em alguns minutos.');
    }
  }

  validar();
</script>
</body>
</html>
