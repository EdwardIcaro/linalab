<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lina · Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="api.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:    #f1f5f9;
      --white: #ffffff;
      --border:#e2e8f0;
      --text:  #1e293b;
      --muted: #64748b;
      --faint: #94a3b8;
      --green-d:#059669; --green-l:#d1fae5;
      --amber:  #f59e0b; --amber-l:#fef3c7;
      --red:    #ef4444; --red-l:  #fee2e2;
      --blue-d: #2563eb; --blue-l: #eff6ff;
      --shadow-sm: 0 1px 4px rgba(0,0,0,.07);
      --shadow:    0 4px 16px rgba(0,0,0,.10);
    }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

    /* ── TELAS ── */
    .tela { display:none; }
    .tela.ativa { display:block; }

    /* ══════════════════════════════════════
       LOADING
    ══════════════════════════════════════ */
    #tela-loading.ativa {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh;
      background:linear-gradient(160deg,#06101f 0%,#0d2d50 55%,#0e4165 100%);
    }
    .loading-logo { width:56px; height:56px; border-radius:18px; background:var(--blue-d); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; color:#fff; box-shadow:0 8px 28px rgba(37,99,235,.5); margin-bottom:24px; }
    .loading-spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,.15); border-top-color:rgba(255,255,255,.8); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ══════════════════════════════════════
       PIN SCREENS
    ══════════════════════════════════════ */
    #tela-pin.ativa {
      display:flex; flex-direction:column; align-items:center;
      min-height:100vh;
      background:linear-gradient(160deg,#06101f 0%,#0d2d50 55%,#0e4165 100%);
      padding:44px 28px 52px;
    }
    .pin-logo { width:50px; height:50px; border-radius:16px; background:var(--blue-d); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff; box-shadow:0 8px 28px rgba(37,99,235,.5); margin-bottom:10px; }
    .pin-app  { font-size:10px; font-weight:700; color:rgba(255,255,255,.35); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:38px; }
    .pin-av   { width:68px; height:68px; border-radius:50%; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; color:#fff; margin-bottom:10px; }
    .pin-nm   { font-size:21px; font-weight:800; color:#fff; margin-bottom:3px; }
    .pin-emp  { font-size:12px; color:rgba(255,255,255,.38); margin-bottom:40px; }
    .pin-ttl  { font-size:16px; font-weight:700; color:#fff; text-align:center; margin-bottom:6px; }
    .pin-sub  { font-size:13px; color:rgba(255,255,255,.38); text-align:center; margin-bottom:30px; }
    .pin-err  { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.28); border-radius:12px; padding:10px 16px; font-size:13px; color:#fca5a5; text-align:center; margin-bottom:20px; display:flex; align-items:center; gap:8px; justify-content:center; }
    .pin-dots { display:flex; gap:18px; margin-bottom:40px; }
    .pin-dot  { width:15px; height:15px; border-radius:50%; border:2px solid rgba(255,255,255,.25); background:transparent; transition:all .15s; }
    .pin-dot.on  { background:#fff; border-color:#fff; }
    .pin-dot.err { background:#f87171; border-color:#f87171; }
    .keypad { width:100%; max-width:264px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .key { aspect-ratio:1; border-radius:50%; border:none; background:rgba(255,255,255,.07); color:#fff; font-size:21px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s,transform .1s; user-select:none; -webkit-tap-highlight-color:transparent; }
    .key:active { background:rgba(255,255,255,.2); transform:scale(.9); }
    .key.mt  { background:transparent; pointer-events:none; }
    .key.del { font-size:16px; color:rgba(255,255,255,.55); }
    .key.del:active { background:rgba(239,68,68,.15); }
    .pin-hint { margin-top:28px; font-size:11px; color:rgba(255,255,255,.25); text-align:center; }

    /* ══════════════════════════════════════
       LINK INATIVO
    ══════════════════════════════════════ */
    #tela-erro.ativa { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 28px; text-align:center; }
    .dead-ico   { width:72px; height:72px; border-radius:24px; background:var(--red-l); color:var(--red); display:flex; align-items:center; justify-content:center; font-size:32px; margin-bottom:20px; }
    .dead-title { font-size:22px; font-weight:800; margin-bottom:8px; }
    .dead-msg   { font-size:14px; color:var(--muted); line-height:1.6; max-width:280px; }

    /* ══════════════════════════════════════
       HUB
    ══════════════════════════════════════ */
    #tela-hub.ativa { display:block; min-height:100vh; }
    .hub-page { max-width:480px; margin:0 auto; padding-bottom:32px; }

    .hub-head {
      background:linear-gradient(148deg,#0f172a 0%,#163554 100%);
      padding:22px 20px 32px;
      border-radius:0 0 32px 32px;
      box-shadow:0 10px 32px rgba(15,23,42,.28);
      color:#fff;
    }
    .hub-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .hub-brand { display:flex; align-items:center; gap:7px; font-size:12px; font-weight:700; color:rgba(255,255,255,.45); letter-spacing:.3px; }
    .hub-brand i { color:#60a5fa; font-size:14px; }
    .hub-brand b { color:rgba(255,255,255,.8); }
    .hub-menu-btn { width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.08); border:none; color:rgba(255,255,255,.7); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .hub-av { width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#0d9488); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; border:2.5px solid rgba(255,255,255,.2); box-shadow:0 4px 16px rgba(0,0,0,.3); flex-shrink:0; }
    .hub-profile { display:flex; align-items:center; gap:14px; }
    .hub-name { font-size:23px; font-weight:900; line-height:1.15; }
    .hub-role { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,.1); border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; color:rgba(255,255,255,.75); margin-top:6px; }

    /* Grid 2x2 de módulos */
    .hub-grid { padding:20px 16px 0; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .mod-card {
      border-radius:22px; padding:18px 16px 16px;
      cursor:pointer; position:relative; overflow:hidden;
      border:1.5px solid transparent;
      transition:transform .18s, box-shadow .18s;
      min-height:130px; display:flex; flex-direction:column; justify-content:space-between;
      -webkit-tap-highlight-color:transparent;
    }
    .mod-card:active { transform:scale(.96); }
    .mod-blue   { background:linear-gradient(145deg,#1e40af,#2563eb,#3b82f6); box-shadow:0 8px 24px rgba(37,99,235,.35); }
    .mod-teal   { background:linear-gradient(145deg,#0f4c75,#0d9488,#14b8a6); box-shadow:0 8px 24px rgba(13,148,136,.35); }
    .mod-ghost  { background:var(--white); border-color:var(--border); box-shadow:var(--shadow-sm); cursor:default; }
    .mod-ico { font-size:26px; margin-bottom:auto; }
    .mod-blue .mod-ico, .mod-teal .mod-ico { color:rgba(255,255,255,.85); }
    .mod-ghost .mod-ico { color:var(--faint); }
    .mod-label { font-size:15px; font-weight:800; margin-bottom:2px; }
    .mod-blue .mod-label, .mod-teal .mod-label { color:#fff; }
    .mod-ghost .mod-label { color:var(--muted); font-size:14px; }
    .mod-stat  { font-size:12px; font-weight:600; }
    .mod-blue .mod-stat  { color:rgba(255,255,255,.7); }
    .mod-teal .mod-stat  { color:rgba(255,255,255,.7); }
    .mod-ghost .mod-stat { color:var(--faint); font-size:12px; }
    .mod-badge {
      position:absolute; top:12px; right:12px;
      background:rgba(255,255,255,.22); border-radius:20px;
      padding:3px 9px; font-size:10px; font-weight:800; color:#fff;
    }
    .mod-badge.pulse { animation:pulse-badge 1.8s infinite; }
    @keyframes pulse-badge { 0%,100%{ box-shadow:none; } 50%{ box-shadow:0 0 0 4px rgba(255,255,255,.18); } }

    /* Linha de status (WhatsApp) */
    .hub-rows { padding:14px 16px 0; display:flex; flex-direction:column; gap:10px; }
    .status-row { background:var(--white); border:1.5px solid var(--border); border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .15s; -webkit-tap-highlight-color:transparent; }
    .status-row:active { transform:scale(.985); }
    .status-ico { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .ico-wpp-on  { background:#dcfce7; color:#16a34a; }
    .ico-wpp-off { background:#f1f5f9; color:var(--muted); }
    .status-info { flex:1; }
    .status-title { font-size:14px; font-weight:700; }
    .status-sub   { font-size:12px; color:var(--muted); margin-top:2px; }
    .status-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
    .sb-green { background:var(--green-l); color:#065f46; }
    .sb-muted { background:#f1f5f9; color:var(--muted); }
    .status-arrow { font-size:12px; color:var(--faint); }

    /* ══════════════════════════════════════
       MODAL WHATSAPP (bottom sheet)
    ══════════════════════════════════════ */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
    .modal-bg.open { opacity:1; pointer-events:all; }
    .modal-box { background:var(--white); border-radius:24px 24px 0 0; width:100%; max-width:480px; padding:0 0 32px; transform:translateY(100%); transition:transform .3s cubic-bezier(.32,0,.32,1.1); }
    .modal-bg.open .modal-box { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; border-radius:2px; background:var(--border); margin:12px auto 0; }
    .modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
    .modal-title { font-size:16px; font-weight:800; }
    .modal-close { background:none; border:none; font-size:18px; color:var(--muted); cursor:pointer; padding:4px; }
    .modal-body  { padding:20px; }
    .wpp-code-box { background:#f8fafc; border:1.5px dashed #cbd5e1; border-radius:14px; padding:16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .wpp-code-box.expired { border-color:#fca5a5; background:#fff5f5; }
    .wpp-code { font-size:28px; font-weight:900; letter-spacing:6px; font-family:monospace; }
    .wpp-code.expired { color:var(--red); text-decoration:line-through; opacity:.5; }
    .wpp-timer { font-size:12px; font-weight:700; color:var(--amber); display:flex; align-items:center; gap:4px; }
    .btn-wpp { width:100%; padding:13px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px; }
    .bwpp-conectar { background:#16a34a; color:#fff; }
    .bwpp-gerar    { background:#1e293b; color:#fff; }
    .wpp-connected-state { background:var(--green-l); border-radius:16px; padding:18px; text-align:center; margin-bottom:16px; }
    .wpp-c-ico   { font-size:40px; color:#16a34a; margin-bottom:10px; }
    .wpp-c-title { font-size:16px; font-weight:800; color:#065f46; margin-bottom:4px; }
    .wpp-c-num   { font-size:14px; color:#047857; font-weight:600; }
    .btn-desvincular { width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--border); background:var(--white); font-family:inherit; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; }
    .wpp-instrucao { font-size:12px; color:var(--muted); text-align:center; line-height:1.5; }

    /* sair */
    .btn-sair { width:100%; max-width:480px; margin:16px auto 0; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; background:none; border:1.5px solid var(--border); border-radius:14px; font-family:inherit; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; }
  </style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div id="tela-loading" class="tela ativa">
  <div class="loading-logo">L</div>
  <div class="loading-spinner"></div>
</div>

<!-- ══ ERRO / LINK INATIVO ══ -->
<div id="tela-erro" class="tela">
  <div class="dead-ico"><i id="erro-ico" class="fas fa-ban"></i></div>
  <div class="dead-title" id="erro-titulo">Link inválido</div>
  <div class="dead-msg"   id="erro-msg">Este link não é válido ou foi desativado. Entre em contato com seu gestor.</div>
</div>

<!-- ══ PIN ══ -->
<div id="tela-pin" class="tela">
  <div class="pin-logo">L</div>
  <div class="pin-app">Lina · Portal</div>
  <div class="pin-av" id="pin-av">?</div>
  <div class="pin-nm"  id="pin-nm">—</div>
  <div class="pin-emp" id="pin-emp">—</div>
  <div class="pin-err" id="pin-err" style="display:none">
    <i class="fas fa-circle-exclamation"></i> <span id="pin-err-txt">PIN incorreto. Tente novamente.</span>
  </div>
  <div class="pin-ttl" id="pin-ttl">Digite seu PIN</div>
  <div class="pin-sub" id="pin-sub">Insira seu PIN para entrar.</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="keypad">
    <button class="key" onclick="tecla('1')">1</button>
    <button class="key" onclick="tecla('2')">2</button>
    <button class="key" onclick="tecla('3')">3</button>
    <button class="key" onclick="tecla('4')">4</button>
    <button class="key" onclick="tecla('5')">5</button>
    <button class="key" onclick="tecla('6')">6</button>
    <button class="key" onclick="tecla('7')">7</button>
    <button class="key" onclick="tecla('8')">8</button>
    <button class="key" onclick="tecla('9')">9</button>
    <button class="key mt"></button>
    <button class="key" onclick="tecla('0')">0</button>
    <button class="key del" onclick="apagar()"><i class="fas fa-delete-left"></i></button>
  </div>
  <div class="pin-hint" id="pin-hint" style="display:none">PIN esquecido? Peça ao administrador para redefinir.</div>
</div>

<!-- ══ HUB ══ -->
<div id="tela-hub" class="tela">
  <div class="hub-page">

    <div class="hub-head">
      <div class="hub-top">
        <div class="hub-brand"><i class="fas fa-droplet"></i> <b>Lina</b> Portal</div>
        <button class="hub-menu-btn" onclick="sair()"><i class="fas fa-right-from-bracket"></i></button>
      </div>
      <div class="hub-profile">
        <div class="hub-av" id="hub-av">?</div>
        <div>
          <div class="hub-name" id="hub-name">—</div>
          <div class="hub-role"><i class="fas fa-building" style="font-size:9px"></i> <span id="hub-empresa">—</span></div>
        </div>
      </div>
    </div>

    <div class="hub-grid" id="hub-grid">
      <!-- preenchido via JS -->
    </div>

    <div class="hub-rows" id="hub-rows">
      <!-- WhatsApp row — preenchida via JS -->
    </div>

    <button class="btn-sair" onclick="sair()">
      <i class="fas fa-right-from-bracket"></i> Sair do portal
    </button>

  </div>
</div>

<!-- ══ MODAL WHATSAPP ══ -->
<div class="modal-bg" id="wppModal" onclick="fecharModalWpp(event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title">WhatsApp</span>
      <button class="modal-close" onclick="fecharModalWpp()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="wppModalBody">
      <!-- preenchido via JS -->
    </div>
  </div>
</div>

<script>
// ── Estado ────────────────────────────────────────────────────────────────────
const API = '/api';
let linkToken   = '';
let sessionJwt  = '';
let lavadorInfo = null; // { nome, empresa, pinDefinido }
let portalDados = null; // resposta de /me/dados
let pinBuffer   = '';
let pinModo     = 'verify'; // 'setup' | 'setup-confirm' | 'verify'
let pinPrimeiro = '';
let wppTimer    = null;

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const path = window.location.pathname;
  const match = path.match(/\/p\/([A-Z0-9]+)/i);
  linkToken = match ? match[1] : new URLSearchParams(window.location.search).get('t') || '';

  if (!linkToken) return mostrarErro('Link inválido', 'Nenhum token encontrado na URL.', 'fa-link-slash');

  // Sessão salva?
  sessionJwt = sessionStorage.getItem(`pjwt_${linkToken}`) || '';
  if (sessionJwt) {
    const ok = await carregarDados();
    if (ok) return;
    sessionJwt = '';
    sessionStorage.removeItem(`pjwt_${linkToken}`);
  }

  // Resolve token público
  try {
    const r = await fetch(`${API}/p/${linkToken}`);
    if (!r.ok) return mostrarErro();
    lavadorInfo = await r.json();
    mostrarPin();
  } catch {
    mostrarErro('Sem conexão', 'Verifique sua internet e tente novamente.', 'fa-wifi-slash');
  }
})();

// ── Navegação de telas ────────────────────────────────────────────────────────
function mostrarTela(id) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function mostrarErro(titulo = 'Link inválido', msg = 'Este link foi desativado. Solicite um novo ao gestor.', ico = 'fa-ban') {
  document.getElementById('erro-titulo').textContent = titulo;
  document.getElementById('erro-msg').textContent    = msg;
  document.getElementById('erro-ico').className      = `fas ${ico}`;
  mostrarTela('tela-erro');
}

function mostrarPin() {
  const ini = lavadorInfo.nome.charAt(0).toUpperCase();
  document.getElementById('pin-av').textContent  = ini;
  document.getElementById('pin-nm').textContent  = lavadorInfo.nome;
  document.getElementById('pin-emp').textContent = lavadorInfo.empresa?.nome || '';

  if (!lavadorInfo.pinDefinido) {
    pinModo = 'setup';
    document.getElementById('pin-ttl').textContent = 'Crie seu PIN de acesso';
    document.getElementById('pin-sub').textContent = 'Escolha 4 dígitos para entrar no seu painel.';
    document.getElementById('pin-hint').style.display = 'none';
  } else {
    pinModo = 'verify';
    document.getElementById('pin-ttl').textContent = 'Digite seu PIN';
    document.getElementById('pin-sub').textContent = 'Insira seu PIN para entrar.';
    document.getElementById('pin-hint').style.display = '';
  }
  mostrarTela('tela-pin');
}

// ── Teclado PIN ───────────────────────────────────────────────────────────────
function tecla(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  atualizarDots();
  if (pinBuffer.length === 4) setTimeout(confirmarPin, 120);
}

function apagar() {
  pinBuffer = pinBuffer.slice(0, -1);
  atualizarDots();
  esconderErroPin();
}

function atualizarDots(erro = false) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`pd${i}`);
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' on' : '') + (erro ? ' err' : '');
  }
}

function mostrarErroPin(msg) {
  const el = document.getElementById('pin-err');
  document.getElementById('pin-err-txt').textContent = msg;
  el.style.display = 'flex';
}

function esconderErroPin() { document.getElementById('pin-err').style.display = 'none'; }

async function confirmarPin() {
  const pin = pinBuffer;
  pinBuffer = '';
  atualizarDots();

  if (pinModo === 'setup') {
    pinPrimeiro = pin;
    pinModo = 'setup-confirm';
    document.getElementById('pin-ttl').textContent = 'Confirme seu PIN';
    document.getElementById('pin-sub').textContent = 'Digite os mesmos 4 dígitos novamente.';
    return;
  }

  if (pinModo === 'setup-confirm') {
    if (pin !== pinPrimeiro) {
      atualizarDots(true);
      mostrarErroPin('Os PINs não coincidem. Tente novamente.');
      pinModo = 'setup';
      pinPrimeiro = '';
      document.getElementById('pin-ttl').textContent = 'Crie seu PIN de acesso';
      document.getElementById('pin-sub').textContent = 'Escolha 4 dígitos para entrar no seu painel.';
      setTimeout(() => { atualizarDots(); esconderErroPin(); }, 1800);
      return;
    }
    await enviarPin('setup', pin);
    return;
  }

  await enviarPin('verify', pin);
}

async function enviarPin(modo, pin) {
  try {
    const r = await fetch(`${API}/p/${linkToken}/pin/${modo}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const json = await r.json();
    if (!r.ok) {
      atualizarDots(true);
      mostrarErroPin(json.erro || 'Erro ao verificar PIN.');
      setTimeout(() => { atualizarDots(); esconderErroPin(); }, 1800);
      return;
    }
    sessionJwt = json.token;
    sessionStorage.setItem(`pjwt_${linkToken}`, sessionJwt);
    await carregarDados();
  } catch {
    mostrarErroPin('Sem conexão. Tente novamente.');
  }
}

// ── Carregar dados do hub ─────────────────────────────────────────────────────
async function carregarDados() {
  try {
    const r = await fetch(`${API}/p/me/dados`, {
      headers: { Authorization: `Bearer ${sessionJwt}` },
    });
    if (r.status === 401) return false;
    if (!r.ok) return false;
    portalDados = await r.json();
    renderHub();
    return true;
  } catch { return false; }
}

// ── Modal WhatsApp ────────────────────────────────────────────────────────────
async function abrirModalWpp() {
  // Gera código temporário de 6 chars
  const body = document.getElementById('wppModalBody');
  body.innerHTML = `<p style="text-align:center;color:var(--muted);font-size:13px">Carregando...</p>`;
  document.getElementById('wppModal').classList.add('open');

  try {
    const r = await fetch(`${API}/p/${linkToken}/wpp/codigo`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${sessionJwt}` },
    });
    if (!r.ok) throw new Error();
    const { codigo, expiraEm } = await r.json();
    renderModalWpp({ codigo, expiraEm, conectado: false, numero: null });
  } catch {
    // Fallback: formulário para digitar número diretamente
    body.innerHTML = `
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Envie <strong>"conectar CÓDIGO"</strong> para o bot do Lina WhatsApp. Primeiro gere seu código:</p>
      <button class="btn-wpp bwpp-gerar" onclick="abrirModalWpp()"><i class="fas fa-qrcode"></i> Gerar código</button>`;
  }
}

function renderModalWpp({ codigo, expiraEm, conectado, numero }) {
  const body = document.getElementById('wppModalBody');
  if (conectado) {
    body.innerHTML = `
      <div class="wpp-connected-state">
        <div class="wpp-c-ico"><i class="fab fa-whatsapp"></i></div>
        <div class="wpp-c-title">WhatsApp conectado!</div>
        <div class="wpp-c-num">${numero}</div>
      </div>
      <button class="btn-desvincular">Desvincular número</button>`;
    return;
  }

  const expirado = expiraEm && new Date(expiraEm) < new Date();
  const url = `https://wa.me/?text=${encodeURIComponent(`conectar ${codigo}`)}`;
  body.innerHTML = `
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Envie o código abaixo para o bot do Lina WhatsApp:</p>
    <div class="wpp-code-box${expirado ? ' expired' : ''}">
      <div class="wpp-code${expirado ? ' expired' : ''}">${codigo}</div>
      ${expiraEm && !expirado ? `<div class="wpp-timer" id="wppCountdown"><i class="fas fa-clock"></i> —</div>` : ''}
      ${expirado ? `<span style="font-size:11px;font-weight:700;color:var(--red)">Expirado</span>` : ''}
    </div>
    ${!expirado
      ? `<button class="btn-wpp bwpp-conectar" onclick="window.open('${url}','_blank')"><i class="fab fa-whatsapp"></i> Abrir WhatsApp</button>`
      : `<button class="btn-wpp bwpp-gerar" onclick="abrirModalWpp()"><i class="fas fa-arrows-rotate"></i> Gerar novo código</button>`}
    <p class="wpp-instrucao">O bot vai confirmar automaticamente ao receber o código.</p>`;

  if (expiraEm && !expirado) iniciarCountdown(new Date(expiraEm));
}

function iniciarCountdown(expiraEm) {
  clearInterval(wppTimer);
  wppTimer = setInterval(() => {
    const el = document.getElementById('wppCountdown');
    if (!el) { clearInterval(wppTimer); return; }
    const diff = expiraEm - new Date();
    if (diff <= 0) { clearInterval(wppTimer); abrirModalWpp(); return; }
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.innerHTML = `<i class="fas fa-clock"></i> ${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function fecharModalWpp(e) {
  if (e && e.target !== document.getElementById('wppModal')) return;
  document.getElementById('wppModal').classList.remove('open');
  clearInterval(wppTimer);
}

// ── Sair ──────────────────────────────────────────────────────────────────────
function sair() {
  if (!confirm('Deseja sair do portal?')) return;
  sessionStorage.removeItem(`pjwt_${linkToken}`);
  sessionStorage.removeItem('portal_session_token');
  sessionJwt = '';
  pinBuffer  = '';
  lavadorInfo && mostrarPin();
}
