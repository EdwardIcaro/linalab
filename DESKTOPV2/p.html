<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lina — Portal do Colaborador</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #f1f5f9;
      --white:    #ffffff;
      --border:   #e2e8f0;
      --text:     #1e293b;
      --muted:    #64748b;
      --faint:    #94a3b8;
      --primary:  #7c3aed;
      --primary-d:#5b21b6;
      --primary-l:#ede9fe;
      --green:    #059669;
      --green-l:  #d1fae5;
      --amber:    #d97706;
      --amber-l:  #fef3c7;
      --red:      #ef4444;
      --red-l:    #fee2e2;
      --teal:     #0f766e;
      --teal-l:   #ccfbf1;
      --shadow:   0 4px 16px rgba(0,0,0,.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TELAS ── */
    .tela { display: none; min-height: 100vh; }
    .tela.ativa { display: flex; flex-direction: column; }

    /* ── LOADER ── */
    #tela-loading {
      align-items: center; justify-content: center;
      background: var(--primary);
    }
    .logo-loader { text-align: center; color: #fff; }
    .logo-loader .logo-mark {
      width: 64px; height: 64px; border-radius: 18px;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 16px;
    }
    .logo-loader h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .logo-loader p  { font-size: 14px; opacity: .7; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      animation: spin .8s linear infinite;
      margin: 24px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERRO ── */
    #tela-erro {
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .erro-card {
      background: var(--white); border-radius: 20px;
      padding: 36px 28px; text-align: center; max-width: 360px; width: 100%;
      box-shadow: var(--shadow);
    }
    .erro-ico {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--red-l); color: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin: 0 auto 20px;
    }
    .erro-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .erro-card p  { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── PIN ── */
    #tela-pin {
      background: var(--primary);
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .pin-card {
      background: var(--white); border-radius: 24px;
      padding: 32px 24px; max-width: 340px; width: 100%;
      box-shadow: var(--shadow); text-align: center;
    }
    .pin-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--primary-l); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; margin: 0 auto 16px;
    }
    .pin-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .pin-card .empresa-tag {
      font-size: 12px; color: var(--muted); margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .pin-label { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

    /* Dots do PIN */
    .pin-dots {
      display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--border); transition: all .15s;
    }
    .pin-dot.filled { background: var(--primary); border-color: var(--primary); }
    .pin-dot.error  { background: var(--red); border-color: var(--red); }

    /* Teclado numérico */
    .pin-keyboard {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .pin-key {
      height: 56px; border-radius: 14px; border: none;
      background: var(--bg); font-size: 20px; font-weight: 600;
      color: var(--text); cursor: pointer; transition: background .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .pin-key:active { background: var(--primary-l); }
    .pin-key.del { font-size: 16px; color: var(--muted); }
    .pin-key.empty { visibility: hidden; }

    .pin-msg { font-size: 13px; min-height: 20px; color: var(--red); }
    .pin-link {
      font-size: 12px; color: var(--muted); margin-top: 16px;
      cursor: pointer; text-decoration: underline;
    }

    /* ── DASHBOARD ── */
    #tela-dashboard { background: var(--bg); }

    .dash-header {
      background: var(--primary);
      padding: 20px 20px 40px;
      color: #fff;
    }
    .dash-header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .dash-header-top .logo { font-size: 15px; font-weight: 700; opacity: .9; }
    .btn-sair {
      background: rgba(255,255,255,.15); border: none; border-radius: 8px;
      color: #fff; font-size: 12px; padding: 6px 12px; cursor: pointer;
    }
    .dash-nome { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
    .dash-empresa { font-size: 13px; opacity: .75; }

    /* Cards de stat */
    .stat-cards {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 0 16px;
      margin-top: -28px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--white); border-radius: 16px;
      padding: 16px; box-shadow: var(--shadow);
    }
    .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .valor { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-card .sub   { font-size: 11px; color: var(--faint); margin-top: 2px; }
    .stat-card.highlight .valor { color: var(--primary); }
    .stat-card.salario-card { grid-column: span 2; }

    /* Tag de remuneração */
    .rem-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; border-radius: 8px;
      padding: 4px 10px; margin: 0 16px 12px;
    }
    .rem-tag.comissao    { background: var(--primary-l); color: var(--primary-d); }
    .rem-tag.salario     { background: var(--teal-l);    color: var(--teal); }
    .rem-tag.misto       { background: var(--amber-l);   color: var(--amber); }

    /* Seção */
    .secao { padding: 0 16px 8px; }
    .secao-titulo {
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px;
    }

    /* Lista de ordens */
    .ordem-item {
      background: var(--white); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .ordem-ico {
      width: 40px; height: 40px; border-radius: 11px;
      background: var(--primary-l); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .ordem-ico.aguardando { background: var(--amber-l); color: var(--amber); }
    .ordem-info { flex: 1; min-width: 0; }
    .ordem-placa { font-size: 13px; font-weight: 700; }
    .ordem-cliente { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ordem-servico { font-size: 11px; color: var(--faint); margin-top: 1px; }
    .ordem-ganho { text-align: right; flex-shrink: 0; }
    .ordem-ganho .g  { font-size: 15px; font-weight: 700; color: var(--green); }
    .ordem-ganho .vt { font-size: 11px; color: var(--faint); }

    /* Empty state */
    .empty {
      text-align: center; padding: 32px 16px;
      color: var(--muted); font-size: 14px;
    }
    .empty i { font-size: 32px; color: var(--border); display: block; margin-bottom: 10px; }

    /* Nav inferior */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; font-size: 10px; color: var(--faint);
      cursor: pointer; padding: 4px 20px; border-radius: 8px;
      transition: color .15s;
    }
    .nav-item i { font-size: 20px; }
    .nav-item.ativo { color: var(--primary); }

    .dash-body { padding-bottom: 80px; }
  </style>
</head>
<body>

<!-- ── TELA: LOADING ── -->
<div id="tela-loading" class="tela ativa">
  <div class="logo-loader">
    <div class="logo-mark">🚗</div>
    <h1>Lina</h1>
    <p>Portal do Colaborador</p>
    <div class="spinner"></div>
  </div>
</div>

<!-- ── TELA: ERRO ── -->
<div id="tela-erro" class="tela">
  <div class="erro-card">
    <div class="erro-ico"><i id="erro-ico" class="fas fa-ban"></i></div>
    <h2 id="erro-titulo">Link inválido</h2>
    <p id="erro-msg">Este link não é válido ou foi desativado. Solicite um novo link ao seu gestor.</p>
  </div>
</div>

<!-- ── TELA: PIN ── -->
<div id="tela-pin" class="tela">
  <div class="pin-card">
    <div class="pin-avatar" id="pin-avatar">?</div>
    <h2 id="pin-nome">Colaborador</h2>
    <div class="empresa-tag"><i class="fas fa-building" style="font-size:11px"></i><span id="pin-empresa"></span></div>

    <p class="pin-label" id="pin-instrucao">Digite seu PIN de acesso</p>

    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="pin-keyboard">
      <button class="pin-key" onclick="pinDigit('1')">1</button>
      <button class="pin-key" onclick="pinDigit('2')">2</button>
      <button class="pin-key" onclick="pinDigit('3')">3</button>
      <button class="pin-key" onclick="pinDigit('4')">4</button>
      <button class="pin-key" onclick="pinDigit('5')">5</button>
      <button class="pin-key" onclick="pinDigit('6')">6</button>
      <button class="pin-key" onclick="pinDigit('7')">7</button>
      <button class="pin-key" onclick="pinDigit('8')">8</button>
      <button class="pin-key" onclick="pinDigit('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinDigit('0')">0</button>
      <button class="pin-key del" onclick="pinDel()"><i class="fas fa-delete-left"></i></button>
    </div>

    <div class="pin-msg" id="pin-msg"></div>
    <div class="pin-link" id="pin-esqueci" onclick="esqueceuPin()" style="display:none">Esqueci meu PIN</div>
  </div>
</div>

<!-- ── TELA: DASHBOARD ── -->
<div id="tela-dashboard" class="tela">
  <div class="dash-header">
    <div class="dash-header-top">
      <span class="logo">🚗 Lina</span>
      <button class="btn-sair" onclick="sair()"><i class="fas fa-right-from-bracket"></i> Sair</button>
    </div>
    <div class="dash-nome" id="dash-nome">—</div>
    <div class="dash-empresa" id="dash-empresa">—</div>
  </div>

  <div class="dash-body" id="dash-body">
    <!-- preenchido via JS -->
  </div>

  <nav class="bottom-nav" id="bottom-nav">
    <div class="nav-item ativo" onclick="navTo('inicio')">
      <i class="fas fa-house"></i> Início
    </div>
    <div class="nav-item" onclick="navTo('historico')" id="nav-historico">
      <i class="fas fa-clock-rotate-left"></i> Histórico
    </div>
    <!-- Ponto aparece só se Data Point ativo -->
    <div class="nav-item" onclick="navTo('ponto')" id="nav-ponto" style="display:none">
      <i class="fas fa-fingerprint"></i> Ponto
    </div>
  </nav>
</div>

<script>
// ── estado ────────────────────────────────────────────────────────────────────
const API = '/api';
let linkToken = '';      // token do path /p/:token
let sessionToken = '';   // JWT de sessão
let lavadorInfo = null;  // { nome, empresa, pinDefinido }
let portalDados = null;  // dados do GET /api/p/me/dados
let pinBuffer = '';
let pinModo = 'verify';  // 'setup' | 'verify' | 'setup-confirm'
let pinPrimeiro = '';

// ── init ──────────────────────────────────────────────────────────────────────
(async function init() {
  // Extrai token do path: /p/TOKEN ou query ?t=TOKEN (fallback)
  const path = window.location.pathname;
  const match = path.match(/\/p\/([A-Z0-9]+)/i);
  linkToken = match ? match[1] : new URLSearchParams(window.location.search).get('t') || '';

  if (!linkToken) { return mostrarErro('Link inválido', 'Nenhum token encontrado na URL.', 'fa-link-slash'); }

  // Sessão salva?
  sessionToken = sessionStorage.getItem(`portal_session_${linkToken}`) || '';
  if (sessionToken) {
    const ok = await carregarDados();
    if (ok) return;
    sessionToken = '';
    sessionStorage.removeItem(`portal_session_${linkToken}`);
  }

  // Resolve token público
  try {
    const r = await fetch(`${API}/p/${linkToken}`);
    if (!r.ok) { return mostrarErro(); }
    lavadorInfo = await r.json();
    mostrarPin();
  } catch {
    mostrarErro('Sem conexão', 'Verifique sua internet e tente novamente.', 'fa-wifi-slash');
  }
})();

// ── telas ─────────────────────────────────────────────────────────────────────
function mostrarTela(id) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function mostrarErro(titulo = 'Link inválido', msg = 'Este link não é válido ou foi desativado. Solicite um novo ao gestor.', ico = 'fa-ban') {
  document.getElementById('erro-titulo').textContent = titulo;
  document.getElementById('erro-msg').textContent = msg;
  document.getElementById('erro-ico').className = `fas ${ico}`;
  mostrarTela('tela-erro');
}

function mostrarPin() {
  const ini = lavadorInfo.nome.charAt(0).toUpperCase();
  document.getElementById('pin-avatar').textContent = ini;
  document.getElementById('pin-nome').textContent = lavadorInfo.nome;
  document.getElementById('pin-empresa').textContent = lavadorInfo.empresa.nome;

  if (!lavadorInfo.pinDefinido) {
    pinModo = 'setup';
    document.getElementById('pin-instrucao').textContent = 'Crie seu PIN de 4 dígitos';
  } else {
    pinModo = 'verify';
    document.getElementById('pin-instrucao').textContent = 'Digite seu PIN';
    document.getElementById('pin-esqueci').style.display = '';
  }
  mostrarTela('tela-pin');
}

// ── PIN ───────────────────────────────────────────────────────────────────────
function pinDigit(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  atualizarDots();
  if (pinBuffer.length === 4) setTimeout(confirmarPin, 150);
}

function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  atualizarDots();
  limparMsgPin();
}

function atualizarDots(erro = false) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`d${i}`);
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '') + (erro ? ' error' : '');
  }
}

function limparMsgPin() {
  document.getElementById('pin-msg').textContent = '';
}

function msgPin(txt) {
  document.getElementById('pin-msg').textContent = txt;
}

async function confirmarPin() {
  const pin = pinBuffer;
  pinBuffer = '';
  atualizarDots();

  if (pinModo === 'setup') {
    pinPrimeiro = pin;
    pinModo = 'setup-confirm';
    document.getElementById('pin-instrucao').textContent = 'Confirme seu PIN';
    return;
  }

  if (pinModo === 'setup-confirm') {
    if (pin !== pinPrimeiro) {
      atualizarDots(true);
      msgPin('Os PINs não coincidem. Tente novamente.');
      pinModo = 'setup';
      pinPrimeiro = '';
      document.getElementById('pin-instrucao').textContent = 'Crie seu PIN de 4 dígitos';
      setTimeout(() => { atualizarDots(); limparMsgPin(); }, 1500);
      return;
    }
    await enviarPin('setup', pin);
    return;
  }

  await enviarPin('verify', pin);
}

async function enviarPin(modo, pin) {
  try {
    const endpoint = `${API}/p/${linkToken}/pin/${modo}`;
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const json = await r.json();
    if (!r.ok) {
      atualizarDots(true);
      msgPin(json.erro || 'Erro ao verificar PIN.');
      setTimeout(() => { atualizarDots(); limparMsgPin(); }, 1500);
      return;
    }
    sessionToken = json.token;
    sessionStorage.setItem(`portal_session_${linkToken}`, sessionToken);
    await carregarDados();
  } catch {
    msgPin('Sem conexão. Tente novamente.');
  }
}

function esqueceuPin() {
  alert('Entre em contato com seu gestor para redefinir o PIN.');
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function carregarDados() {
  try {
    const r = await fetch(`${API}/p/me/dados`, {
      headers: { Authorization: `Bearer ${sessionToken}` },
    });
    if (r.status === 401) return false;
    if (!r.ok) return false;
    portalDados = await r.json();
    renderDashboard();
    return true;
  } catch {
    return false;
  }
}

function renderDashboard() {
  const { lavador, hoje, mes, dataPointAtivo } = portalDados;
  document.getElementById('dash-nome').textContent = lavador.nome;
  document.getElementById('dash-empresa').textContent = lavador.empresa;

  // Nav ponto
  if (dataPointAtivo) document.getElementById('nav-ponto').style.display = '';

  renderInicio(lavador, hoje, mes);
  mostrarTela('tela-dashboard');
}

function renderInicio(lavador, hoje, mes) {
  const tipo = lavador.tipoRemuneracao; // COMISSAO | SALARIO | SALARIO_COMISSAO
  const fmt = v => 'R$ ' + (v ?? 0).toFixed(2).replace('.', ',');

  let tagHtml = '';
  if (tipo === 'COMISSAO')
    tagHtml = `<span class="rem-tag comissao"><i class="fas fa-percent"></i> ${lavador.comissao}% de comissão</span>`;
  else if (tipo === 'SALARIO')
    tagHtml = `<span class="rem-tag salario"><i class="fas fa-wallet"></i> Salário fixo</span>`;
  else
    tagHtml = `<span class="rem-tag misto"><i class="fas fa-layer-group"></i> Salário + comissão</span>`;

  // Cards de stat conforme tipo
  let statsHtml = '';
  if (tipo === 'SALARIO') {
    statsHtml = `
      <div class="stat-card salario-card">
        <div class="label">Salário base</div>
        <div class="valor">${fmt(lavador.salario)}</div>
        <div class="sub">por mês</div>
      </div>`;
  } else if (tipo === 'COMISSAO') {
    statsHtml = `
      <div class="stat-card highlight">
        <div class="label">Ganhos hoje</div>
        <div class="valor">${fmt(hoje.ganho)}</div>
        <div class="sub">${hoje.totalOrdens} ordem${hoje.totalOrdens !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat-card">
        <div class="label">No mês</div>
        <div class="valor">${fmt(mes.ganho)}</div>
        <div class="sub">${mes.totalOrdens} finalizadas</div>
      </div>`;
  } else { // SALARIO_COMISSAO
    statsHtml = `
      <div class="stat-card">
        <div class="label">Salário base</div>
        <div class="valor">${fmt(lavador.salario)}</div>
        <div class="sub">fixo/mês</div>
      </div>
      <div class="stat-card highlight">
        <div class="label">Comissão hoje</div>
        <div class="valor">${fmt(hoje.ganho)}</div>
        <div class="sub">${hoje.totalOrdens} ordem${hoje.totalOrdens !== 1 ? 's' : ''}</div>
      </div>`;
  }

  // Lista de ordens (só para COMISSAO e SALARIO_COMISSAO)
  let ordensHtml = '';
  if (tipo !== 'SALARIO') {
    const items = hoje.ordens.length
      ? hoje.ordens.map(o => `
        <div class="ordem-item">
          <div class="ordem-ico ${o.status === 'AGUARDANDO_PAGAMENTO' ? 'aguardando' : ''}">
            <i class="fas ${o.status === 'AGUARDANDO_PAGAMENTO' ? 'fa-clock' : 'fa-check'}"></i>
          </div>
          <div class="ordem-info">
            <div class="ordem-placa">${o.placa}${o.modelo ? ' · ' + o.modelo : ''}</div>
            <div class="ordem-cliente">${o.cliente}</div>
            <div class="ordem-servico">${o.servicos || '—'}</div>
          </div>
          <div class="ordem-ganho">
            <div class="g">${'R$ ' + (o.ganho).toFixed(2).replace('.', ',')}</div>
            <div class="vt">${'R$ ' + (o.valorFinal).toFixed(2).replace('.', ',')}</div>
          </div>
        </div>`).join('')
      : `<div class="empty"><i class="fas fa-car-side"></i>Nenhuma ordem finalizada hoje</div>`;

    ordensHtml = `
      <div class="secao" style="margin-top:4px">
        <div class="secao-titulo">Ordens de hoje</div>
        ${items}
      </div>`;
  }

  document.getElementById('dash-body').innerHTML = `
    <div class="stat-cards">${statsHtml}</div>
    ${tagHtml}
    ${ordensHtml}`;
}

function navTo(secao) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativo'));
  event.currentTarget.classList.add('ativo');
  if (secao === 'inicio') renderInicio(portalDados.lavador, portalDados.hoje, portalDados.mes);
  else if (secao === 'historico') renderHistorico();
  else if (secao === 'ponto') renderPonto();
}

function renderHistorico() {
  document.getElementById('dash-body').innerHTML = `
    <div class="secao" style="margin-top:16px">
      <div class="secao-titulo">Histórico do mês</div>
      <div class="stat-card" style="margin-bottom:12px">
        <div class="label">Total do mês</div>
        <div class="valor" style="color:var(--primary)">R$ ${(portalDados.mes.ganho).toFixed(2).replace('.', ',')}</div>
        <div class="sub">${portalDados.mes.totalOrdens} ordens finalizadas</div>
      </div>
    </div>`;
}

function renderPonto() {
  document.getElementById('dash-body').innerHTML = `
    <div class="secao" style="margin-top:16px">
      <div class="secao-titulo">Controle de ponto</div>
      <div class="empty"><i class="fas fa-fingerprint"></i>Em breve — Data Point ativo</div>
    </div>`;
}

function sair() {
  if (!confirm('Deseja sair do portal?')) return;
  sessionStorage.removeItem(`portal_session_${linkToken}`);
  sessionToken = '';
  pinBuffer = '';
  mostrarPin();
}
</script>
</body>
</html>
