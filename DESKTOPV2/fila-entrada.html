<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinaX - Fila de Entrada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js" defer></script>

    <style>
        /* ===== RESET & BASE ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f3f3f3;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* ===== GRID DE COLUNAS — a única fonte de verdade para alinhamento ===== */
        /*
          Col 1: #        40px
          Col 2: Placa    130px
          Col 3: Cliente  180px
          Col 4: Tipo     100px
          Col 5: Categoria 120px
          Col 6: Serviço  1fr  (elástico)
          Col 7: Lavador  160px
          Col 8: Status   110px
          Col 9: Ação     46px
        */
        .fila-grid-row {
            display: grid;
            grid-template-columns: 40px 130px 180px 100px 120px 1fr 160px 110px 46px;
            align-items: center;
            gap: 0;
        }

        /* ===== HEADER ===== */
        .page-header {
            background: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.08);
            background: transparent;
            color: #5c5c5c;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #f3f3f3; color: #1a1a1a; }

        .page-header-title { flex: 1; }
        .page-header-title h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bolt-icon {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .page-header-title p { font-size: 13px; color: #5c5c5c; margin-top: 2px; }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        /* ===== BOTÕES ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

        .btn-primary { background: #6c63ff; color: white; }
        .btn-primary:hover { background: #5b52e8; transform: translateY(-1px); }

        .btn-secondary { background: #fff; color: #1a1a1a; border: 1px solid rgba(0,0,0,0.08); }
        .btn-secondary:hover { background: #f3f3f3; }

        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; transform: translateY(-1px); }

        .btn-remove {
            width: 30px; height: 30px;
            padding: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            background: transparent;
            color: #dc2626;
            border: 1px solid #fecaca;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }
        .btn-remove:hover { background: #fef2f2; }
        .btn-remove:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-amber {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .btn-amber:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* ===== MAIN ===== */
        .main-container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* ===== TOOLBAR ===== */
        .toolbar {
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .toolbar-label { font-size: 13px; color: #5c5c5c; font-weight: 500; white-space: nowrap; }
        .toolbar-select {
            padding: 7px 10px;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            background: #f3f3f3;
            color: #1a1a1a;
            cursor: pointer;
            outline: none;
        }
        .toolbar-select:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
        .toolbar-divider { width: 1px; height: 28px; background: rgba(0,0,0,0.08); }
        .toolbar-spacer { flex: 1; }

        /* ===== CARD DA TABELA ===== */
        .grid-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        /* ===== CABEÇALHO DAS COLUNAS ===== */
        .grid-header {
            background: #f8fafc;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        .grid-header .fila-grid-row { padding: 0; }
        .grid-col-head {
            padding: 11px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #5c5c5c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .grid-col-head.center { text-align: center; }

        /* ===== LINHA DE DADO ===== */
        .fila-row-wrap {
            border-bottom: 1px solid rgba(0,0,0,0.06);
            transition: background 0.15s;
            position: relative;
        }
        .fila-row-wrap:last-child { border-bottom: none; }
        .fila-row-wrap .fila-grid-row { padding: 8px 0; }

        /* Estado — cor de fundo + borda esquerda */
        .fila-row-wrap.state-empty    { background: #f9fafb; border-left: 3px solid #d1d5db; }
        .fila-row-wrap.state-searching{ background: #eff6ff; border-left: 3px solid #93c5fd; }
        .fila-row-wrap.state-found    { background: #f0fdf4; border-left: 3px solid #86efac; }
        .fila-row-wrap.state-manual   { background: #fffbeb; border-left: 3px solid #fde68a; }
        .fila-row-wrap.state-done     { background: #dcfce7; border-left: 3px solid #4ade80; }
        .fila-row-wrap.state-error    { background: #fef2f2; border-left: 3px solid #fca5a5; }

        /* ===== CÉLULA GENÉRICA ===== */
        .fila-cell {
            padding: 2px 10px;
        }
        .fila-cell.center { text-align: center; }

        /* ===== INPUTS / SELECTS ===== */
        .cell-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 7px;
            font-family: inherit;
            font-size: 12px;
            background: rgba(255,255,255,0.85);
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .cell-input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }
        .cell-input:disabled {
            background: rgba(0,0,0,0.04);
            color: #9ca3af;
            cursor: not-allowed;
        }
        .placa-input {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }

        /* ===== CÉLULA CLIENTE ===== */
        .cell-client-found .client-name {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cell-client-found .client-sub {
            font-size: 11px;
            color: #5c5c5c;
            margin-top: 1px;
        }
        .cell-empty-dash { color: #9ca3af; font-size: 13px; }
        .cell-searching {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #5c5c5c;
            font-size: 12px;
        }
        .cell-error { color: #dc2626; font-size: 12px; }

        /* ===== ROW NUMBER ===== */
        .row-num {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #9ca3af;
        }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; }

        .badge-empty   { background: rgba(0,0,0,0.06); color: #6b7280; }
        .badge-empty .badge-dot { background: #9ca3af; }

        .badge-searching { background: rgba(59,130,246,0.1); color: #1d4ed8; }
        .badge-searching .badge-dot { background: #3b82f6; animation: blink 1s infinite; }

        .badge-found   { background: rgba(22,163,74,0.1); color: #15803d; }
        .badge-found .badge-dot { background: #22c55e; }

        .badge-manual  { background: rgba(217,119,6,0.1); color: #b45309; }
        .badge-manual .badge-dot { background: #f59e0b; }

        .badge-done    { background: rgba(22,163,74,0.15); color: #14532d; }
        .badge-done .badge-dot { background: #16a34a; }

        .badge-error   { background: rgba(220,38,38,0.1); color: #b91c1c; }
        .badge-error .badge-dot { background: #ef4444; }

        @keyframes blink {
            0%,100% { opacity:1; } 50% { opacity:0.2; }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            padding: 60px 24px;
            text-align: center;
        }
        .empty-state-icon { font-size: 48px; opacity: 0.2; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; font-weight: 600; color: #5c5c5c; margin-bottom: 8px; }
        .empty-state p  { font-size: 14px; color: #9ca3af; }

        /* ===== LEGENDA ===== */
        .legend {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            padding: 10px 14px;
            background: #f8fafc;
            border-top: 1px solid rgba(0,0,0,0.06);
            font-size: 11px;
            color: #5c5c5c;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

        /* ===== BARRA DE PROGRESSO ===== */
        .progress-bar-container {
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.08);
            padding: 14px 18px;
            margin-bottom: 16px;
            display: none;
        }
        .progress-bar-container.visible { display: block; }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .progress-track {
            height: 8px;
            background: rgba(0,0,0,0.08);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #4ade80);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        /* ===== FOOTER ===== */
        .footer-bar {
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 50;
        }
        .footer-counter { font-size: 14px; color: #5c5c5c; }
        .footer-counter strong { color: #1a1a1a; font-weight: 700; }
        .footer-spacer { flex: 1; }

        /* ===== SPINNER ===== */
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== TOAST ===== */
        #toast-container {
            position: fixed;
            bottom: 80px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            animation: slideIn 0.3s ease;
            max-width: 320px;
        }
        .toast.success { background: #16a34a; }
        .toast.error   { background: #dc2626; }
        .toast.info    { background: #6c63ff; }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            /* esconder cliente e categoria em telas menores */
            .col-cliente, .col-categoria { display: none !important; }
            .fila-grid-row {
                grid-template-columns: 36px 110px 90px 1fr 140px 100px 36px;
            }
        }
    </style>
</head>
<body x-data="filaEntrada()" x-init="init()">

    <!-- HEADER -->
    <header class="page-header">
        <a href="ordens.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Voltar
        </a>
        <div class="page-header-title">
            <h1>
                <span class="bolt-icon"><i class="fas fa-bolt"></i></span>
                Fila de Entrada
            </h1>
            <p>Criação em massa de ordens de serviço</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" @click="addRow()" :disabled="isCreating">
                <i class="fas fa-plus"></i> Adicionar Linha
            </button>
            <button class="btn btn-amber" @click="addMultipleRows()" :disabled="isCreating">
                <i class="fas fa-list-ul"></i> +5 Linhas
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-container">

        <!-- TOOLBAR -->
        <div class="toolbar">
            <span class="toolbar-label">Aplicar a todas:</span>
            <select class="toolbar-select" x-model="globalServico" @change="applyServiceToAll()">
                <option value="">— Serviço global —</option>
                <template x-for="s in servicosAll" :key="s.id">
                    <option :value="s.id" x-text="s.nome"></option>
                </template>
            </select>
            <div class="toolbar-divider"></div>
            <button class="btn btn-secondary" @click="distribuirLavadores()" :disabled="lavadores.length === 0">
                <i class="fas fa-random"></i> Distribuir Lavadores
            </button>
            <div class="toolbar-spacer"></div>
            <span class="toolbar-label" x-text="`${rowsReady} de ${rows.length} prontas`"></span>
        </div>

        <!-- BARRA DE PROGRESSO -->
        <div class="progress-bar-container" :class="{ visible: isCreating }">
            <div class="progress-header">
                <span style="font-weight:600">Criando ordens...</span>
                <span x-text="`${progressDone} / ${progressTotal}`" style="color:#5c5c5c"></span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"
                     :style="`width:${progressTotal > 0 ? (progressDone/progressTotal*100) : 0}%`">
                </div>
            </div>
        </div>

        <!-- GRADE (substituindo <table>) -->
        <div class="grid-card">

            <!-- CABEÇALHO -->
            <div class="grid-header">
                <div class="fila-grid-row">
                    <div class="grid-col-head center">#</div>
                    <div class="grid-col-head">Placa</div>
                    <div class="grid-col-head col-cliente">Cliente / Veículo</div>
                    <div class="grid-col-head">Tipo</div>
                    <div class="grid-col-head col-categoria">Categoria</div>
                    <div class="grid-col-head">Serviço</div>
                    <div class="grid-col-head">Lavador</div>
                    <div class="grid-col-head">Status</div>
                    <div class="grid-col-head"></div>
                </div>
            </div>

            <!-- EMPTY STATE -->
            <div x-show="rows.length === 0" class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-car"></i></div>
                <h3>Nenhum veículo na fila</h3>
                <p>Clique em "Adicionar Linha" para começar</p>
            </div>

            <!-- LINHAS -->
            <div x-show="rows.length > 0">
                <template x-for="(row, idx) in rows" :key="row.id">
                    <div class="fila-row-wrap" :class="`state-${row.state}`">
                        <div class="fila-grid-row">

                            <!-- # -->
                            <div class="fila-cell center row-num" x-text="idx + 1"></div>

                            <!-- PLACA -->
                            <div class="fila-cell">
                                <input
                                    class="cell-input placa-input"
                                    type="text"
                                    maxlength="8"
                                    placeholder="ABC-1234"
                                    x-model="row.placa"
                                    :disabled="row.state === 'done' || row.state === 'searching' || isCreating"
                                    @input="onPlacaInput(row)"
                                >
                            </div>

                            <!-- CLIENTE / VEÍCULO -->
                            <div class="fila-cell col-cliente">
                                <!-- Encontrado ou feito -->
                                <div class="cell-client-found" x-show="row.state === 'found' || row.state === 'done'">
                                    <div class="client-name" x-text="row.clienteNome || '—'"></div>
                                    <div class="client-sub"  x-text="row.veiculoDesc || ''"></div>
                                </div>
                                <!-- Buscando -->
                                <div class="cell-searching" x-show="row.state === 'searching'">
                                    <span class="spinner"></span>
                                    <span>Buscando...</span>
                                </div>
                                <!-- Manual -->
                                <div x-show="row.state === 'manual'">
                                    <input
                                        class="cell-input"
                                        type="text"
                                        placeholder="Nome (opcional)"
                                        x-model="row.clienteNome"
                                        style="font-size:12px"
                                        :disabled="isCreating"
                                    >
                                </div>
                                <!-- Vazia -->
                                <span class="cell-empty-dash" x-show="row.state === 'empty'">—</span>
                                <!-- Erro -->
                                <span class="cell-error" x-show="row.state === 'error'" x-text="row.errorMsg || 'Erro'"></span>
                            </div>

                            <!-- TIPO -->
                            <div class="fila-cell">
                                <select
                                    class="cell-input"
                                    x-model="row.tipoVeiculo"
                                    :disabled="row.state === 'done' || isCreating"
                                    @change="onTipoChange(row)"
                                >
                                    <option value="CARRO">Carro</option>
                                    <option value="MOTO">Moto</option>
                                    <option value="OUTROS">Outros</option>
                                </select>
                            </div>

                            <!-- CATEGORIA -->
                            <div class="fila-cell col-categoria">
                                <select
                                    class="cell-input"
                                    x-model="row.categoriaVeiculo"
                                    x-show="row.tipoVeiculo === 'CARRO'"
                                    :disabled="row.state === 'done' || isCreating"
                                    @change="onCategoriaChange(row)"
                                >
                                    <option value="HATCH">Hatch</option>
                                    <option value="SEDAN">Sedan</option>
                                    <option value="SUV">SUV</option>
                                    <option value="PICKUP">Pickup</option>
                                    <option value="CAMINHONETE">Caminhonete</option>
                                    <option value="VAN">Van</option>
                                    <option value="MICROONIBUS">Micro-ônibus</option>
                                    <option value="CAMINHAO">Caminhão</option>
                                </select>
                                <span style="color:#9ca3af;font-size:13px" x-show="row.tipoVeiculo !== 'CARRO'">—</span>
                            </div>

                            <!-- SERVIÇO -->
                            <div class="fila-cell">
                                <select
                                    class="cell-input"
                                    x-model="row.servicoId"
                                    :disabled="row.state === 'done' || isCreating"
                                    @change="() => {}"
                                >
                                    <option value="">— Selecione —</option>
                                    <template x-for="s in getServicosForRow(row)" :key="s.id">
                                        <option :value="s.id" x-text="s.nome + (s.preco ? ` — R$${Number(s.preco).toFixed(2)}` : '')"></option>
                                    </template>
                                </select>
                            </div>

                            <!-- LAVADOR -->
                            <div class="fila-cell">
                                <select
                                    class="cell-input"
                                    x-model="row.lavadorId"
                                    :disabled="row.state === 'done' || isCreating"
                                >
                                    <option value="">— Nenhum —</option>
                                    <template x-for="l in lavadores" :key="l.id">
                                        <option :value="l.id" x-text="l.nome"></option>
                                    </template>
                                </select>
                            </div>

                            <!-- STATUS -->
                            <div class="fila-cell">
                                <span class="status-badge" :class="`badge-${row.state}`">
                                    <span class="badge-dot"></span>
                                    <span x-text="stateLabel(row.state)"></span>
                                </span>
                            </div>

                            <!-- AÇÃO -->
                            <div class="fila-cell center">
                                <button
                                    class="btn-remove"
                                    @click="removeRow(idx)"
                                    :disabled="isCreating"
                                    title="Remover linha"
                                >
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>

                        </div>
                    </div>
                </template>
            </div>

            <!-- LEGENDA -->
            <div class="legend" x-show="rows.length > 0">
                <span class="legend-item"><span class="legend-dot" style="background:#9ca3af"></span> Vazia</span>
                <span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Encontrado</span>
                <span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Manual</span>
                <span class="legend-item"><span class="legend-dot" style="background:#16a34a"></span> Criado</span>
                <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Erro</span>
            </div>

        </div><!-- /grid-card -->

    </div><!-- /main-container -->

    <!-- FOOTER FIXO -->
    <div class="footer-bar" x-show="rows.length > 0">
        <div class="footer-counter">
            <strong x-text="rowsReady"></strong> prontas
            <span x-show="rowsDone > 0"> · <strong x-text="rowsDone"></strong> criadas</span>
            <span x-show="rowsError > 0" style="color:#dc2626"> · <strong x-text="rowsError"></strong> com erro</span>
        </div>
        <div class="footer-spacer"></div>
        <button class="btn btn-secondary" @click="clearCompleted()" x-show="rowsDone > 0" :disabled="isCreating">
            <i class="fas fa-broom"></i> Limpar Criadas
        </button>
        <button class="btn btn-success" @click="criarOrdens()" :disabled="rowsReady === 0 || isCreating">
            <span x-show="!isCreating">
                <i class="fas fa-check-circle"></i>
                Criar <span x-text="rowsReady"></span> Ordens
            </span>
            <span x-show="isCreating" style="display:flex;align-items:center;gap:8px">
                <span class="spinner" style="border-top-color:white;border-color:rgba(255,255,255,0.3)"></span>
                Criando...
            </span>
        </button>
    </div>

    <!-- TOAST -->
    <div id="toast-container"></div>

    <script src="api.js"></script>
    <script>
        // ============================================================
        // UTILITÁRIOS
        // ============================================================
        function showToast(msg, type = 'info', duration = 3500) {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), duration);
        }

        function debounce(fn, delay) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

        let _rowId = 0;
        function makeRow() {
            return {
                id: ++_rowId,
                placa: '',
                state: 'empty',
                veiculoId: null,
                clienteId: null,
                clienteNome: '',
                veiculoDesc: '',
                tipoVeiculo: 'CARRO',
                categoriaVeiculo: 'HATCH',
                servicoId: '',
                lavadorId: '',
                ordemId: null,
                errorMsg: '',
            };
        }

        // ============================================================
        // ALPINE COMPONENT
        // ============================================================
        function filaEntrada() {
            return {
                rows: [],
                lavadores: [],
                servicos: [],
                servicosAll: [],
                globalServico: '',
                isCreating: false,
                progressDone: 0,
                progressTotal: 0,
                _placaSearch: null,

                get rowsReady() {
                    return this.rows.filter(r =>
                        (r.state === 'found' || r.state === 'manual') && r.servicoId
                    ).length;
                },
                get rowsDone()  { return this.rows.filter(r => r.state === 'done').length; },
                get rowsError() { return this.rows.filter(r => r.state === 'error').length; },

                async init() {
                    if (!localStorage.getItem('token')) {
                        window.location.href = 'login.html';
                        return;
                    }
                    try {
                        const [lavs, servs] = await Promise.all([
                            window.api.getLavadoresSimple(),
                            window.api.getServicos({ limit: 500, ativo: 'true' })
                        ]);
                        this.lavadores  = lavs?.lavadores  || (Array.isArray(lavs)  ? lavs  : []);
                        this.servicos   = servs?.servicos  || (Array.isArray(servs) ? servs : []);
                        this.servicosAll = this.servicos;
                    } catch (e) {
                        console.error('Erro ao carregar dados:', e);
                        showToast('Erro ao carregar lavadores/serviços', 'error');
                    }
                    this.addMultipleRows(3);
                    this._placaSearch = debounce(row => this._buscarPlaca(row), 600);
                },

                addRow() {
                    this.rows.push(makeRow());
                    this.$nextTick(() => {
                        const inputs = document.querySelectorAll('.placa-input');
                        inputs[inputs.length - 1]?.focus();
                    });
                },
                addMultipleRows(n = 5) {
                    for (let i = 0; i < n; i++) this.rows.push(makeRow());
                },
                removeRow(idx)    { this.rows.splice(idx, 1); },
                clearCompleted()  { this.rows = this.rows.filter(r => r.state !== 'done'); },

                onPlacaInput(row) {
                    const raw = row.placa.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                    row.placa = raw.length > 3 ? raw.slice(0,3) + '-' + raw.slice(3,7) : raw;
                    const placa = raw.replace(/-/g, '');
                    if (placa.length < 7) {
                        if (row.state !== 'empty') {
                            Object.assign(row, { state:'empty', veiculoId:null, clienteId:null, clienteNome:'', veiculoDesc:'' });
                        }
                        return;
                    }
                    row.state = 'searching';
                    this._placaSearch(row);
                },

                async _buscarPlaca(row) {
                    const placa = row.placa.replace(/-/g,'').toUpperCase();
                    if (placa.length < 7) return;
                    try {
                        const data = await window.api.getVeiculoByPlaca(placa);
                        if (data?.id) {
                            Object.assign(row, {
                                state: 'found',
                                veiculoId: data.id,
                                clienteId: data.clienteId || null,
                                clienteNome: data.cliente?.nome || '—',
                                veiculoDesc: `${data.modelo || ''} ${data.cor ? '· '+data.cor : ''}`.trim() || placa,
                                tipoVeiculo: data.tipo || row.tipoVeiculo,
                                categoriaVeiculo: data.categoria || row.categoriaVeiculo,
                            });
                            if (this.globalServico && !row.servicoId) row.servicoId = this.globalServico;
                        } else {
                            Object.assign(row, { state:'manual', veiculoId:null, clienteId:null, clienteNome:'', veiculoDesc:'' });
                        }
                    } catch {
                        Object.assign(row, { state:'manual', veiculoId:null, clienteId:null, clienteNome:'', veiculoDesc:'' });
                    }
                },

                onTipoChange(row) {
                    row.categoriaVeiculo = row.tipoVeiculo === 'CARRO' ? 'HATCH' : '';
                    row.servicoId = '';
                },
                onCategoriaChange(row) { row.servicoId = ''; },

                getServicosForRow(row) {
                    return this.servicos.filter(s => {
                        const tvs = s.tiposVeiculo;
                        if (!tvs || tvs.length === 0) return true;
                        const tipoMatch = tvs.filter(tv => tv.nome === row.tipoVeiculo);
                        if (tipoMatch.length === 0) return false;
                        if (row.tipoVeiculo === 'CARRO' && row.categoriaVeiculo) {
                            const comCat = tipoMatch.filter(tv => tv.categoria);
                            if (comCat.length > 0) return comCat.some(tv => tv.categoria === row.categoriaVeiculo);
                        }
                        return true;
                    });
                },

                applyServiceToAll() {
                    if (!this.globalServico) return;
                    this.rows.forEach(r => { if (r.state !== 'done') r.servicoId = this.globalServico; });
                    showToast('Serviço aplicado a todas as linhas', 'info');
                },

                distribuirLavadores() {
                    const lavs = Array.isArray(this.lavadores) ? this.lavadores : [];
                    if (lavs.length === 0) { showToast('Nenhum lavador disponível', 'error'); return; }
                    let i = 0;
                    this.rows.forEach(row => {
                        if (row.state !== 'done') {
                            const lav = lavs[i % lavs.length];
                            if (lav?.id) row.lavadorId = lav.id;
                            i++;
                        }
                    });
                    showToast('Lavadores distribuídos uniformemente', 'info');
                },

                stateLabel(state) {
                    return { empty:'Vazia', searching:'Buscando', found:'Encontrado',
                             manual:'Manual', done:'Criado ✓', error:'Erro ✗' }[state] || state;
                },

                async criarOrdens() {
                    const prontas = this.rows.filter(r =>
                        (r.state === 'found' || r.state === 'manual') && r.servicoId
                    );
                    if (prontas.length === 0) { showToast('Nenhuma linha pronta', 'error'); return; }

                    this.isCreating = true;
                    this.progressDone = 0;
                    this.progressTotal = prontas.length;
                    let criadas = 0, erros = 0;

                    for (const row of prontas) {
                        try {
                            const result = await window.api.createOrdem(this._buildPayload(row));
                            row.state = 'done';
                            row.ordemId = result?.id || null;
                            criadas++;
                        } catch (e) {
                            row.state = 'error';
                            row.errorMsg = e?.message || 'Falha ao criar';
                            erros++;
                        }
                        this.progressDone++;
                    }
                    this.isCreating = false;

                    if (criadas > 0 && erros === 0)      showToast(`${criadas} ordem(ns) criada(s)!`, 'success');
                    else if (criadas > 0 && erros > 0)   showToast(`${criadas} criadas, ${erros} com erro`, 'info');
                    else                                  showToast(`Erro ao criar ordens (${erros} falhas)`, 'error');
                },

                _buildPayload(row) {
                    const placa = row.placa.replace(/-/g,'').toUpperCase();
                    const payload = {
                        itens: [{ tipo:'SERVICO', itemId: row.servicoId, quantidade: 1 }],
                        lavadorId: row.lavadorId || undefined,
                        forcarCriacao: true,
                    };
                    if (row.veiculoId && row.clienteId) {
                        payload.veiculoId  = row.veiculoId;
                        payload.clienteId  = row.clienteId;
                    } else if (row.veiculoId) {
                        payload.veiculoId  = row.veiculoId;
                        payload.novoCliente = { nome: `Avulso ${placa}` };
                    } else {
                        payload.novoCliente = { nome: row.clienteNome?.trim() || `Avulso ${placa}` };
                        payload.novoVeiculo = { placa, modelo: 'Veículo' };
                    }
                    return payload;
                },
            };
        }
    </script>
</body>
</html>
