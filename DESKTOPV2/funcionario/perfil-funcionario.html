<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meu Perfil — Lina X</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --navy:   #0f172a;
      --navy-m: #1e293b;
      --blue-d: #2563eb;
      --blue:   #3b82f6;
      --green:  #059669;
      --green-l:#d1fae5;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --orange: #f97316;
      --purple: #8b5cf6;
      --bg:     #f1f5f9;
      --white:  #ffffff;
      --border: #e2e8f0;
      --text:   #0f172a;
      --muted:  #64748b;
      --light:  #94a3b8;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    .hdr {
      background: var(--navy);
      position: sticky; top: 0; z-index: 40;
      flex-shrink: 0;
    }
    .hdr-top {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .hdr-logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; text-decoration: none;
      transition: background .18s;
    }
    .hdr-logo:hover { background: rgba(255,255,255,.2); }
    .hdr-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .hdr-sub   { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
    .hdr-right { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.7);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer; text-decoration: none;
      transition: background .18s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.18); }

    /* ── MENU DROPDOWN ── */
    .menu-dropdown {
      display: none; position: fixed;
      top: 58px; right: 12px;
      background: var(--white); border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      min-width: 190px; z-index: 500;
      overflow: hidden;
    }
    .menu-dropdown.active { display: block; }
    .menu-dropdown a, .menu-dropdown button {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px; text-decoration: none;
      color: var(--text); font-size: 13px; font-weight: 500;
      border: none; background: none; width: 100%; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .15s;
    }
    .menu-dropdown a:hover, .menu-dropdown button:hover { background: var(--bg); }
    .menu-dropdown button:last-child { color: var(--red); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 499; }
    .overlay.active { display: block; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 14px 14px 100px; }

    /* User card */
    .user-card {
      background: var(--navy);
      border-radius: 14px;
      padding: 20px 18px;
      margin-bottom: 14px;
      color: #fff;
      display: flex; align-items: center; gap: 14px;
    }
    .user-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; flex-shrink: 0;
    }
    .user-name  { font-size: 16px; font-weight: 800; }
    .user-empresa { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }

    /* Generic card */
    .perfil-card {
      background: var(--white);
      border-radius: 14px;
      padding: 16px 16px 14px;
      margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .perfil-card h3 {
      font-size: 14px; font-weight: 800; margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .perfil-card h3 i.fa-whatsapp { color: #16a34a; }
    .perfil-sub {
      font-size: 12px; color: var(--muted);
      margin-bottom: 14px; line-height: 1.5;
    }

    /* ── MODAL WHATSAPP (bottom sheet) ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
    .modal-bg.open { opacity:1; pointer-events:all; }
    .modal-box { background:var(--white); border-radius:24px 24px 0 0; width:100%; max-width:480px; padding:0 0 32px; transform:translateY(100%); transition:transform .3s cubic-bezier(.32,0,.32,1.1); }
    .modal-bg.open .modal-box { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; border-radius:2px; background:var(--border); margin:12px auto 0; }
    .modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
    .modal-title { font-size:16px; font-weight:800; }
    .modal-close { background:none; border:none; font-size:18px; color:var(--muted); cursor:pointer; padding:4px; }
    .modal-body  { padding:20px; }
    .wpp-code-box { background:#f8fafc; border:1.5px dashed #cbd5e1; border-radius:14px; padding:16px; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .wpp-code-box.expired { border-color:#fca5a5; background:#fff5f5; }
    .wpp-code { font-size:28px; font-weight:900; letter-spacing:6px; font-family:monospace; }
    .wpp-code.expired { color:var(--red); text-decoration:line-through; opacity:.5; }
    .wpp-timer { font-size:12px; font-weight:700; color:var(--amber); display:flex; align-items:center; gap:4px; }
    .btn-wpp { width:100%; padding:13px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px; }
    .bwpp-conectar { background:#16a34a; color:#fff; }
    .bwpp-gerar    { background:#1e293b; color:#fff; }
    .wpp-connected-state { background:var(--green-l); border-radius:16px; padding:18px; text-align:center; margin-bottom:16px; }
    .wpp-c-ico   { font-size:40px; color:#16a34a; margin-bottom:10px; }
    .wpp-c-title { font-size:16px; font-weight:800; color:#065f46; margin-bottom:4px; }
    .wpp-c-num   { font-size:14px; color:#047857; font-weight:600; }
    .btn-desvincular { width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--border); background:var(--white); font-family:inherit; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer; }
    .wpp-instrucao { font-size:12px; color:var(--muted); text-align:center; line-height:1.5; }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 14px; right: 14px;
      background: var(--navy); color: #fff;
      padding: 13px 16px; border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600;
      transform: translateY(120px); opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      z-index: 2000; max-width: 420px; margin: 0 auto;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #064e3b; }
    .toast.error   { background: #7f1d1d; }

    /* ── MOBILE NAV (gerado por utils-funcionario.js) ── */
    .mobile-bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      height: 64px; z-index: 200;
      box-shadow: 0 -2px 12px rgba(0,0,0,.07);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: var(--light);
      font-size: 10px; font-weight: 600; gap: 4px;
      border: none; background: none; cursor: pointer;
      border-top: 3px solid transparent;
      font-family: 'Inter', sans-serif;
      transition: color .18s;
    }
    .nav-item i { font-size: 20px; }
    .nav-item:hover { color: var(--blue-d); }
    .nav-item.active { color: var(--blue-d); border-top-color: var(--blue-d); }

    @media (min-width: 600px) {
      .main { padding: 18px 20px 100px; max-width: 640px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-top">
      <div class="hdr-left">
        <a href="../index-funcionario.html" class="hdr-logo">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div>
          <div class="hdr-title">Meu Perfil</div>
          <div class="hdr-sub" id="empresaNome">Carregando...</div>
        </div>
      </div>
      <div class="hdr-right">
        <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        <button class="icon-btn" onclick="toggleMenu()"><i class="fas fa-ellipsis-v"></i></button>
      </div>
    </div>
  </header>

  <!-- MENU -->
  <div class="menu-dropdown" id="menuDropdown">
    <a href="../index-funcionario.html"><i class="fas fa-home"></i> Início</a>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
  </div>
  <div class="overlay" id="overlay" onclick="closeMenu()"></div>

  <!-- MAIN -->
  <main class="main">
    <!-- User card -->
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div>
        <div class="user-name" id="userNome">Carregando...</div>
        <div class="user-empresa" id="userEmpresa">—</div>
      </div>
    </div>

    <!-- WhatsApp card -->
    <div class="perfil-card">
      <h3><i class="fab fa-whatsapp"></i> WhatsApp</h3>
      <p class="perfil-sub">Conecte seu WhatsApp à Lina para receber notificações e fazer consultas direto pelo chat, de acordo com suas permissões.</p>
      <div id="wppCardBody">
        <button class="btn-wpp bwpp-conectar" onclick="abrirModalWpp()">
          <i class="fab fa-whatsapp"></i> Conectar com a Lina no WhatsApp
        </button>
      </div>
    </div>
  </main>

  <!-- MOBILE NAV -->
  <nav id="mobileNav"></nav>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <i id="toastIco" class="fas fa-check-circle"></i>
    <span id="toastMsg"></span>
  </div>

  <!-- ══ MODAL WHATSAPP ══ -->
  <div class="modal-bg" id="wppModal" onclick="fecharModalWpp(event)">
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div class="modal-hdr">
        <span class="modal-title">WhatsApp</span>
        <button class="modal-close" onclick="fecharModalWpp()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="wppModalBody">
        <!-- preenchido via JS -->
      </div>
    </div>
  </div>

  <script src="../api.js"></script>
  <script src="utils-funcionario.js"></script>
  <script>
    const PAGE_TITLE  = 'Meu Perfil';
    const PAGE_ACTIVE = 'perfil';

    let wppTimer = null;

    // ── INIT ──
    document.addEventListener('DOMContentLoaded', async () => {
      if (!validateFuncionarioAccess()) return;

      document.getElementById('mobileNav').innerHTML = createMobileNav(PAGE_ACTIVE);
      await loadUserInfo();
      renderUserCard();
      await checarStatusWpp();
    });

    function renderUserCard() {
      const nome = localStorage.getItem('usuarioNome') || 'Usuário';
      const empresaNome = localStorage.getItem('empresaNome') || 'Minha Empresa';
      document.getElementById('userNome').textContent = nome;
      document.getElementById('userEmpresa').textContent = empresaNome;
      document.getElementById('userAvatar').textContent = nome.charAt(0).toUpperCase();
    }

    // ── WHATSAPP ──
    async function checarStatusWpp() {
      try {
        const status = await fetchApi('/whatsapp/me/wpp/status');
        if (status.conectado) renderWppCardConectado(status.telefone);
      } catch (e) {
        // mantém botão de conectar
      }
    }

    function renderWppCardConectado(telefone) {
      document.getElementById('wppCardBody').innerHTML = `
        <div class="wpp-connected-state" style="margin-bottom:0">
          <div class="wpp-c-ico"><i class="fab fa-whatsapp"></i></div>
          <div class="wpp-c-title">WhatsApp conectado!</div>
          <div class="wpp-c-num">${formatPhone(telefone)}</div>
        </div>`;
    }

    async function abrirModalWpp() {
      const body = document.getElementById('wppModalBody');
      body.innerHTML = `<p style="text-align:center;color:var(--muted);font-size:13px">Carregando...</p>`;
      document.getElementById('wppModal').classList.add('open');

      try {
        const status = await fetchApi('/whatsapp/me/wpp/status');
        if (status.conectado) {
          renderModalWpp({ conectado: true, numero: formatPhone(status.telefone) });
          return;
        }

        const { code, expiresInSeconds, botNumero } = await fetchApi('/whatsapp/me/wpp/pin', { method: 'POST' });
        const expiraEm = Date.now() + expiresInSeconds * 1000;
        renderModalWpp({ codigo: code, expiraEm, botNumero, conectado: false, numero: null });
      } catch {
        body.innerHTML = `
          <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Não foi possível gerar o código. Tente novamente.</p>
          <button class="btn-wpp bwpp-gerar" onclick="abrirModalWpp()"><i class="fas fa-rotate-right"></i> Tentar novamente</button>`;
      }
    }

    function renderModalWpp({ codigo, expiraEm, botNumero, conectado, numero }) {
      const body = document.getElementById('wppModalBody');
      if (conectado) {
        body.innerHTML = `
          <div class="wpp-connected-state">
            <div class="wpp-c-ico"><i class="fab fa-whatsapp"></i></div>
            <div class="wpp-c-title">WhatsApp conectado!</div>
            <div class="wpp-c-num">${numero}</div>
          </div>
          <p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px;line-height:1.5">
            Você receberá notificações e pode fazer consultas pelo WhatsApp conforme suas permissões.
          </p>
          <button class="btn-desvincular" onclick="desvincularWpp()">Desvincular número</button>`;
        return;
      }

      const expirado = expiraEm && expiraEm < Date.now();
      const url = botNumero ? `https://wa.me/55${botNumero}?text=${codigo}` : `https://wa.me/?text=${codigo}`;

      body.innerHTML = `
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5">
          Toque em <strong>"Abrir WhatsApp"</strong> — a mensagem já vem preenchida, só apertar enviar.
        </p>
        <div class="wpp-code-box${expirado ? ' expired' : ''}">
          <div class="wpp-code${expirado ? ' expired' : ''}">${codigo}</div>
          ${expiraEm && !expirado
            ? `<div class="wpp-timer" id="wppCountdown"><i class="fas fa-clock"></i> —</div>`
            : expirado
            ? `<span style="font-size:11px;font-weight:700;color:var(--red)">Expirado</span>`
            : ''}
        </div>
        ${!expirado
          ? `<button class="btn-wpp bwpp-conectar" onclick="window.open('${url}','_blank')">
               <i class="fab fa-whatsapp"></i> Abrir WhatsApp
             </button>`
          : `<button class="btn-wpp bwpp-gerar" onclick="abrirModalWpp()">
               <i class="fas fa-rotate-right"></i> Gerar novo código
             </button>`}
        <p class="wpp-instrucao">Código válido por 5 minutos. O bot confirma automaticamente.</p>`;

      if (expiraEm && !expirado) iniciarCountdown(expiraEm);
    }

    async function desvincularWpp() {
      if (!confirm('Deseja desvincular seu número do WhatsApp?')) return;
      try {
        await fetchApi('/whatsapp/me/wpp/desvincular', { method: 'POST' });
        fecharModalWpp();
        document.getElementById('wppCardBody').innerHTML = `
          <button class="btn-wpp bwpp-conectar" onclick="abrirModalWpp()">
            <i class="fab fa-whatsapp"></i> Conectar com a Lina no WhatsApp
          </button>`;
        showToast('WhatsApp desvinculado');
      } catch {
        showToast('Erro ao desvincular. Tente novamente.', 'error');
      }
    }

    function iniciarCountdown(expiraEm) {
      clearInterval(wppTimer);
      wppTimer = setInterval(() => {
        const el = document.getElementById('wppCountdown');
        if (!el) { clearInterval(wppTimer); return; }
        const diff = expiraEm - Date.now();
        if (diff <= 0) { clearInterval(wppTimer); abrirModalWpp(); return; }
        const m = Math.floor(diff / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.innerHTML = `<i class="fas fa-clock"></i> ${m}:${String(s).padStart(2,'0')}`;
      }, 1000);
    }

    function fecharModalWpp(e) {
      if (e && e.target !== document.getElementById('wppModal')) return;
      document.getElementById('wppModal').classList.remove('open');
      clearInterval(wppTimer);
    }

    // ── HELPERS ──
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      const i = document.getElementById('toastIco');
      document.getElementById('toastMsg').textContent = msg;
      t.className = `toast ${type}`;
      i.className = `fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function toggleMenu() {
      document.getElementById('menuDropdown').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeMenu() {
      document.getElementById('menuDropdown').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    }
  </script>
</body>
</html>
