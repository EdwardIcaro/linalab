<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Serviços — Lina X</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0f172a;
      --navy-m: #1e293b;
      --blue:   #3b82f6;
      --blue-d: #2563eb;
      --text:   #0f172a;
      --mid:    #64748b;
      --light:  #94a3b8;
      --border: #e2e8f0;
      --bg:     #f1f5f9;
      --white:  #ffffff;
      --green:  #10b981;
      --green-d:#059669;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --r:      12px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .hd {
      background: var(--navy);
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .hd-left { display: flex; align-items: center; gap: 12px; }
    .hd-back {
      background: none; border: none; color: #fff;
      font-size: 18px; cursor: pointer; padding: 6px;
      border-radius: 8px; transition: background .15s;
    }
    .hd-back:hover { background: rgba(255,255,255,.1); }
    .hd-title { font-size: 16px; font-weight: 700; color: #fff; }
    .hd-count { font-size: 11px; color: rgba(255,255,255,.5); }
    .hd-btn {
      background: var(--blue-d); border: none; color: #fff;
      padding: 8px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background .15s;
    }
    .hd-btn:hover { background: var(--blue); }

    /* ── TABS ── */
    .tabs-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      position: sticky; top: 56px; z-index: 90;
    }
    .tab-btn {
      flex: 1; padding: 13px 0;
      border: none; background: none;
      font-size: 13px; font-weight: 600; color: var(--mid);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .tab-btn.active { color: var(--blue-d); border-bottom-color: var(--blue-d); }
    .tab-count {
      background: var(--bg); border-radius: 99px;
      padding: 1px 7px; font-size: 11px; font-weight: 700; color: var(--mid);
    }
    .tab-btn.active .tab-count { background: #dbeafe; color: var(--blue-d); }

    /* ── LISTA ── */
    .list-body { padding: 12px 16px 100px; }

    .list-section-title {
      font-size: 10px; font-weight: 700; color: var(--light);
      text-transform: uppercase; letter-spacing: .6px;
      padding: 0 4px; margin-bottom: 8px;
    }

    .item-list { display: flex; flex-direction: column; gap: 8px; }

    .item-row {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color .15s, box-shadow .15s;
    }
    .item-row:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(37,99,235,.07); }
    .item-row:active { transform: scale(.99); }

    .item-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .item-icon.servico { background: #dbeafe; color: var(--blue-d); }
    .item-icon.adicional { background: #fef3c7; color: #92400e; }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-meta { font-size: 11px; color: var(--mid); margin-top: 3px; display: flex; gap: 6px; flex-wrap: wrap; }

    .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .item-price { font-size: 15px; font-weight: 800; color: var(--green-d); }
    .item-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
    }
    .badge-carro { background: #dbeafe; color: var(--blue-d); }
    .badge-moto  { background: #fce7f3; color: #9d174d; }
    .badge-outros{ background: #f0fdf4; color: #065f46; }
    .badge-comissao { background: #f0fdf4; color: #065f46; }

    /* ── ESTADOS ── */
    .state-box {
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 60px 20px; gap: 12px;
    }
    .state-icon { font-size: 48px; color: var(--border); }
    .state-title { font-size: 16px; font-weight: 700; }
    .state-sub { font-size: 13px; color: var(--mid); }
    .btn-state {
      padding: 10px 20px; background: var(--blue-d); color: #fff;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }

    .spin {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--blue-d);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DRAWER ── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-radius: 20px 20px 0 0;
      z-index: 201; max-height: 92vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 99px; margin: 12px auto 0; flex-shrink: 0;
    }
    .drawer-header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-title { font-size: 16px; font-weight: 700; }
    .drawer-close {
      background: none; border: none;
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--mid); cursor: pointer; transition: background .15s;
    }
    .drawer-close:hover { background: var(--bg); }
    .drawer-body { padding: 20px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; flex-shrink: 0;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--mid); margin-bottom: 5px;
    }
    .form-input, .form-select {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--white); transition: border-color .15s;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--blue-d); }
    .form-hint { font-size: 11px; color: var(--light); margin-top: 4px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Checkboxes de categoria */
    .cat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px; margin-top: 4px;
    }
    .cat-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; border-radius: 8px;
      border: 1.5px solid var(--border); cursor: pointer;
      font-size: 12px; font-weight: 600; color: var(--mid);
      transition: all .15s; user-select: none;
    }
    .cat-chip input[type="checkbox"] { display: none; }
    .cat-chip.checked { background: #dbeafe; border-color: var(--blue-d); color: var(--blue-d); }
    .cat-chip i { font-size: 11px; }

    /* Botões footer */
    .btn-f {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s;
      font-family: inherit;
    }
    .btn-f-cancel { background: var(--bg); color: var(--mid); }
    .btn-f-cancel:hover { background: var(--border); }
    .btn-f-save { background: var(--blue-d); color: #fff; }
    .btn-f-save:hover { background: var(--blue); }
    .btn-f-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-f-danger { background: #fef2f2; color: var(--red); border: 1.5px solid #fecaca; flex: none; padding: 12px 16px; }
    .btn-f-danger:hover { background: #fee2e2; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; z-index: 100; height: 64px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: var(--light);
      font-size: 10px; font-weight: 600; gap: 3px;
      border: none; background: none; cursor: pointer;
      border-top: 2px solid transparent; transition: all .15s;
    }
    .nav-item i { font-size: 20px; }
    .nav-item.active { color: var(--blue-d); border-top-color: var(--blue-d); }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%); z-index: 500;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600; color: #fff;
      animation: toast-in .2s ease; white-space: nowrap;
    }
    .toast.success { background: var(--green-d); }
    .toast.error   { background: var(--red); }
    .toast.info    { background: var(--blue-d); }
    @keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    @media (min-width: 640px) {
      .drawer { left: auto; right: 0; width: 440px; border-radius: 20px 0 0 20px; max-height: 100vh; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="hd">
    <div class="hd-left">
      <button class="hd-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
      <div>
        <div class="hd-title">Serviços e Adicionais</div>
        <div class="hd-count" id="hd-count">Carregando...</div>
      </div>
    </div>
    <button class="hd-btn" id="btnNovo" onclick="abrirNovo()">
      <i class="fas fa-plus"></i> Novo
    </button>
  </header>

  <!-- TABS -->
  <div class="tabs-bar">
    <button class="tab-btn active" id="tabServicos" onclick="setTab('servicos')">
      <i class="fas fa-wrench"></i> Serviços
      <span class="tab-count" id="countServicos">—</span>
    </button>
    <button class="tab-btn" id="tabAdicionais" onclick="setTab('adicionais')">
      <i class="fas fa-star"></i> Adicionais
      <span class="tab-count" id="countAdicionais">—</span>
    </button>
  </div>

  <!-- CONTEÚDO -->
  <div class="list-body" id="listBody">
    <div class="state-box"><div class="spin"></div></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <!-- TOASTS -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- DRAWER OVERLAY -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="fecharDrawer()"></div>

  <!-- DRAWER -->
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span class="drawer-title" id="drawerTitle">—</span>
      <button class="drawer-close" onclick="fecharDrawer()"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" id="drawerFooter"></div>
  </div>

  <script src="../api.js"></script>
  <script src="utils-funcionario.js"></script>
  <script>
    const PAGE_TITLE  = 'Serviços';
    const PAGE_ACTIVE = 'servicos';

    let tabAtiva   = 'servicos';
    let servicos   = [];
    let adicionais = [];
    let editandoId = null;

    const CATS_CARRO = ['HATCH','SEDAN','SUV','PICKUP','CAMINHONETE','VAN','MICROONIBUS','CAMINHAO'];
    const LABELS_CAT = {
      HATCH:'Hatch', SEDAN:'Sedan', SUV:'SUV', PICKUP:'Pickup',
      CAMINHONETE:'Caminhonete', VAN:'Van', MICROONIBUS:'Micro-ônibus', CAMINHAO:'Caminhão'
    };

    // ── INIT ─────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (!validateFuncionarioAccess()) return;
      const perms = JSON.parse(localStorage.getItem('permissoes') || '[]');
      if (!perms.includes('config_ver_servicos')) {
        showToast('Sem permissão para gerenciar serviços', 'error');
        setTimeout(() => { window.location.href = '../index-funcionario.html'; }, 1500);
        return;
      }
      document.getElementById('bottomNav').innerHTML = createMobileNav(PAGE_ACTIVE);
      await carregar();
    });

    // ── CARREGAR ──────────────────────────────────
    async function carregar() {
      setLoading();
      try {
        const [rs, ra] = await Promise.all([
          window.api.getServicos(),
          window.api.getAdicionais()
        ]);
        servicos   = rs.servicos   || [];
        adicionais = ra.adicionais || [];
        document.getElementById('countServicos').textContent   = servicos.length;
        document.getElementById('countAdicionais').textContent = adicionais.length;
        atualizarCount();
        renderTab();
      } catch {
        document.getElementById('listBody').innerHTML = `
          <div class="state-box">
            <i class="fas fa-exclamation-triangle state-icon"></i>
            <div class="state-title">Erro ao carregar</div>
            <div class="state-sub">Verifique a conexão e tente novamente.</div>
            <button class="btn-state" onclick="carregar()">Tentar novamente</button>
          </div>`;
      }
    }

    function setLoading() {
      document.getElementById('listBody').innerHTML = '<div class="state-box"><div class="spin"></div></div>';
    }

    function atualizarCount() {
      const total = tabAtiva === 'servicos' ? servicos.length : adicionais.length;
      const nome  = tabAtiva === 'servicos' ? 'serviço' : 'adicional';
      document.getElementById('hd-count').textContent = `${total} ${nome}${total !== 1 ? 's' : ''}`;
    }

    // ── TAB ───────────────────────────────────────
    function setTab(tab) {
      tabAtiva = tab;
      document.getElementById('tabServicos').classList.toggle('active', tab === 'servicos');
      document.getElementById('tabAdicionais').classList.toggle('active', tab === 'adicionais');
      atualizarCount();
      renderTab();
    }

    function renderTab() {
      if (tabAtiva === 'servicos') renderServicos();
      else renderAdicionais();
    }

    // ── RENDER SERVIÇOS ───────────────────────────
    function renderServicos() {
      const body = document.getElementById('listBody');
      if (!servicos.length) {
        body.innerHTML = `
          <div class="state-box">
            <i class="fas fa-wrench state-icon"></i>
            <div class="state-title">Nenhum serviço</div>
            <div class="state-sub">Crie o primeiro serviço para começar.</div>
            <button class="btn-state" onclick="abrirNovo()"><i class="fas fa-plus"></i> Novo Serviço</button>
          </div>`;
        return;
      }
      body.innerHTML = `<div class="item-list">${servicos.map(s => cardServico(s)).join('')}</div>`;
    }

    function cardServico(s) {
      const tipo  = s.tipoVeiculo || '';
      const cats  = (s.subtiposVeiculo || []).map(x => LABELS_CAT[x.categoria || x] || x.categoria || x).join(', ');
      const tipoCls = tipo === 'CARRO' ? 'badge-carro' : tipo === 'MOTO' ? 'badge-moto' : 'badge-outros';
      const tipoLabel = tipo === 'CARRO' ? 'Carro' : tipo === 'MOTO' ? 'Moto' : tipo || '—';
      const comissao = s.comissaoPercentual != null
        ? `<span class="item-badge badge-comissao">${s.comissaoPercentual}% comissão</span>` : '';
      return `
        <div class="item-row" onclick="abrirEditarServico('${s.id}')">
          <div class="item-icon servico"><i class="fas fa-wrench"></i></div>
          <div class="item-info">
            <div class="item-name">${escHtml(s.nome)}</div>
            <div class="item-meta">
              <span>${cats || 'Todos'}</span>
            </div>
          </div>
          <div class="item-right">
            <div class="item-price">${fmtR(s.preco)}</div>
            <span class="item-badge ${tipoCls}">${tipoLabel}</span>
            ${comissao}
          </div>
        </div>`;
    }

    // ── RENDER ADICIONAIS ─────────────────────────
    function renderAdicionais() {
      const body = document.getElementById('listBody');
      if (!adicionais.length) {
        body.innerHTML = `
          <div class="state-box">
            <i class="fas fa-star state-icon"></i>
            <div class="state-title">Nenhum adicional</div>
            <div class="state-sub">Crie o primeiro adicional para começar.</div>
            <button class="btn-state" onclick="abrirNovo()"><i class="fas fa-plus"></i> Novo Adicional</button>
          </div>`;
        return;
      }
      body.innerHTML = `<div class="item-list">${adicionais.map(a => cardAdicional(a)).join('')}</div>`;
    }

    function cardAdicional(a) {
      return `
        <div class="item-row" onclick="abrirEditarAdicional('${a.id}')">
          <div class="item-icon adicional"><i class="fas fa-star"></i></div>
          <div class="item-info">
            <div class="item-name">${escHtml(a.nome)}</div>
            ${a.descricao ? `<div class="item-meta">${escHtml(a.descricao)}</div>` : ''}
          </div>
          <div class="item-right">
            <div class="item-price">${fmtR(a.preco)}</div>
          </div>
        </div>`;
    }

    // ── BOTÃO "NOVO" (contexto-aware) ─────────────
    function abrirNovo() {
      if (tabAtiva === 'servicos') abrirFormServico(null);
      else abrirFormAdicional(null);
    }

    // ── DRAWER HELPERS ────────────────────────────
    function abrirDrawer() {
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
    }
    function fecharDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      editandoId = null;
    }

    // ── FORM SERVIÇO ──────────────────────────────
    function abrirEditarServico(id) {
      const s = servicos.find(x => x.id === id);
      if (!s) return;
      abrirFormServico(s);
    }

    function abrirFormServico(s) {
      editandoId = s?.id || null;
      document.getElementById('drawerTitle').textContent = s ? 'Editar Serviço' : 'Novo Serviço';

      const tipo     = s?.tipoVeiculo || '';
      const catsSel  = (s?.subtiposVeiculo || []).map(x => x.categoria || x);
      const comissao = s?.comissaoPercentual != null ? s.comissaoPercentual : '';

      document.getElementById('drawerBody').innerHTML = `
        <div class="form-group">
          <label class="form-label">Nome do serviço *</label>
          <input type="text" class="form-input" id="fNome" placeholder="Ex: Lavagem Simples" value="${escHtml(s?.nome || '')}">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Preço (R$) *</label>
            <input type="number" step="0.01" min="0.01" class="form-input" id="fPreco" placeholder="0,00" value="${s?.preco || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Comissão (%)</label>
            <input type="number" step="1" min="0" max="100" class="form-input" id="fComissao"
                   placeholder="Padrão lavador" value="${comissao}">
            <div class="form-hint">Deixe vazio para usar o % padrão</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de veículo *</label>
          <select class="form-select" id="fTipo" onchange="onTipoChange()">
            <option value="">Selecione...</option>
            <option value="CARRO" ${tipo==='CARRO'?'selected':''}>Carro</option>
            <option value="MOTO"  ${tipo==='MOTO' ?'selected':''}>Moto</option>
            <option value="OUTROS"${tipo==='OUTROS'?'selected':''}>Outros</option>
          </select>
        </div>
        <div class="form-group" id="fCatGroup" style="display:${tipo==='CARRO'?'block':'none'}">
          <label class="form-label">Categorias (Carro)</label>
          <div class="cat-grid" id="fCatGrid">
            ${CATS_CARRO.map(cat => {
              const sel = catsSel.includes(cat);
              return `<label class="cat-chip ${sel?'checked':''}" onclick="toggleCat(this)">
                <input type="checkbox" value="${cat}" ${sel?'checked':''}/>
                ${LABELS_CAT[cat]}
              </label>`;
            }).join('')}
          </div>
          <div class="form-hint" style="margin-top:8px">Nenhuma selecionada = todos os tipos de carro</div>
        </div>
      `;

      const isEdit = !!editandoId;
      document.getElementById('drawerFooter').innerHTML = `
        ${isEdit ? `<button class="btn-f btn-f-danger" onclick="excluirServico()"><i class="fas fa-trash"></i></button>` : ''}
        <button class="btn-f btn-f-cancel" onclick="fecharDrawer()">Cancelar</button>
        <button class="btn-f btn-f-save" id="btnSalvar" onclick="salvarServico()">
          <i class="fas fa-save"></i> ${isEdit ? 'Salvar' : 'Criar'}
        </button>
      `;
      abrirDrawer();
    }

    function onTipoChange() {
      const tipo = document.getElementById('fTipo').value;
      document.getElementById('fCatGroup').style.display = tipo === 'CARRO' ? 'block' : 'none';
    }

    function toggleCat(chip) {
      const cb = chip.querySelector('input[type="checkbox"]');
      cb.checked = !cb.checked;
      chip.classList.toggle('checked', cb.checked);
    }

    async function salvarServico() {
      const nome    = document.getElementById('fNome').value.trim();
      const preco   = parseFloat(document.getElementById('fPreco').value);
      const tipo    = document.getElementById('fTipo').value;
      const comissaoVal = document.getElementById('fComissao').value;
      const comissao = comissaoVal !== '' ? parseFloat(comissaoVal) : null;

      if (!nome || !preco || preco <= 0 || !tipo) {
        showToast('Preencha nome, preço e tipo de veículo', 'error'); return;
      }

      const cats = Array.from(document.querySelectorAll('#fCatGrid input:checked')).map(c => c.value);

      const payload = {
        nome, preco, tipoVeiculo: tipo,
        subtiposVeiculo: cats,
        ...(comissao !== null ? { comissaoPercentual: comissao } : { comissaoPercentual: null })
      };

      const btn = document.getElementById('btnSalvar');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

      try {
        if (editandoId) {
          await window.api.updateServico(editandoId, payload);
          showToast('Serviço atualizado!', 'success');
        } else {
          await window.api.createServico(payload);
          showToast('Serviço criado!', 'success');
        }
        fecharDrawer();
        await carregar();
      } catch (err) {
        showToast(err?.error || 'Erro ao salvar serviço', 'error');
        btn.disabled = false; btn.innerHTML = `<i class="fas fa-save"></i> ${editandoId ? 'Salvar' : 'Criar'}`;
      }
    }

    function excluirServico() {
      if (!confirm('Excluir este serviço? Esta ação não pode ser desfeita.')) return;
      window.api.deleteServico(editandoId)
        .then(() => { showToast('Serviço excluído.', 'success'); fecharDrawer(); carregar(); })
        .catch(() => showToast('Erro ao excluir serviço.', 'error'));
    }

    // ── FORM ADICIONAL ────────────────────────────
    function abrirEditarAdicional(id) {
      const a = adicionais.find(x => x.id === id);
      if (!a) return;
      abrirFormAdicional(a);
    }

    function abrirFormAdicional(a) {
      editandoId = a?.id || null;
      document.getElementById('drawerTitle').textContent = a ? 'Editar Adicional' : 'Novo Adicional';

      document.getElementById('drawerBody').innerHTML = `
        <div class="form-group">
          <label class="form-label">Nome do adicional *</label>
          <input type="text" class="form-input" id="fNomeA" placeholder="Ex: Polimento Especial" value="${escHtml(a?.nome || '')}">
        </div>
        <div class="form-group">
          <label class="form-label">Preço (R$) *</label>
          <input type="number" step="0.01" min="0.01" class="form-input" id="fPrecoA" placeholder="0,00" value="${a?.preco || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">Descrição <span style="font-weight:400;color:var(--light)">(opcional)</span></label>
          <textarea class="form-input" id="fDescA" placeholder="Detalhes do adicional..."
                    style="resize:vertical;min-height:70px">${escHtml(a?.descricao || '')}</textarea>
        </div>
      `;

      const isEdit = !!editandoId;
      document.getElementById('drawerFooter').innerHTML = `
        ${isEdit ? `<button class="btn-f btn-f-danger" onclick="excluirAdicional()"><i class="fas fa-trash"></i></button>` : ''}
        <button class="btn-f btn-f-cancel" onclick="fecharDrawer()">Cancelar</button>
        <button class="btn-f btn-f-save" id="btnSalvarA" onclick="salvarAdicional()">
          <i class="fas fa-save"></i> ${isEdit ? 'Salvar' : 'Criar'}
        </button>
      `;
      abrirDrawer();
    }

    async function salvarAdicional() {
      const nome   = document.getElementById('fNomeA').value.trim();
      const preco  = parseFloat(document.getElementById('fPrecoA').value);
      const desc   = document.getElementById('fDescA').value.trim();

      if (!nome || !preco || preco <= 0) {
        showToast('Preencha nome e preço', 'error'); return;
      }

      const btn = document.getElementById('btnSalvarA');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

      try {
        const payload = { nome, preco, descricao: desc || null };
        if (editandoId) {
          await window.api.updateAdicional(editandoId, payload);
          showToast('Adicional atualizado!', 'success');
        } else {
          await window.api.createAdicional(payload);
          showToast('Adicional criado!', 'success');
        }
        fecharDrawer();
        await carregar();
      } catch (err) {
        showToast(err?.error || 'Erro ao salvar adicional', 'error');
        btn.disabled = false; btn.innerHTML = `<i class="fas fa-save"></i> ${editandoId ? 'Salvar' : 'Criar'}`;
      }
    }

    function excluirAdicional() {
      if (!confirm('Excluir este adicional? Esta ação não pode ser desfeita.')) return;
      window.api.deleteAdicional(editandoId)
        .then(() => { showToast('Adicional excluído.', 'success'); fecharDrawer(); carregar(); })
        .catch(() => showToast('Erro ao excluir adicional.', 'error'));
    }

    // ── UTILS ─────────────────────────────────────
    function fmtR(v) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
    }
    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function showToast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  </script>
</body>
</html>
