<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — Lina X</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0f172a;
      --navy-m: #1e293b;
      --blue:   #3b82f6;
      --blue-d: #2563eb;
      --text:   #0f172a;
      --mid:    #64748b;
      --light:  #94a3b8;
      --border: #e2e8f0;
      --bg:     #f1f5f9;
      --white:  #ffffff;
      --green:  #10b981;
      --green-d:#059669;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --r:      12px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .hd {
      background: var(--navy);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hd-left { display: flex; align-items: center; gap: 12px; }
    .hd-back {
      background: none; border: none; color: #fff;
      font-size: 18px; cursor: pointer; padding: 6px;
      border-radius: 8px; transition: background .15s;
    }
    .hd-back:hover { background: rgba(255,255,255,.1); }
    .hd-title { font-size: 16px; font-weight: 700; color: #fff; }
    .hd-subtitle { font-size: 11px; color: rgba(255,255,255,.55); }
    .hd-btn {
      background: var(--blue-d); border: none; color: #fff;
      padding: 8px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; display: flex;
      align-items: center; gap: 6px; transition: background .15s;
    }
    .hd-btn:hover { background: var(--blue); }

    /* ── BUSCA ── */
    .search-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 0;
      position: sticky;
      top: 56px;
      z-index: 90;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      transition: border-color .15s;
    }
    .search-wrap:focus-within { border-color: var(--blue-d); }
    .search-wrap i { color: var(--light); font-size: 14px; }
    .search-wrap input {
      flex: 1; border: none; background: none;
      font-size: 14px; color: var(--text); outline: none;
    }
    .search-wrap input::placeholder { color: var(--light); }
    .search-clear {
      background: none; border: none; color: var(--light);
      cursor: pointer; padding: 2px; display: none; font-size: 14px;
    }
    .search-clear.visible { display: block; }

    /* ── FILTROS ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 10px 16px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 12px; font-weight: 600; color: var(--mid);
      cursor: pointer; white-space: nowrap;
      transition: all .15s;
    }
    .filter-btn.active {
      background: var(--navy); color: #fff; border-color: var(--navy);
    }
    .filter-badge {
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      padding: 0 5px;
      font-size: 10px;
      font-weight: 700;
    }
    .filter-btn:not(.active) .filter-badge {
      background: var(--bg);
      color: var(--mid);
    }

    /* ── GRID DE CARDS ── */
    .crm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      padding: 12px 16px;
      padding-bottom: 100px;
    }

    /* ── CARD DE CLIENTE ── */
    .client-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .client-card:hover {
      border-color: var(--blue);
      box-shadow: 0 4px 16px rgba(37,99,235,.08);
    }

    .cc-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .cc-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-d));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px; font-weight: 700;
      flex-shrink: 0;
    }
    .cc-avatar.na {
      background: linear-gradient(135deg, var(--light), var(--mid));
    }
    .cc-info { flex: 1; min-width: 0; }
    .cc-name-row { display: flex; align-items: center; gap: 6px; }
    .cc-name {
      font-size: 15px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cc-name.na-name { color: var(--mid); font-style: italic; }
    .cc-phone {
      font-size: 12px; color: var(--mid); margin-top: 2px;
      display: flex; align-items: center; gap: 5px;
    }
    .cc-phone .no-phone { font-style: italic; }

    /* Badges */
    .badge-semnom {
      display: inline-block; padding: 1px 6px;
      background: #fef3c7; color: #92400e;
      border: 1px solid #fde68a;
      border-radius: 4px; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .4px;
      white-space: nowrap;
    }
    .badge-visita {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 20px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .badge-visita.recente { background: #d1fae5; color: #065f46; }
    .badge-visita.media   { background: #fef3c7; color: #92400e; }
    .badge-visita.antiga  { background: #fee2e2; color: #991b1b; }

    .cc-tags {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }
    .tag-plate {
      background: var(--navy); color: #fff;
      letter-spacing: .5px;
    }
    .tag-model {
      background: var(--bg); color: var(--mid);
      border: 1px solid var(--border);
    }

    .cc-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .cc-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .cc-stat-val { font-size: 14px; font-weight: 700; color: var(--text); }
    .cc-stat-lbl { font-size: 10px; font-weight: 600; color: var(--light); text-transform: uppercase; letter-spacing: .4px; }

    .cc-actions { display: flex; gap: 6px; }
    .cc-action-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px;
      color: var(--mid);
      transition: all .15s;
    }
    .cc-action-btn:hover { border-color: var(--blue); color: var(--blue-d); background: #eff6ff; }
    .cc-action-btn.danger:hover { border-color: var(--red); color: var(--red); background: #fef2f2; }
    .cc-action-btn.wa { color: #25D366; border-color: #bbf7d0; }
    .cc-action-btn.wa:hover { background: #f0fdf4; border-color: #25D366; }

    /* ── ESTADOS ── */
    .state-container {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center;
      gap: 12px;
    }
    .state-icon { font-size: 52px; color: var(--border); }
    .state-title { font-size: 17px; font-weight: 700; color: var(--text); }
    .state-sub { font-size: 13px; color: var(--mid); }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue-d);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DRAWER (bottom-sheet) ── */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
    }
    .drawer-overlay.open { display: block; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      z-index: 201;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .drawer-header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .drawer-close {
      background: none; border: none;
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--mid);
      cursor: pointer; transition: background .15s;
    }
    .drawer-close:hover { background: var(--bg); }

    .drawer-body { padding: 16px 20px; flex: 1; overflow-y: auto; }
    .drawer-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
      flex-shrink: 0;
    }

    /* ── FORM DENTRO DO DRAWER ── */
    .form-section { margin-bottom: 20px; }
    .form-section-title {
      font-size: 11px; font-weight: 700; color: var(--light);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px;
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--mid); margin-bottom: 5px;
    }
    .form-input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px; font-family: inherit;
      color: var(--text);
      transition: border-color .15s;
      background: var(--white);
    }
    .form-input:focus { outline: none; border-color: var(--blue-d); }
    .form-hint { font-size: 11px; color: var(--light); margin-top: 4px; }

    .vehicle-row {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 8px;
    }
    .vehicle-row .form-input { flex: 1; margin: 0; }
    .btn-remove-veh {
      width: 34px; height: 34px; flex-shrink: 0;
      background: none; border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--red);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s;
    }
    .btn-remove-veh:hover { background: #fef2f2; border-color: var(--red); }

    .btn-add-veh {
      width: 100%; padding: 9px;
      background: none; border: 1.5px dashed var(--border);
      border-radius: 8px; color: var(--blue-d);
      font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px;
      transition: all .15s;
    }
    .btn-add-veh:hover { border-color: var(--blue-d); background: #eff6ff; }

    /* ── BOTÕES DRAWER FOOTER ── */
    .btn-f {
      flex: 1; padding: 12px;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-f-cancel { background: var(--bg); color: var(--mid); }
    .btn-f-cancel:hover { background: var(--border); }
    .btn-f-save { background: var(--blue-d); color: #fff; }
    .btn-f-save:hover { background: var(--blue); }
    .btn-f-save:disabled { opacity: .5; cursor: not-allowed; }

    /* ── SEÇÕES DE DETALHE ── */
    .detail-stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .detail-stat {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .detail-stat-val { font-size: 18px; font-weight: 700; color: var(--text); }
    .detail-stat-lbl { font-size: 10px; font-weight: 600; color: var(--light); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }

    .detail-section-title {
      font-size: 11px; font-weight: 700; color: var(--light);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .detail-row {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { color: var(--mid); font-weight: 500; }
    .detail-row-val { color: var(--text); font-weight: 600; }

    /* Veículos no detalhe */
    .veh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }
    .veh-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .veh-card-plate { font-size: 13px; font-weight: 700; }
    .veh-card-model { font-size: 11px; color: var(--mid); margin-top: 2px; }
    .btn-transfer-veh {
      margin-top: 6px; width: 100%;
      padding: 4px 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 10px; font-weight: 600; color: var(--mid);
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-transfer-veh:hover { border-color: var(--blue); color: var(--blue-d); background: #eff6ff; }

    .detail-action-row {
      display: flex; gap: 8px; margin-top: 4px; margin-bottom: 16px;
    }
    .btn-detail-action {
      flex: 1; padding: 10px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: none; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 6px;
      color: var(--text); transition: all .15s;
    }
    .btn-detail-action:hover { border-color: var(--blue); color: var(--blue-d); background: #eff6ff; }
    .btn-detail-action.wa { color: #25D366; border-color: #bbf7d0; }
    .btn-detail-action.wa:hover { background: #f0fdf4; border-color: #25D366; }
    .btn-detail-action.danger { color: var(--red); border-color: #fecaca; }
    .btn-detail-action.danger:hover { background: #fef2f2; border-color: var(--red); }

    /* Box de reengajamento WhatsApp */
    .wa-reengage-box {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .wa-reengage-title {
      font-size: 12px; font-weight: 700; color: #065f46;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .wa-reengage-msg {
      font-size: 12px; color: #047857;
      margin-bottom: 10px; line-height: 1.5;
    }
    .btn-wa-reengage {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: #25D366; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: background .15s;
    }
    .btn-wa-reengage:hover { background: #1da851; }

    /* ── MODAL TRANSFERÊNCIA ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 300;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: 16px;
      width: 90%; max-width: 420px;
      max-height: 80vh;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h3 { font-size: 15px; font-weight: 700; }
    .modal-close-btn {
      background: none; border: none; font-size: 18px; color: var(--mid);
      cursor: pointer; padding: 4px;
    }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }

    .transfer-info {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px; margin-bottom: 14px;
    }
    .transfer-info strong { color: var(--text); }
    .transfer-info span { color: var(--mid); }

    .transfer-search-results {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 8px;
    }
    .transfer-result-item {
      padding: 10px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      cursor: pointer; font-size: 13px;
      transition: background .1s;
    }
    .transfer-result-item:last-child { border-bottom: none; }
    .transfer-result-item:hover { background: #eff6ff; }
    .transfer-result-item.selected { background: #dbeafe; }
    .transfer-result-name { font-weight: 600; color: var(--text); }
    .transfer-result-phone { font-size: 11px; color: var(--mid); }

    .selected-client-box {
      background: #dbeafe;
      border: 1.5px solid #93c5fd;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .selected-client-name { font-size: 13px; font-weight: 700; color: var(--blue-d); }
    .btn-deselect {
      background: none; border: none; color: var(--light);
      cursor: pointer; font-size: 16px; padding: 2px;
    }

    /* ── NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      height: 64px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: var(--light);
      font-size: 10px; font-weight: 600; gap: 3px;
      border: none; background: none; cursor: pointer;
      border-top: 2px solid transparent;
      transition: all .15s;
    }
    .nav-item i { font-size: 20px; }
    .nav-item.active { color: var(--blue-d); border-top-color: var(--blue-d); }
    .nav-item:hover { color: var(--blue-d); }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      z-index: 500; display: flex; flex-direction: column;
      gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600; color: #fff;
      animation: toast-in .2s ease;
      white-space: nowrap;
    }
    .toast.success { background: var(--green-d, #059669); }
    .toast.error   { background: var(--red); }
    .toast.info    { background: var(--blue-d); }
    @keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    @media (min-width: 640px) {
      .drawer { left: auto; right: 0; width: 420px; border-radius: 20px 0 0 20px; max-height: 100vh; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="hd">
    <div class="hd-left">
      <button class="hd-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
      <div>
        <div class="hd-title">CRM de Clientes</div>
        <div class="hd-subtitle" id="countLabel">Carregando...</div>
      </div>
    </div>
    <button class="hd-btn" onclick="openFormNew()">
      <i class="fas fa-plus"></i> Novo
    </button>
  </header>

  <!-- BUSCA + FILTROS -->
  <div class="search-bar">
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Nome, telefone ou placa..." oninput="onSearch(this)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
    </div>
    <div class="filter-bar" id="filterBar"></div>
  </div>

  <!-- CARDS -->
  <div class="crm-grid" id="grid"></div>

  <!-- NAV -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- DRAWER OVERLAY -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- DRAWER -->
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span class="drawer-title" id="drawerTitle">—</span>
      <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" id="drawerFooter" style="display:none"></div>
  </div>

  <!-- MODAL TRANSFERÊNCIA -->
  <div class="modal-overlay" id="transferModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3><i class="fas fa-exchange-alt" style="color:var(--blue-d);margin-right:6px"></i> Transferir Veículo</h3>
        <button class="modal-close-btn" onclick="closeTransferModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="transfer-info" id="transferInfo"></div>
        <div class="form-group">
          <label class="form-label">Buscar cliente destino</label>
          <input type="text" class="form-input" id="transferSearch"
                 placeholder="Nome ou telefone..."
                 oninput="onTransferSearch(this)">
        </div>
        <div id="transferResults"></div>
        <div id="selectedClientBox" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-f btn-f-cancel" onclick="closeTransferModal()">Cancelar</button>
        <button class="btn-f btn-f-save" id="btnConfirmTransfer" onclick="confirmarTransferencia()" disabled>
          <i class="fas fa-check"></i> Confirmar
        </button>
      </div>
    </div>
  </div>

  <script src="../api.js"></script>
  <script src="utils-funcionario.js"></script>
  <script>
    const PAGE_TITLE  = 'Clientes';
    const PAGE_ACTIVE = 'clientes';

    let allClientes   = [];
    let filtered      = [];
    let editingId     = null;
    let vehCount      = 0;
    let filtroAtivo   = 'todos';

    // Estado da transferência
    let transferVeiculoData   = null;
    let transferClienteSel    = null;
    let transferTimer         = null;

    // ── INIT ──────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (!validateFuncionarioAccess()) return;

      const permissoes = JSON.parse(localStorage.getItem('permissoes') || '[]');
      if (!permissoes.includes('gerenciar_clientes')) {
        showToast('Sem permissão para gerenciar clientes', 'error');
        setTimeout(() => { window.location.href = '../index-funcionario.html'; }, 1500);
        return;
      }

      document.getElementById('bottomNav').innerHTML = createMobileNav(PAGE_ACTIVE);
      await loadClientes();
    });

    // ── CARREGAR ──────────────────────────────────
    async function loadClientes() {
      setGrid(`<div class="state-container"><div class="spin"></div></div>`);
      try {
        const r = await window.api.getClientes(1, 500, '');
        allClientes = r.clientes || r.data || [];
        filtered    = [...allClientes];
        renderFilterBar();
        renderGrid();
      } catch {
        setGrid(`<div class="state-container">
          <i class="fas fa-exclamation-triangle state-icon"></i>
          <div class="state-title">Erro ao carregar</div>
          <div class="state-sub">Verifique a conexão e tente novamente.</div>
        </div>`);
      }
    }

    // ── FILTRO BAR ────────────────────────────────
    function renderFilterBar() {
      const filtros = [
        { id: 'todos',    label: 'Todos' },
        { id: 'recentes', label: 'Recentes 7d' },
        { id: 'inativos', label: 'Inativos 30d+' },
        { id: 'semNome',  label: 'Sem Nome' }
      ];
      document.getElementById('filterBar').innerHTML = filtros.map(f => {
        const count = f.id === 'todos' ? allClientes.length : contarFiltro(f.id);
        return `<button class="filter-btn ${filtroAtivo === f.id ? 'active' : ''}"
                        onclick="setFiltro('${f.id}')">
          ${f.label}
          <span class="filter-badge">${count}</span>
        </button>`;
      }).join('');
    }

    function setFiltro(id) {
      filtroAtivo = id;
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      applyFilters(q);
      renderFilterBar();
    }

    function contarFiltro(tipo) {
      return allClientes.filter(c => matchFiltro(c, tipo)).length;
    }

    function matchFiltro(c, tipo) {
      const dias = diasDesdeUltimaVisita(c);
      if (tipo === 'recentes') return dias !== null && dias <= 7;
      if (tipo === 'inativos') return dias === null || dias > 30;
      if (tipo === 'semNome')  return !c.nome || c.nome === 'N/A' || c.nome.trim() === '';
      return true;
    }

    // ── HELPERS DE DATA / VISITA ──────────────────
    function ultimaVisitaDate(c) {
      const ordens = (c.ordens || []).filter(o => o.status !== 'CANCELADO');
      if (!ordens.length) return null;
      const datas = ordens
        .map(o => o.dataFim || o.createdAt)
        .filter(Boolean)
        .map(d => new Date(d));
      if (!datas.length) return null;
      return new Date(Math.max(...datas));
    }

    function diasDesdeUltimaVisita(c) {
      const data = ultimaVisitaDate(c);
      if (!data) return null;
      return Math.floor((Date.now() - data.getTime()) / 86400000);
    }

    function badgeVisitaHtml(c) {
      const dias = diasDesdeUltimaVisita(c);
      if (dias === null) return '';
      let cls, txt;
      if (dias <= 7)  { cls = 'recente'; txt = `${dias}d`; }
      else if (dias <= 30) { cls = 'media'; txt = `${dias}d`; }
      else            { cls = 'antiga';  txt = `${dias}d`; }
      return `<span class="badge-visita ${cls}"><i class="fas fa-clock"></i>${txt}</span>`;
    }

    function calcTotalGasto(c) {
      return (c.ordens || [])
        .filter(o => o.status !== 'CANCELADO')
        .reduce((acc, o) => acc + (o.valorTotal || 0), 0);
    }

    function gerarLinkWhatsApp(c, dias) {
      const nome = (c.nome && c.nome !== 'N/A' ? c.nome : 'cliente').split(' ')[0];
      const diasTxt = dias !== null ? `${dias} dias` : 'um tempo';
      const msg = `Olá ${nome}! 😊 Já faz ${diasTxt} desde a sua última visita. Seu veículo já pode estar precisando de uma lavagem! Que tal agendar hoje? Temos horários disponíveis para você. 🚗✨`;
      return `https://wa.me/55${cleanPhone(c.telefone)}?text=${encodeURIComponent(msg)}`;
    }

    // ── RENDER GRID ───────────────────────────────
    function renderGrid() {
      const total    = filtered.length;
      const allTotal = allClientes.length;
      document.getElementById('countLabel').textContent =
        total === allTotal
          ? `${total} cliente${total !== 1 ? 's' : ''}`
          : `${total} de ${allTotal} cliente${allTotal !== 1 ? 's' : ''}`;

      if (total === 0) {
        setGrid(`<div class="state-container">
          <i class="fas fa-users-slash state-icon"></i>
          <div class="state-title">Nenhum cliente encontrado</div>
          <div class="state-sub">Tente outro termo ou mude o filtro.</div>
        </div>`);
        return;
      }

      document.getElementById('grid').innerHTML = filtered.map(c => clienteCard(c)).join('');
    }

    function setGrid(html) {
      const g = document.getElementById('grid');
      g.style.display = 'block';
      g.innerHTML = html;
    }

    function clienteCard(c) {
      const isNA      = !c.nome || c.nome === 'N/A' || c.nome.trim() === '';
      const initial   = isNA ? '?' : c.nome.charAt(0).toUpperCase();
      const veiculos  = c.veiculos || [];
      const totalGasto= calcTotalGasto(c);
      const totalOrdens = (c.ordens || []).filter(o => o.status !== 'CANCELADO').length || c._count?.ordens || 0;
      const visitaBadge = badgeVisitaHtml(c);

      const vehicleTags = veiculos.slice(0, 2).map(v =>
        `<span class="tag tag-plate">${v.placa}</span>
         ${v.modelo ? `<span class="tag tag-model">${v.modelo}</span>` : ''}`
      ).join('');
      const moreVeh = veiculos.length > 2 ? `<span class="tag tag-model">+${veiculos.length - 2}</span>` : '';

      const waBtn = c.telefone
        ? `<a href="https://wa.me/55${cleanPhone(c.telefone)}" target="_blank" class="cc-action-btn wa" title="WhatsApp" onclick="event.stopPropagation()">
             <i class="fab fa-whatsapp"></i>
           </a>`
        : '';

      const semNomeBadge = isNA ? `<span class="badge-semnom">N/A</span>` : '';

      return `
        <div class="client-card" onclick="openDetail('${c.id}')">
          <div class="cc-top">
            <div class="cc-avatar ${isNA ? 'na' : ''}">${initial}</div>
            <div class="cc-info">
              <div class="cc-name-row">
                <div class="cc-name ${isNA ? 'na-name' : ''}">${isNA ? 'Sem nome' : escHtml(c.nome)}</div>
                ${semNomeBadge}
              </div>
              <div class="cc-phone">
                <i class="fas fa-phone" style="font-size:10px"></i>
                ${c.telefone ? escHtml(c.telefone) : '<span class="no-phone">Sem telefone</span>'}
              </div>
            </div>
            ${visitaBadge ? `<div>${visitaBadge}</div>` : ''}
          </div>
          ${veiculos.length > 0 ? `<div class="cc-tags">${vehicleTags}${moreVeh}</div>` : ''}
          <div class="cc-bottom">
            <div class="cc-stat">
              <div class="cc-stat-val">${totalOrdens}</div>
              <div class="cc-stat-lbl">Visitas</div>
            </div>
            <div class="cc-stat">
              <div class="cc-stat-val">${veiculos.length}</div>
              <div class="cc-stat-lbl">Veículos</div>
            </div>
            <div class="cc-stat">
              <div class="cc-stat-val">${fmtCurrency(totalGasto)}</div>
              <div class="cc-stat-lbl">Total gasto</div>
            </div>
            <div class="cc-actions" onclick="event.stopPropagation()">
              ${waBtn}
              <button class="cc-action-btn" title="Editar" onclick="openFormEdit('${c.id}')"><i class="fas fa-pencil-alt"></i></button>
              <button class="cc-action-btn danger" title="Excluir" onclick="confirmDelete('${c.id}', '${escHtml(c.nome)}')"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      `;
    }

    // ── BUSCA ─────────────────────────────────────
    function onSearch(input) {
      const q = input.value.trim().toLowerCase();
      document.getElementById('searchClear').classList.toggle('visible', q.length > 0);
      applyFilters(q);
    }

    function applyFilters(q) {
      filtered = allClientes.filter(c => {
        const matchSearch = !q ||
          (c.nome || '').toLowerCase().includes(q) ||
          (c.telefone || '').includes(q) ||
          (c.veiculos || []).some(v =>
            (v.placa || '').toLowerCase().includes(q) ||
            (v.modelo || '').toLowerCase().includes(q)
          );
        const matchFilter = filtroAtivo === 'todos' || matchFiltro(c, filtroAtivo);
        return matchSearch && matchFilter;
      });
      renderGrid();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').classList.remove('visible');
      applyFilters('');
    }

    // ── DRAWER DETALHE ────────────────────────────
    async function openDetail(id) {
      const c = allClientes.find(x => x.id === id);
      if (!c) return;

      openDrawer();
      document.getElementById('drawerTitle').textContent = c.nome && c.nome !== 'N/A' ? c.nome : 'Cliente sem nome';
      document.getElementById('drawerFooter').style.display = 'none';

      const totalGasto  = calcTotalGasto(c);
      const ordensValidas = (c.ordens || []).filter(o => o.status !== 'CANCELADO');
      const totalOrdens = ordensValidas.length || c._count?.ordens || 0;
      const veiculos    = c.veiculos || [];
      const dias        = diasDesdeUltimaVisita(c);
      const uvData      = ultimaVisitaDate(c);
      const ultimaVisitaFmt = uvData ? uvData.toLocaleDateString('pt-BR') : '—';

      const waAction = c.telefone
        ? `<a href="https://wa.me/55${cleanPhone(c.telefone)}" target="_blank" class="btn-detail-action wa">
             <i class="fab fa-whatsapp"></i> WhatsApp
           </a>`
        : '';

      // Box de reengajamento (15+ dias sem visita e tem telefone)
      let reengageBox = '';
      if (c.telefone && dias !== null && dias >= 15) {
        const link = gerarLinkWhatsApp(c, dias);
        reengageBox = `
          <div class="wa-reengage-box">
            <div class="wa-reengage-title"><i class="fab fa-whatsapp"></i> Reengajar cliente</div>
            <div class="wa-reengage-msg">Última visita há <strong>${dias} dias</strong>. Envie uma mensagem personalizada para trazer o cliente de volta.</div>
            <a href="${link}" target="_blank" class="btn-wa-reengage">
              <i class="fab fa-whatsapp"></i> Enviar via WhatsApp
            </a>
          </div>`;
      }

      const veiculosHtml = veiculos.length > 0
        ? `<div class="detail-section-title" style="margin-top:20px">Veículos (${veiculos.length})</div>
           <div class="veh-grid">
             ${veiculos.map(v => `
               <div class="veh-card">
                 <div class="veh-card-plate">${v.placa}</div>
                 <div class="veh-card-model">${v.modelo || '—'}</div>
                 <button class="btn-transfer-veh" onclick="openTransferModal('${v.id}', '${v.placa}', '${escHtml(v.modelo || '')}', '${c.id}', '${escHtml(c.nome || 'N/A')}')">
                   <i class="fas fa-exchange-alt"></i> Transferir
                 </button>
               </div>
             `).join('')}
           </div>`
        : `<div style="color:var(--light);font-size:13px;margin-top:16px;text-align:center">Nenhum veículo vinculado</div>`;

      document.getElementById('drawerBody').innerHTML = `
        <div class="detail-stat-row">
          <div class="detail-stat">
            <div class="detail-stat-val">${totalOrdens}</div>
            <div class="detail-stat-lbl">Visitas</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val">${veiculos.length}</div>
            <div class="detail-stat-lbl">Veículos</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val">${fmtCurrency(totalGasto)}</div>
            <div class="detail-stat-lbl">Total gasto</div>
          </div>
        </div>

        ${reengageBox}

        <div class="detail-action-row">
          ${waAction}
          <button class="btn-detail-action" onclick="openFormEdit('${c.id}')">
            <i class="fas fa-pencil-alt"></i> Editar
          </button>
          <button class="btn-detail-action danger" onclick="confirmDelete('${c.id}', '${escHtml(c.nome || 'N/A')}')">
            <i class="fas fa-trash"></i> Excluir
          </button>
        </div>

        <div class="detail-section-title">Informações</div>
        <div class="detail-row">
          <span class="detail-row-label">Nome</span>
          <span class="detail-row-val">${escHtml(c.nome || 'N/A')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">Telefone</span>
          <span class="detail-row-val">${c.telefone ? escHtml(c.telefone) : '—'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">Última visita</span>
          <span class="detail-row-val">${ultimaVisitaFmt}${dias !== null ? ` <span style="color:var(--mid);font-weight:400;font-size:11px">(${dias}d atrás)</span>` : ''}</span>
        </div>

        ${veiculosHtml}
      `;
    }

    // ── TRANSFER MODAL ────────────────────────────
    function openTransferModal(veiculoId, placa, modelo, clienteAtualId, clienteAtualNome) {
      transferVeiculoData = { id: veiculoId, placa, modelo, clienteAtualId };
      transferClienteSel  = null;

      document.getElementById('transferInfo').innerHTML =
        `<strong>Veículo:</strong> <span>${placa}${modelo ? ' — ' + modelo : ''}</span><br>
         <strong>Proprietário atual:</strong> <span>${escHtml(clienteAtualNome)}</span>`;

      document.getElementById('transferSearch').value = '';
      document.getElementById('transferResults').innerHTML = '';
      document.getElementById('selectedClientBox').style.display = 'none';
      document.getElementById('btnConfirmTransfer').disabled = true;

      document.getElementById('transferModal').classList.add('open');
    }

    function closeTransferModal() {
      document.getElementById('transferModal').classList.remove('open');
      clearTimeout(transferTimer);
      transferVeiculoData = null;
      transferClienteSel  = null;
    }

    function onTransferSearch(input) {
      clearTimeout(transferTimer);
      const q = input.value.trim().toLowerCase();
      if (q.length < 2) {
        document.getElementById('transferResults').innerHTML = '';
        return;
      }
      transferTimer = setTimeout(() => {
        const resultados = allClientes.filter(c =>
          c.id !== transferVeiculoData?.clienteAtualId &&
          ((c.nome || '').toLowerCase().includes(q) || (c.telefone || '').includes(q))
        ).slice(0, 8);

        if (!resultados.length) {
          document.getElementById('transferResults').innerHTML =
            `<p style="font-size:12px;color:var(--light);text-align:center;padding:10px">Nenhum cliente encontrado</p>`;
          return;
        }

        document.getElementById('transferResults').innerHTML = `
          <div class="transfer-search-results">
            ${resultados.map(c => `
              <div class="transfer-result-item ${transferClienteSel?.id === c.id ? 'selected' : ''}"
                   onclick="selecionarClienteTransfer('${c.id}', '${escHtml(c.nome || 'N/A')}', '${escHtml(c.telefone || '')}')">
                <div>
                  <div class="transfer-result-name">${escHtml(c.nome || 'N/A')}</div>
                  ${c.telefone ? `<div class="transfer-result-phone">${escHtml(c.telefone)}</div>` : ''}
                </div>
                ${transferClienteSel?.id === c.id ? '<i class="fas fa-check" style="color:var(--blue-d)"></i>' : ''}
              </div>
            `).join('')}
          </div>`;
      }, 300);
    }

    function selecionarClienteTransfer(id, nome, telefone) {
      transferClienteSel = { id, nome, telefone };
      document.getElementById('btnConfirmTransfer').disabled = false;

      const box = document.getElementById('selectedClientBox');
      box.style.display = 'flex';
      box.innerHTML = `
        <div class="selected-client-box">
          <div>
            <div class="selected-client-name">${escHtml(nome)}</div>
            ${telefone ? `<div style="font-size:11px;color:var(--mid)">${escHtml(telefone)}</div>` : ''}
          </div>
          <button class="btn-deselect" onclick="desselecionarTransfer()"><i class="fas fa-times"></i></button>
        </div>`;

      // Atualizar resultados para mostrar selecionado
      onTransferSearch(document.getElementById('transferSearch'));
    }

    function desselecionarTransfer() {
      transferClienteSel = null;
      document.getElementById('btnConfirmTransfer').disabled = true;
      document.getElementById('selectedClientBox').style.display = 'none';
    }

    async function confirmarTransferencia() {
      if (!transferVeiculoData || !transferClienteSel) return;
      const btn = document.getElementById('btnConfirmTransfer');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Transferindo...';

      try {
        const result = await window.api.transferirVeiculo(transferVeiculoData.id, transferClienteSel.id);
        showToast(result.message || 'Veículo transferido com sucesso!', 'success');
        closeTransferModal();
        closeDrawer();
        await loadClientes();
      } catch (err) {
        showToast(err?.error || 'Erro ao transferir veículo', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Confirmar';
      }
    }

    // ── DRAWER FORM (novo / editar) ───────────────
    async function openFormNew() {
      editingId = null;
      vehCount  = 0;
      openDrawer();
      document.getElementById('drawerTitle').textContent = 'Novo Cliente';
      renderForm(null);
    }

    async function openFormEdit(id) {
      editingId = id;
      vehCount  = 0;
      openDrawer();
      document.getElementById('drawerTitle').textContent = 'Editar Cliente';
      document.getElementById('drawerBody').innerHTML = `<div class="state-container"><div class="spin"></div></div>`;
      document.getElementById('drawerFooter').style.display = 'none';

      try {
        const r = await window.api.getClienteById(id);
        const c = r.data || r;
        renderForm(c);
      } catch {
        showToast('Erro ao carregar dados do cliente', 'error');
        closeDrawer();
      }
    }

    function renderForm(c) {
      const veiculos = c?.veiculos || [];

      document.getElementById('drawerBody').innerHTML = `
        <div class="form-section">
          <div class="form-section-title">Dados pessoais</div>
          <div class="form-group">
            <label class="form-label">Nome <span style="color:var(--light);font-weight:400">(opcional)</span></label>
            <input type="text" class="form-input" id="fNome" placeholder="Ex: João Silva" value="${escHtml(c?.nome && c.nome !== 'N/A' ? c.nome : '')}">
            <div class="form-hint">Deixe vazio para registrar como "N/A"</div>
          </div>
          <div class="form-group">
            <label class="form-label">Telefone / WhatsApp <span style="color:var(--light);font-weight:400">(opcional)</span></label>
            <input type="tel" class="form-input" id="fTelefone" placeholder="(00) 00000-0000" value="${escHtml(c?.telefone || '')}">
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title">Veículos</div>
          <div id="fVeiculos">
            ${veiculos.length > 0
              ? veiculos.map(v => buildVehRow(v.placa, v.modelo)).join('')
              : buildVehRow()}
          </div>
          <button type="button" class="btn-add-veh" onclick="addVehRow()">
            <i class="fas fa-plus"></i> Adicionar veículo
          </button>
        </div>
      `;

      document.getElementById('drawerFooter').style.display = 'flex';
      document.getElementById('drawerFooter').innerHTML = `
        <button class="btn-f btn-f-cancel" onclick="closeDrawer()">Cancelar</button>
        <button class="btn-f btn-f-save" id="saveBtn" onclick="saveForm()">
          <i class="fas fa-save"></i> ${editingId ? 'Salvar' : 'Criar'}
        </button>
      `;
    }

    function buildVehRow(placa = '', modelo = '') {
      vehCount++;
      const n = vehCount;
      return `
        <div class="vehicle-row" id="vr${n}">
          <input type="text" class="form-input veh-placa" placeholder="Placa (ABC1234)" value="${escHtml(placa)}"
                 style="text-transform:uppercase;font-weight:700;letter-spacing:.5px">
          <input type="text" class="form-input veh-modelo" placeholder="Modelo" value="${escHtml(modelo)}">
          <button type="button" class="btn-remove-veh" onclick="document.getElementById('vr${n}').remove()">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `;
    }

    function addVehRow() {
      document.getElementById('fVeiculos').insertAdjacentHTML('beforeend', buildVehRow());
    }

    // ── SALVAR ────────────────────────────────────
    async function saveForm() {
      const nome     = document.getElementById('fNome')?.value.trim() || '';
      const telefone = document.getElementById('fTelefone')?.value.trim() || null;
      const saveBtn  = document.getElementById('saveBtn');

      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

      try {
        const data = { nome: nome || 'N/A', telefone };

        if (editingId) {
          await window.api.updateCliente(editingId, data);
          showToast('Cliente atualizado!', 'success');
        } else {
          const created = await window.api.createCliente(data);
          const clienteId = created.id;

          const rows = document.querySelectorAll('.vehicle-row');
          for (const row of rows) {
            const placa  = row.querySelector('.veh-placa')?.value.trim().toUpperCase();
            const modelo = row.querySelector('.veh-modelo')?.value.trim();
            if (placa) {
              await window.api.createVeiculo({ clienteId, placa, modelo: modelo || null, cor: null });
            }
          }
          showToast('Cliente criado!', 'success');
        }

        closeDrawer();
        await loadClientes();
      } catch (err) {
        showToast(err?.error || 'Erro ao salvar. Tente novamente.', 'error');
        saveBtn.disabled = false;
        saveBtn.innerHTML = `<i class="fas fa-save"></i> ${editingId ? 'Salvar' : 'Criar'}`;
      }
    }

    // ── EXCLUIR ───────────────────────────────────
    function confirmDelete(id, nome) {
      if (!confirm(`Excluir "${nome}"? Esta ação não pode ser desfeita.`)) return;
      deleteCliente(id);
    }

    async function deleteCliente(id) {
      try {
        await window.api.deleteCliente(id);
        showToast('Cliente excluído.', 'success');
        closeDrawer();
        await loadClientes();
      } catch {
        showToast('Erro ao excluir cliente.', 'error');
      }
    }

    // ── DRAWER HELPERS ────────────────────────────
    function openDrawer() {
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      editingId = null;
    }

    // ── UTILS ─────────────────────────────────────
    function cleanPhone(p) { return (p || '').replace(/\D/g, ''); }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtCurrency(v) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
    }

    function showToast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  </script>
</body>
</html>
