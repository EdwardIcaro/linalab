<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ordens — Lina X</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --navy:   #0f172a;
      --navy-m: #1e293b;
      --blue:   #3b82f6;
      --blue-d: #2563eb;
      --text:   #0f172a;
      --mid:    #64748b;
      --light:  #94a3b8;
      --border: #e2e8f0;
      --bg:     #f1f5f9;
      --white:  #ffffff;
      --green:  #10b981;
      --green-d:#059669;
      --amber:  #f59e0b;
      --orange: #f97316;
      --red:    #ef4444;
      --r:      12px;
      --rpill:  999px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html,body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────── */
    .hd {
      background: var(--navy);
      flex-shrink: 0;
      position: sticky; top: 0; z-index: 40;
    }
    .hd-top {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .hd-left { display: flex; align-items: center; gap: 10px; }
    .btn-icon-hd {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer;
      text-decoration: none;
      transition: background .18s; flex-shrink: 0;
    }
    .btn-icon-hd:hover { background: rgba(255,255,255,.2); }
    .btn-icon-hd:active { transform: scale(.93); }
    .hd-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .hd-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
    .hd-right { display: flex; align-items: center; gap: 8px; }
    .btn-new-hd {
      height: 34px; padding: 0 14px;
      background: var(--blue-d);
      border: none; border-radius: var(--rpill);
      color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; text-decoration: none;
      font-family: 'Inter', sans-serif;
      transition: opacity .18s;
    }
    .btn-new-hd:hover { opacity: .85; }

    /* Filter tabs */
    .filter-tabs {
      display: flex; gap: 6px;
      overflow-x: auto; padding: 0 16px 12px;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tabs.hidden { display: none; }
    .ftab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: var(--rpill);
      border: 1.5px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.55);
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all .18s;
    }
    .ftab.active {
      background: var(--blue-d);
      border-color: var(--blue-d);
      color: #fff;
    }

    /* ── MAIN ────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 100px;
    }

    /* Quick action links */
    .quick-links {
      display: flex; gap: 8px;
      margin-bottom: 14px;
    }
    .qlink {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 8px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      font-size: 12px; font-weight: 600; color: var(--mid);
      text-decoration: none;
      transition: all .18s;
    }
    .qlink:hover { border-color: var(--blue); color: var(--blue-d); }
    .qlink i { font-size: 14px; }
    .qlink-amber { color: #92400e; border-color: rgba(245,158,11,.3); background: rgba(255,251,235,.8); }
    .qlink-amber:hover { border-color: var(--amber); color: #78350f; }

    /* ── ORDER CARDS ─────────────────────────── */
    .orders-list { display: flex; flex-direction: column; gap: 10px; }

    .order-card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      display: flex;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .18s, transform .12s;
    }
    .order-card:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      transform: translateY(-1px);
    }
    .order-card:active { transform: scale(.99); }

    .card-accent {
      width: 4px; flex-shrink: 0;
    }
    .acc-PENDENTE          { background: var(--amber); }
    .acc-EM_ANDAMENTO      { background: var(--blue); }
    .acc-AGUARDANDO_PAGAMENTO { background: var(--orange); }
    .acc-COMPLETO          { background: var(--green); }

    .card-body {
      flex: 1; padding: 13px 14px;
      min-width: 0;
    }
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      margin-bottom: 6px;
    }
    .card-num {
      font-size: 12px; font-weight: 700; color: var(--mid);
      letter-spacing: .3px;
    }
    .card-date {
      font-size: 11px; color: var(--light);
      margin-top: 1px;
    }
    .sbadge {
      flex-shrink: 0;
      padding: 3px 9px;
      border-radius: var(--rpill);
      font-size: 10px; font-weight: 700;
      letter-spacing: .2px; text-transform: uppercase;
    }
    .sbadge-PENDENTE { background: rgba(245,158,11,.12); color: #92400e; }
    .sbadge-EM_ANDAMENTO { background: rgba(59,130,246,.12); color: #1d4ed8; }
    .sbadge-AGUARDANDO_PAGAMENTO { background: rgba(249,115,22,.12); color: #c2410c; }
    .sbadge-COMPLETO { background: rgba(16,185,129,.12); color: #065f46; }

    .card-client {
      font-size: 15px; font-weight: 700; color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap;
    }
    .card-plate {
      display: inline-flex; align-items: center;
      background: var(--navy);
      color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 5px;
      letter-spacing: .5px;
    }
    .card-svc {
      font-size: 12px; color: var(--mid); font-weight: 500;
    }
    .card-divider {
      height: 1px; background: var(--border); margin: 10px 0;
    }
    .card-bottom {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-value {
      font-size: 16px; font-weight: 800; color: var(--text);
    }
    .card-actions { display: flex; gap: 7px; flex-shrink: 0; }
    .btn-card {
      height: 32px; padding: 0 12px;
      border-radius: var(--rpill);
      border: none; cursor: pointer;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      font-family: 'Inter', sans-serif;
      transition: opacity .18s;
    }
    .btn-card:hover { opacity: .85; }
    .btn-card:active { transform: scale(.95); }
    .btn-card-eye  { background: rgba(100,116,139,.1); color: var(--mid); }
    .btn-card-done { background: rgba(16,185,129,.12); color: #065f46; }
    .btn-card-pay  { background: linear-gradient(135deg, var(--orange), #ea580c); color: #fff; }

    /* ── LOADING ─────────────────────────────── */
    .loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; gap: 14px;
    }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue-d);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .loading-txt { font-size: 14px; color: var(--mid); font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center; gap: 10px;
    }
    .empty-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--light); margin-bottom: 6px;
    }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .empty-sub { font-size: 14px; color: var(--mid); max-width: 240px; }
    .btn-empty {
      margin-top: 6px; padding: 11px 24px;
      background: linear-gradient(135deg, var(--blue-d), var(--blue));
      border: none; border-radius: var(--rpill);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }

    /* ── DETAIL VIEW ─────────────────────────── */
    .detail-wrap { display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }

    .detail-hero {
      background: var(--navy-m);
      border-radius: var(--r);
      padding: 18px;
    }
    .detail-hero-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      margin-bottom: 14px;
    }
    .detail-num {
      font-size: 22px; font-weight: 800; color: #fff;
      letter-spacing: -.3px;
    }
    .detail-hero-date { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 2px; }
    .detail-value {
      font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 2px;
    }
    .detail-value-label { font-size: 12px; color: rgba(255,255,255,.45); }

    .detail-card {
      background: var(--white);
      border-radius: var(--r);
      padding: 16px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .detail-card-title {
      font-size: 11px; font-weight: 700; color: var(--light);
      letter-spacing: .6px; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .info-item {}
    .info-label { font-size: 11px; color: var(--light); font-weight: 600; margin-bottom: 2px; }
    .info-value { font-size: 14px; font-weight: 700; color: var(--text); }
    .info-value-plate {
      display: inline-flex; align-items: center;
      background: var(--navy); color: #fff;
      font-size: 13px; font-weight: 800;
      padding: 3px 10px; border-radius: 6px;
      letter-spacing: .8px;
    }

    .svc-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .svc-row:last-child { border-bottom: none; }
    .svc-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .svc-price { font-size: 14px; font-weight: 700; color: var(--blue-d); }

    .obs-text { font-size: 14px; color: var(--mid); line-height: 1.6; }

    /* ── STICKY DETAIL ACTIONS ───────────────── */
    .sticky-actions {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 14px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; z-index: 30;
    }
    .btn-action {
      flex: 1; padding: 14px;
      border-radius: var(--rpill);
      border: none; cursor: pointer;
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Inter', sans-serif;
      transition: opacity .18s, transform .1s;
    }
    .btn-action:active { transform: scale(.97); }
    .btn-action-back { background: var(--bg); color: var(--mid); border: 1.5px solid var(--border); }
    .btn-action-done { background: linear-gradient(135deg, var(--green-d), var(--green)); color: #fff; box-shadow: 0 4px 12px rgba(5,150,105,.3); }
    .btn-action-pay  { background: linear-gradient(135deg, var(--orange), #ea580c); color: #fff; box-shadow: 0 4px 12px rgba(234,88,12,.3); }
    .btn-action-edit { background: rgba(59,130,246,.1); color: var(--blue-d); border: 1.5px solid rgba(59,130,246,.2); }

    /* ── PAYMENT MODAL ───────────────────────── */
    .modal-overlay {
      display: none; position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 2000;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 8px 20px 0;
      width: 100%; max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp .3s cubic-bezier(.34,1.4,.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 8px auto 14px;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-title { font-size: 18px; font-weight: 800; color: var(--text); }
    .modal-close {
      width: 32px; height: 32px;
      background: var(--bg); border: none; border-radius: 50%;
      color: var(--mid); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { color: var(--text); }

    .pay-summary {
      background: var(--bg); border-radius: 12px;
      padding: 14px; text-align: center; margin-bottom: 16px;
    }
    .pay-remaining { font-size: 32px; font-weight: 800; color: var(--text); }
    .pay-summary-row {
      display: flex; justify-content: center; gap: 16px;
      margin-top: 6px; font-size: 12px; color: var(--mid);
    }
    .pay-summary-row span { font-weight: 700; color: var(--text); }

    .pay-input-wrap {
      position: relative; margin-bottom: 12px;
    }
    .pay-prefix {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; font-weight: 700; color: var(--mid);
    }
    .pay-input {
      width: 100%; padding: 16px 16px 16px 42px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 28px; font-weight: 800; text-align: right;
      font-family: 'Inter', sans-serif; color: var(--text);
      outline: none; transition: border-color .18s;
    }
    .pay-input:focus { border-color: var(--blue-d); }

    .btn-fill-remaining {
      width: 100%; padding: 11px;
      background: rgba(37,99,235,.07);
      border: 1.5px solid rgba(37,99,235,.2);
      border-radius: var(--rpill);
      color: var(--blue-d); font-size: 13px; font-weight: 700;
      cursor: pointer; margin-bottom: 14px;
      font-family: 'Inter', sans-serif;
    }

    .pay-methods {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 14px;
    }
    .pay-method-btn {
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      background: var(--white); border-radius: 10px;
      cursor: pointer; font-weight: 600; font-size: 13px;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
      transition: all .18s; font-family: 'Inter', sans-serif;
      color: var(--text);
    }
    .pay-method-btn:hover {
      border-color: var(--blue-d);
      color: var(--blue-d);
      background: rgba(37,99,235,.04);
    }
    .pay-method-btn.pending {
      background: #fef3c7; color: #92400e; border-color: #fbbf24;
    }
    .pay-method-btn i { font-size: 18px; }

    .pay-list { margin-bottom: 4px; }
    .pay-list-label {
      font-size: 12px; font-weight: 700; color: var(--light);
      letter-spacing: .4px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .pay-list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px;
      background: var(--bg); border-radius: 8px;
      margin-bottom: 6px; font-size: 14px; font-weight: 600;
    }
    .pay-list-item button {
      background: none; border: none;
      color: var(--light); cursor: pointer; font-size: 15px;
      transition: color .15s;
    }
    .pay-list-item button:hover { color: var(--red); }

    .modal-actions {
      position: sticky; bottom: 0;
      padding: 12px 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--white);
      display: flex; gap: 8px;
    }
    .btn-modal-cancel {
      padding: 14px 20px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: var(--rpill);
      color: var(--mid); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-modal-submit {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, var(--green-d), var(--green));
      border: none; border-radius: var(--rpill);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: opacity .18s;
      box-shadow: 0 4px 12px rgba(5,150,105,.3);
    }
    .btn-modal-submit:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

    /* ── TOAST ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 90px;
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy); color: #fff;
      padding: 12px 20px; border-radius: var(--rpill);
      display: flex; align-items: center; gap: 9px;
      font-size: 14px; font-weight: 600;
      z-index: 9999; opacity: 0;
      transition: opacity .25s, transform .25s;
      white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-success i { color: var(--green); }
    .toast-error   i { color: #f87171; }
    .toast-info    i { color: #60a5fa; }

    /* ── CONFIRM DIALOG ──────────────────────── */
    .confirm-dialog {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
    }
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); }
    .confirm-box {
      background: var(--white);
      border-radius: 20px; padding: 28px 24px;
      max-width: 360px; width: 90%;
      position: relative; z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: slideUp .25s cubic-bezier(.34,1.56,.64,1);
    }
    .confirm-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .confirm-box p { font-size: 14px; color: var(--mid); line-height: 1.5; margin-bottom: 24px; }
    .confirm-buttons { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 12px;
      border: 1.5px solid var(--border); background: var(--white);
      border-radius: var(--rpill); font-weight: 700; font-size: 14px;
      cursor: pointer; color: var(--mid); font-family: 'Inter', sans-serif;
    }
    .btn-confirm {
      flex: 1; padding: 12px;
      background: linear-gradient(135deg, var(--green-d), var(--green));
      border: none; border-radius: var(--rpill);
      color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>

  <!-- ══ HEADER ════════════════════════════════════ -->
  <header class="hd">
    <div class="hd-top">
      <div class="hd-left">
        <a href="../index-funcionario.html" class="btn-icon-hd">
          <i class="fas fa-home"></i>
        </a>
        <div>
          <div class="hd-title">Ordens</div>
          <div class="hd-sub" id="empresaNome">Carregando...</div>
        </div>
      </div>
      <div class="hd-right">
        <a href="nova-ordem-funcionario.html" class="btn-new-hd">
          <i class="fas fa-plus"></i> Nova
        </a>
        <button class="btn-icon-hd" onclick="logout()" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" onclick="setFilter(this,'ACTIVE')">Ativas</button>
      <button class="ftab" onclick="setFilter(this,'PENDENTE')">Pendente</button>
      <button class="ftab" onclick="setFilter(this,'EM_ANDAMENTO')">Em Andamento</button>
      <button class="ftab" onclick="setFilter(this,'AGUARDANDO_PAGAMENTO')">Aguardando</button>
    </div>
  </header>

  <!-- ══ CONTENT ═══════════════════════════════════ -->
  <main class="main" id="mainContent"></main>

  <!-- ══ PAYMENT MODAL ══════════════════════════════ -->
  <div class="modal-overlay" id="paymentModal" onclick="if(event.target===this)closePaymentModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 class="modal-title">Registrar Pagamento</h2>
        <button class="modal-close" onclick="closePaymentModal()">✕</button>
      </div>

      <div class="pay-summary">
        <div class="pay-remaining" id="remainingAmount">R$ 0,00</div>
        <div class="pay-summary-row">
          <div>Total: <span id="totalAmount">R$ 0,00</span></div>
          <div>·</div>
          <div>Pago: <span id="paidAmount">R$ 0,00</span></div>
        </div>
      </div>

      <div class="pay-input-wrap">
        <span class="pay-prefix">R$</span>
        <input type="text" class="pay-input" id="paymentValueInput" placeholder="0,00"
               oninput="formatPaymentInput(event)">
      </div>

      <button class="btn-fill-remaining" onclick="fillRemainingAmount()">
        Preencher valor restante
      </button>

      <div class="pay-methods">
        <button class="pay-method-btn" onclick="addPayment('DINHEIRO')">
          <i class="fas fa-money-bill-wave"></i> Dinheiro
        </button>
        <button class="pay-method-btn" onclick="addPayment('PIX')">
          <i class="fab fa-pix"></i> PIX
        </button>
        <button class="pay-method-btn" onclick="addPayment('CARTAO')">
          <i class="fas fa-credit-card"></i> Cartão
        </button>
        <button class="pay-method-btn" onclick="addPayment('NFE')">
          <i class="fas fa-file-invoice"></i> NFe
        </button>
        <button class="pay-method-btn pending" onclick="addPayment('PENDENTE')">
          <i class="fas fa-clock"></i> Pendente
        </button>
      </div>

      <div class="pay-list" id="paymentsList"></div>

      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closePaymentModal()">Cancelar</button>
        <button class="btn-modal-submit" id="submitPaymentBtn" onclick="submitPayments()" disabled>
          Finalizar Ordem
        </button>
      </div>
    </div>
  </div>

  <script src="../api.js"></script>
  <script src="utils-funcionario.js"></script>
  <script>
    let currentOrdem = null;
    let currentFilter = 'ACTIVE';
    let currentView = 'list'; // 'list' | 'detail'
    let paymentModal = {
      isOpen: false, isProcessing: false,
      orderId: null, total: 0, paid: 0, remaining: 0,
      inputValue: '', payments: []
    };
    let paymentKeydownHandler = null;

    // ── INIT ─────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (!validateFuncionarioAccess()) return;
      await loadUserInfo();

      const urlParams = new URLSearchParams(window.location.search);
      const ordemId = urlParams.get('id');

      if (ordemId) {
        showDetailMode();
        await loadOrdemDetail(ordemId);
      } else {
        showListMode();
        await loadOrdens();
      }
    });

    // ── VIEW MODE ─────────────────────────────────
    function showListMode() {
      currentView = 'list';
      document.getElementById('filterTabs').classList.remove('hidden');
    }
    function showDetailMode() {
      currentView = 'detail';
      document.getElementById('filterTabs').classList.add('hidden');
    }

    // ── FILTER ───────────────────────────────────
    function setFilter(btn, status) {
      document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = status;
      loadOrdens();
    }

    // ── LOAD ORDENS ───────────────────────────────
    async function loadOrdens() {
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="quick-links">
          <a href="fila-entrada-funcionario.html" class="qlink qlink-amber">
            <i class="fas fa-bolt"></i> Fila de Entrada
          </a>
          <a href="servicos-funcionario.html" class="qlink">
            <i class="fas fa-wrench"></i> Serviços
          </a>
        </div>
        <div class="loading-wrap">
          <div class="spin"></div>
          <div class="loading-txt">Carregando ordens...</div>
        </div>
      `;

      try {
        const response = await window.api.getOrdens(1, 50, '', currentFilter);
        const ordens = response.data || response.ordens || [];

        let listHTML = `
          <div class="quick-links">
            <a href="fila-entrada-funcionario.html" class="qlink qlink-amber">
              <i class="fas fa-bolt"></i> Fila de Entrada
            </a>
            <a href="servicos-funcionario.html" class="qlink">
              <i class="fas fa-wrench"></i> Serviços
            </a>
          </div>
        `;

        if (ordens.length === 0) {
          listHTML += `
            <div class="empty-wrap">
              <div class="empty-icon"><i class="fas fa-inbox"></i></div>
              <div class="empty-title">Nenhuma ordem</div>
              <div class="empty-sub">Não há ordens neste status no momento.</div>
              <button class="btn-empty" onclick="window.location.href='nova-ordem-funcionario.html'">
                + Nova Ordem
              </button>
            </div>
          `;
        } else {
          listHTML += `<div class="orders-list">`;
          ordens.forEach(ordem => {
            const svcNomes = (ordem.servicos || []).map(s => s.nome).join(', ') || '—';
            const status = ordem.status || 'PENDENTE';
            const accClass = `acc-${status}`;
            const badgeClass = `sbadge-${status}`;
            const statusLabel = {
              PENDENTE: 'Pendente',
              EM_ANDAMENTO: 'Em Andamento',
              AGUARDANDO_PAGAMENTO: 'Aguardando',
              COMPLETO: 'Concluído'
            }[status] || status;

            const canDone = status === 'PENDENTE' || status === 'EM_ANDAMENTO';
            const canPay  = status === 'AGUARDANDO_PAGAMENTO';

            listHTML += `
              <div class="order-card" onclick="viewOrdem('${ordem.id}')">
                <div class="card-accent ${accClass}"></div>
                <div class="card-body">
                  <div class="card-top">
                    <div>
                      <div class="card-num"># ${ordem.numeroOrdem || ordem.id.substring(0,8).toUpperCase()}</div>
                      <div class="card-date">${formatDate(ordem.createdAt)}</div>
                    </div>
                    <span class="sbadge ${badgeClass}">${statusLabel}</span>
                  </div>
                  <div class="card-client">${ordem.cliente?.nome || '—'}</div>
                  <div class="card-meta">
                    ${ordem.veiculo?.placa ? `<span class="card-plate">${ordem.veiculo.placa}</span>` : ''}
                    <span class="card-svc">${svcNomes}</span>
                  </div>
                  <div class="card-divider"></div>
                  <div class="card-bottom">
                    <div class="card-value">${formatCurrency(ordem.valorTotal || ordem.valor)}</div>
                    <div class="card-actions" onclick="event.stopPropagation()">
                      ${canDone ? `
                        <button class="btn-card btn-card-done" onclick="markOrderCompletedFromTable('${ordem.id}')" title="Concluir">
                          <i class="fas fa-flag-checkered"></i>
                        </button>` : ''}
                      ${canPay ? `
                        <button class="btn-card btn-card-pay" onclick="openPaymentModalFromTable('${ordem.id}')" title="Pagar">
                          <i class="fas fa-credit-card"></i> Pagar
                        </button>` : ''}
                      <button class="btn-card btn-card-eye" onclick="viewOrdem('${ordem.id}')" title="Ver">
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            `;
          });
          listHTML += `</div>`;
        }

        main.innerHTML = listHTML;

      } catch (error) {
        console.error('Erro ao carregar ordens:', error);
        main.innerHTML = `
          <div class="empty-wrap">
            <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="empty-title">Erro ao carregar</div>
            <div class="empty-sub">Tente novamente em instantes.</div>
            <button class="btn-empty" onclick="loadOrdens()">Tentar novamente</button>
          </div>
        `;
      }
    }

    // ── LOAD ORDEM DETAIL ─────────────────────────
    async function loadOrdemDetail(ordemId) {
      const main = document.getElementById('mainContent');
      main.innerHTML = `<div class="loading-wrap"><div class="spin"></div><div class="loading-txt">Carregando...</div></div>`;

      try {
        const response = await window.api.getOrdemById(ordemId);
        currentOrdem = response.data || response;

        const status = currentOrdem.status || 'PENDENTE';
        const badgeClass = `sbadge-${status}`;
        const statusLabel = {
          PENDENTE: 'Pendente',
          EM_ANDAMENTO: 'Em Andamento',
          AGUARDANDO_PAGAMENTO: 'Aguardando Pgto',
          COMPLETO: 'Concluído'
        }[status] || status;

        const lavNomes = (currentOrdem.lavadores || [])
          .map(l => l.nome || l).join(', ') || '—';

        let svcHtml = '';
        if ((currentOrdem.servicos || []).length > 0) {
          svcHtml = `
            <div class="detail-card">
              <div class="detail-card-title"><i class="fas fa-broom" style="margin-right:6px"></i>Serviços</div>
              ${currentOrdem.servicos.map(s => `
                <div class="svc-row">
                  <span class="svc-name">${s.nome}</span>
                  <span class="svc-price">${formatCurrency(s.preco)}</span>
                </div>
              `).join('')}
            </div>
          `;
        }

        let addHtml = '';
        if ((currentOrdem.adicionais || []).length > 0) {
          addHtml = `
            <div class="detail-card">
              <div class="detail-card-title"><i class="fas fa-plus-circle" style="margin-right:6px"></i>Adicionais</div>
              ${currentOrdem.adicionais.map(a => `
                <div class="svc-row">
                  <span class="svc-name">${a.nome}</span>
                  <span class="svc-price">${formatCurrency(a.preco)}</span>
                </div>
              `).join('')}
            </div>
          `;
        }

        let obsHtml = '';
        if (currentOrdem.observacoes) {
          obsHtml = `
            <div class="detail-card">
              <div class="detail-card-title"><i class="fas fa-note-sticky" style="margin-right:6px"></i>Observações</div>
              <p class="obs-text">${currentOrdem.observacoes}</p>
            </div>
          `;
        }

        // Sticky action buttons
        let actionsHtml = `<button class="btn-action btn-action-back" onclick="goBack()">
          <i class="fas fa-arrow-left"></i> Voltar
        </button>`;

        if (status === 'EM_ANDAMENTO' || status === 'PENDENTE') {
          actionsHtml += `<button class="btn-action btn-action-done" onclick="markAsComplete()">
            <i class="fas fa-flag-checkered"></i> Concluir
          </button>`;
        }
        if (status === 'AGUARDANDO_PAGAMENTO') {
          actionsHtml += `<button class="btn-action btn-action-pay" onclick="openPaymentModal(currentOrdem)">
            <i class="fas fa-credit-card"></i> Pagar
          </button>`;
        }
        if (status !== 'COMPLETO') {
          actionsHtml += `<button class="btn-action btn-action-edit" onclick="editOrdem('${currentOrdem.id}')">
            <i class="fas fa-edit"></i>
          </button>`;
        }

        main.innerHTML = `
          <div class="detail-wrap">
            <div class="detail-hero">
              <div class="detail-hero-top">
                <div>
                  <div class="detail-num"># ${currentOrdem.numeroOrdem || currentOrdem.id.substring(0,8).toUpperCase()}</div>
                  <div class="detail-hero-date">${formatDate(currentOrdem.createdAt)}</div>
                </div>
                <span class="sbadge ${badgeClass}">${statusLabel}</span>
              </div>
              <div class="detail-value">${formatCurrency(currentOrdem.valorTotal || currentOrdem.valor)}</div>
              <div class="detail-value-label">Valor total</div>
            </div>

            <div class="detail-card">
              <div class="detail-card-title">Informações</div>
              <div class="info-grid">
                <div class="info-item">
                  <div class="info-label">Cliente</div>
                  <div class="info-value">${currentOrdem.cliente?.nome || '—'}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Placa</div>
                  <div class="info-value">
                    ${currentOrdem.veiculo?.placa
                      ? `<span class="info-value-plate">${currentOrdem.veiculo.placa}</span>`
                      : '—'}
                  </div>
                </div>
                <div class="info-item">
                  <div class="info-label">Pagamento</div>
                  <div class="info-value">${currentOrdem.metodoPagamento || '—'}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Lavadores</div>
                  <div class="info-value">${lavNomes}</div>
                </div>
              </div>
            </div>

            ${svcHtml}
            ${addHtml}
            ${obsHtml}
          </div>

          <div class="sticky-actions">${actionsHtml}</div>
        `;

      } catch (error) {
        console.error('Erro:', error);
        main.innerHTML = `
          <div class="empty-wrap">
            <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="empty-title">Erro ao carregar</div>
            <button class="btn-empty" onclick="goBack()">Voltar</button>
          </div>
        `;
      }
    }

    // ── MARK AS COMPLETE ──────────────────────────
    async function markAsComplete() {
      if (!currentOrdem) return;
      showConfirm(
        'Concluir Lavagem',
        'Confirma que a lavagem foi concluída?',
        () => updateOrdemStatus('AGUARDANDO_PAGAMENTO')
      );
    }

    async function markOrderCompletedFromTable(ordemId) {
      try {
        const response = await window.api.getOrdemById(ordemId);
        currentOrdem = response.data || response;
        markAsComplete();
      } catch {
        showToast('Erro ao carregar ordem.', 'error');
      }
    }

    async function openPaymentModalFromTable(ordemId) {
      try {
        const response = await window.api.getOrdemById(ordemId);
        currentOrdem = response.data || response;
        openPaymentModal(currentOrdem);
      } catch {
        showToast('Erro ao carregar ordem.', 'error');
      }
    }

    // ── UPDATE STATUS ─────────────────────────────
    async function updateOrdemStatus(newStatus) {
      try {
        await window.api.updateOrdem(currentOrdem.id, { status: newStatus });
        showToast('Ordem atualizada!', 'success');
        if (currentView === 'detail') {
          await loadOrdemDetail(currentOrdem.id);
        } else {
          await loadOrdens();
        }
      } catch {
        showToast('Erro ao atualizar ordem.', 'error');
      }
    }

    // ── PAYMENT MODAL ─────────────────────────────
    function openPaymentModal(order) {
      if (!order) return;
      if (order.status !== 'AGUARDANDO_PAGAMENTO') {
        showToast('Conclua a lavagem antes de registrar pagamento.', 'error');
        return;
      }
      paymentModal.orderId   = order.id;
      paymentModal.total     = order.valorTotal || order.valor || 0;
      paymentModal.paid      = (order.pagamentos || [])
        .filter(p => p.status === 'PAGO')
        .reduce((s, p) => s + p.valor, 0);
      paymentModal.remaining = paymentModal.total - paymentModal.paid;
      paymentModal.inputValue = '';
      paymentModal.payments  = [];
      paymentModal.isOpen    = true;

      updatePaymentModalUI();
      document.getElementById('paymentModal').classList.add('active');
      setTimeout(() => {
        const inp = document.getElementById('paymentValueInput');
        if (inp) { inp.focus(); inp.select(); }
      }, 80);
      bindPaymentHotkeys();
    }

    function closePaymentModal() {
      paymentModal.isOpen = false;
      paymentModal.payments = [];
      paymentModal.inputValue = '';
      document.getElementById('paymentModal').classList.remove('active');
      unbindPaymentHotkeys();
    }

    function updatePaymentModalUI() {
      document.getElementById('remainingAmount').textContent = formatCurrency(paymentModal.remaining);
      document.getElementById('totalAmount').textContent     = formatCurrency(paymentModal.total);
      document.getElementById('paidAmount').textContent      = formatCurrency(paymentModal.paid);
      document.getElementById('paymentValueInput').value     = paymentModal.inputValue;

      const listDiv = document.getElementById('paymentsList');
      if (paymentModal.payments.length === 0) {
        listDiv.innerHTML = '';
        document.getElementById('submitPaymentBtn').disabled = true;
      } else {
        let html = `<div class="pay-list-label">Pagamentos adicionados</div>`;
        paymentModal.payments.forEach((p, i) => {
          html += `
            <div class="pay-list-item">
              <span>${p.method} — ${formatCurrency(p.amount)}</span>
              <button onclick="removePayment(${i})"><i class="fas fa-times"></i></button>
            </div>
          `;
        });
        listDiv.innerHTML = html;
        document.getElementById('submitPaymentBtn').disabled = false;
      }
    }

    function formatPaymentInput(event) {
      let value = event.target.value.replace(/\D/g, '');
      value = (parseInt(value, 10) / 100).toFixed(2);
      if (isNaN(value)) value = '0.00';
      paymentModal.inputValue = value.replace('.', ',');
      event.target.value = paymentModal.inputValue;
    }

    function fillRemainingAmount() {
      paymentModal.inputValue = paymentModal.remaining.toFixed(2).replace('.', ',');
      document.getElementById('paymentValueInput').value = paymentModal.inputValue;
    }

    function addPayment(method) {
      let amount = parseFloat(paymentModal.inputValue.replace(',', '.')) || 0;
      if (method === 'PENDENTE' && amount === 0) amount = paymentModal.remaining > 0 ? paymentModal.remaining : 0;
      if (amount <= 0) { showToast('Valor deve ser maior que zero.', 'error'); return; }
      if (amount > paymentModal.remaining + 0.01) { showToast('Valor maior que o restante.', 'error'); return; }
      paymentModal.payments.push({ method, amount });
      paymentModal.remaining -= amount;
      paymentModal.inputValue = '';
      updatePaymentModalUI();
    }

    function removePayment(index) {
      const removed = paymentModal.payments.splice(index, 1);
      if (removed.length > 0) paymentModal.remaining += removed[0].amount;
      updatePaymentModalUI();
    }

    function bindPaymentHotkeys() {
      unbindPaymentHotkeys();
      paymentKeydownHandler = (e) => {
        if (!paymentModal.isOpen) return;
        const isEditable = e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA');
        if (isEditable && e.target.id !== 'paymentValueInput') return;
        if (e.key === 'Escape') { e.preventDefault(); closePaymentModal(); return; }
        if (e.key === 'Backspace') { e.preventDefault(); updatePaymentInputByKey('BACKSPACE'); return; }
        if (/^[0-9]$/.test(e.key)) { e.preventDefault(); updatePaymentInputByKey(e.key); }
      };
      document.addEventListener('keydown', paymentKeydownHandler);
    }
    function unbindPaymentHotkeys() {
      if (paymentKeydownHandler) {
        document.removeEventListener('keydown', paymentKeydownHandler);
        paymentKeydownHandler = null;
      }
    }
    function updatePaymentInputByKey(key) {
      const input = document.getElementById('paymentValueInput');
      if (!input) return;
      let digits = (input.value || '').replace(/\D/g, '');
      if (key === 'BACKSPACE') digits = digits.slice(0, -1);
      else digits += key;
      input.value = digits;
      formatPaymentInput({ target: input });
      input.value = paymentModal.inputValue;
    }

    async function submitPayments() {
      if (paymentModal.payments.length === 0) { showToast('Adicione pelo menos um pagamento.', 'error'); return; }
      if (paymentModal.remaining > 0.01) {
        showConfirm(
          'Saldo Pendente',
          `Resta ${formatCurrency(paymentModal.remaining)}. Registrar como PENDENTE?`,
          () => {
            paymentModal.payments.push({ method: 'PENDENTE', amount: parseFloat(paymentModal.remaining.toFixed(2)) });
            confirmAndProcess();
          }
        );
        return;
      }
      confirmAndProcess();
    }

    function confirmAndProcess() {
      const total = paymentModal.payments.reduce((s, p) => s + p.amount, 0);
      showConfirm(
        'Confirmar Finalização',
        `Finalizar esta ordem? Total: ${formatCurrency(total)}`,
        () => processPayments()
      );
    }

    async function processPayments() {
      if (!paymentModal.payments?.length) { showToast('Adicione pelo menos um pagamento.', 'error'); return; }
      const submitBtn = document.getElementById('submitPaymentBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';
      paymentModal.isProcessing = true;

      const payload = {
        pagamentos: paymentModal.payments.map(p => ({
          metodo: p.method.toUpperCase().trim(),
          valor: parseFloat(p.amount).toFixed(2)
        }))
      };

      try {
        await window.api.finalizarOrdem(paymentModal.orderId, payload);
        showToast('Ordem finalizada com sucesso!', 'success');
        closePaymentModal();
        if (currentOrdem?.id === paymentModal.orderId) goBack();
        setTimeout(() => loadOrdens(), 300);
      } catch (error) {
        showToast(`Erro: ${error.error || 'Tente novamente.'}`, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Finalizar Ordem';
        paymentModal.isProcessing = false;
      }
    }

    // ── NAV ───────────────────────────────────────
    function viewOrdem(id) {
      showDetailMode();
      window.history.pushState({}, '', `?id=${id}`);
      loadOrdemDetail(id);
    }

    function editOrdem(id) {
      window.location.href = `nova-ordem-funcionario.html?edit=${id}`;
    }

    function goBack() {
      showListMode();
      window.history.pushState({}, '', 'ordens-funcionario.html');
      currentOrdem = null;
      loadOrdens();
    }

    // ── UTILS ─────────────────────────────────────
    function formatCurrency(value) {
      if (!value) return 'R$ 0,00';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    }
    function formatDate(date) {
      if (!date) return '—';
      return new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(new Date(date));
    }
    async function loadUserInfo() {
      const empresaNomeEl = document.getElementById('empresaNome');
      let nome = localStorage.getItem('empresaNome');
      if (!nome) {
        const empresaId = localStorage.getItem('empresaId');
        if (empresaId) {
          try {
            const data = await window.api.getEmpresaById(empresaId);
            nome = data.nome || data.name || 'Minha Empresa';
            localStorage.setItem('empresaNome', nome);
          } catch { nome = 'Minha Empresa'; }
        } else { nome = 'Minha Empresa'; }
      }
      if (empresaNomeEl) empresaNomeEl.textContent = nome;
    }

    // ── TOAST ─────────────────────────────────────
    function showToast(message, type = 'success') {
      const old = document.getElementById('_toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.id = '_toast';
      t.className = `toast toast-${type}`;
      const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
      t.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
    }

    // ── CONFIRM ───────────────────────────────────
    function showConfirm(title, message, onConfirm, onCancel = null) {
      const d = document.createElement('div');
      d.className = 'confirm-dialog';
      d.innerHTML = `
        <div class="confirm-overlay"></div>
        <div class="confirm-box">
          <h2>${title}</h2>
          <p>${message}</p>
          <div class="confirm-buttons">
            <button class="btn-cancel" id="cfnCancel">Cancelar</button>
            <button class="btn-confirm" id="cfnOk">Confirmar</button>
          </div>
        </div>
      `;
      document.body.appendChild(d);
      d.querySelector('#cfnCancel').addEventListener('click', () => { d.remove(); onCancel?.(); });
      d.querySelector('#cfnOk').addEventListener('click', () => { d.remove(); onConfirm?.(); });
    }

    // ── LOGOUT ────────────────────────────────────
    function logout() {
      showConfirm('Sair', 'Tem certeza que deseja sair?', () => {
        showToast('Até logo!', 'success');
        setTimeout(() => { localStorage.clear(); window.location.href = '../login.html'; }, 500);
      });
    }
  </script>
</body>
</html>
