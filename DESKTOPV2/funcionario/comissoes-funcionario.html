<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Comissões — Lina X</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --navy:   #0f172a;
      --navy-m: #1e293b;
      --blue-d: #2563eb;
      --blue:   #3b82f6;
      --green:  #059669;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --orange: #f97316;
      --purple: #8b5cf6;
      --bg:     #f1f5f9;
      --white:  #ffffff;
      --border: #e2e8f0;
      --text:   #0f172a;
      --muted:  #64748b;
      --light:  #94a3b8;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    .hdr {
      background: var(--navy);
      position: sticky; top: 0; z-index: 40;
      flex-shrink: 0;
    }
    .hdr-top {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .hdr-logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; text-decoration: none;
      transition: background .18s;
    }
    .hdr-logo:hover { background: rgba(255,255,255,.2); }
    .hdr-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .hdr-sub   { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
    .hdr-right { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.7);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; cursor: pointer; text-decoration: none;
      transition: background .18s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.18); }

    /* Employee chips row (inside header) */
    .emp-row {
      display: flex; gap: 6px;
      overflow-x: auto; padding: 0 16px 12px;
      scrollbar-width: none;
    }
    .emp-row::-webkit-scrollbar { display: none; }
    .emp-chip {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px 5px 8px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.6);
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all .18s;
    }
    .emp-chip:hover { background: rgba(255,255,255,.15); color: #fff; }
    .emp-chip.active {
      background: var(--blue-d);
      border-color: var(--blue-d);
      color: #fff;
    }
    .emp-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
    }
    .emp-chip.active .emp-avatar { background: rgba(255,255,255,.25); }

    /* ── MENU DROPDOWN ── */
    .menu-dropdown {
      display: none; position: fixed;
      top: 58px; right: 12px;
      background: var(--white); border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      min-width: 190px; z-index: 500;
      overflow: hidden;
    }
    .menu-dropdown.active { display: block; }
    .menu-dropdown a, .menu-dropdown button {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px; text-decoration: none;
      color: var(--text); font-size: 13px; font-weight: 500;
      border: none; background: none; width: 100%; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background .15s;
    }
    .menu-dropdown a:hover, .menu-dropdown button:hover { background: var(--bg); }
    .menu-dropdown button:last-child { color: var(--red); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 499; }
    .overlay.active { display: block; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 14px 14px 100px; }

    /* Period filter */
    .period-bar {
      display: flex; gap: 6px; margin-bottom: 12px;
      overflow-x: auto; scrollbar-width: none;
    }
    .period-bar::-webkit-scrollbar { display: none; }
    .period-chip {
      flex-shrink: 0;
      padding: 7px 14px; border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--muted);
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .18s;
    }
    .period-chip.active {
      background: var(--navy); border-color: var(--navy); color: #fff;
    }
    .date-row {
      display: none; gap: 8px; align-items: center;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .date-row.show { display: flex; }
    .date-row input {
      flex: 1; min-width: 120px; padding: 8px 10px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
      background: var(--white);
    }
    .date-row input:focus { border-color: var(--blue-d); }
    .btn-buscar {
      padding: 8px 16px; border-radius: 9px;
      background: var(--blue-d); color: #fff;
      border: none; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }

    /* Stats card */
    .stats-card {
      background: var(--navy);
      border-radius: 14px;
      padding: 18px 18px 14px;
      margin-bottom: 14px;
      color: #fff;
    }
    .stats-name {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,.55);
      margin-bottom: 2px;
    }
    .stats-comiss-pct {
      display: inline-block;
      background: rgba(37,99,235,.35);
      color: #93c5fd;
      border-radius: 999px;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; margin-left: 6px;
    }
    .stats-total-label {
      font-size: 11px; color: rgba(255,255,255,.45);
      text-transform: uppercase; letter-spacing: .4px;
      margin-top: 10px; margin-bottom: 4px;
    }
    .stats-total-value {
      font-size: 30px; font-weight: 800; letter-spacing: -.5px;
    }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .stats-pill {
      background: rgba(255,255,255,.07);
      border-radius: 10px;
      padding: 10px 10px 8px;
    }
    .stats-pill-val {
      font-size: 15px; font-weight: 800; color: #fff;
    }
    .stats-pill-lbl {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .3px;
      margin-top: 3px;
    }

    /* Status filter */
    .status-filter {
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
      margin-bottom: 12px;
    }
    .status-filter::-webkit-scrollbar { display: none; }
    .sf-chip {
      flex-shrink: 0;
      padding: 5px 12px; border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--muted);
      font-size: 11px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .18s;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .sf-chip.active-all    { background: var(--navy);  border-color: var(--navy);   color: #fff; }
    .sf-chip.active-fin    { background: var(--green); border-color: var(--green);  color: #fff; }
    .sf-chip.active-ag     { background: var(--orange);border-color: var(--orange); color: #fff; }
    .sf-chip.active-em     { background: var(--blue-d);border-color: var(--blue-d); color: #fff; }

    /* Section label */
    .section-lbl {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 8px;
    }

    /* Order cards */
    .orders-list { display: flex; flex-direction: column; gap: 9px; }
    .ord-card {
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      overflow: hidden;
      display: flex;
    }
    .ord-accent { width: 4px; flex-shrink: 0; }
    .acc-FINALIZADO           { background: var(--green); }
    .acc-AGUARDANDO_PAGAMENTO { background: var(--orange); }
    .acc-EM_ANDAMENTO         { background: var(--blue); }
    .acc-PENDENTE             { background: var(--amber); }
    .acc-CANCELADO            { background: var(--light); }

    .ord-body { flex: 1; padding: 12px 13px; min-width: 0; }
    .ord-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      margin-bottom: 6px;
    }
    .ord-num  { font-size: 11px; font-weight: 700; color: var(--muted); }
    .ord-date { font-size: 11px; color: var(--light); margin-top: 1px; }
    .s-badge {
      flex-shrink: 0; padding: 3px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .2px;
    }
    .s-FINALIZADO           { background: rgba(5,150,105,.1);  color: #065f46; }
    .s-AGUARDANDO_PAGAMENTO { background: rgba(249,115,22,.1); color: #c2410c; }
    .s-EM_ANDAMENTO         { background: rgba(37,99,235,.1);  color: #1d4ed8; }
    .s-PENDENTE             { background: rgba(245,158,11,.1); color: #92400e; }
    .s-CANCELADO            { background: rgba(100,116,139,.1);color: var(--muted); }

    .ord-client { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ord-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag-model {
      display: inline-flex; align-items: center;
      background: var(--bg); color: var(--text);
      font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 5px;
      border: 1px solid var(--border);
    }
    .tag-plate {
      display: inline-flex; align-items: center;
      background: var(--navy); color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px;
      letter-spacing: .5px;
    }
    .tag-svc {
      font-size: 11px; color: var(--muted); font-weight: 500;
    }
    .ord-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .ord-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ord-valor { font-size: 13px; color: var(--muted); }
    .ord-valor strong { color: var(--text); }
    .ord-comiss {
      display: flex; align-items: center; gap: 6px;
    }
    .comiss-pill {
      background: rgba(5,150,105,.1);
      color: var(--green); border-radius: 999px;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px;
    }
    .comiss-val {
      font-size: 16px; font-weight: 800; color: var(--green);
    }

    /* Loading / empty */
    .loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; padding: 56px 20px; gap: 12px;
    }
    .spin {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue-d);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 14px; color: var(--muted); font-weight: 500; }
    .empty-wrap {
      display: flex; flex-direction: column;
      align-items: center; padding: 56px 20px; text-align: center; gap: 10px;
    }
    .empty-ico {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--light); margin-bottom: 4px;
    }
    .empty-title { font-size: 16px; font-weight: 700; }
    .empty-sub   { font-size: 13px; color: var(--muted); max-width: 220px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 14px; right: 14px;
      background: var(--navy); color: #fff;
      padding: 13px 16px; border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600;
      transform: translateY(120px); opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
      z-index: 2000; max-width: 420px; margin: 0 auto;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #064e3b; }
    .toast.error   { background: #7f1d1d; }

    /* ── MOBILE NAV (gerado por utils-funcionario.js) ── */
    .mobile-bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      height: 64px; z-index: 200;
      box-shadow: 0 -2px 12px rgba(0,0,0,.07);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: var(--light);
      font-size: 10px; font-weight: 600; gap: 4px;
      border: none; background: none; cursor: pointer;
      border-top: 3px solid transparent;
      font-family: 'Inter', sans-serif;
      transition: color .18s;
    }
    .nav-item i { font-size: 20px; }
    .nav-item:hover { color: var(--blue-d); }
    .nav-item.active { color: var(--blue-d); border-top-color: var(--blue-d); }

    @media (min-width: 600px) {
      .main { padding: 18px 20px 100px; max-width: 640px; margin: 0 auto; }
      .stats-total-value { font-size: 34px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-top">
      <div class="hdr-left">
        <a href="../index-funcionario.html" class="hdr-logo">
          <i class="fas fa-arrow-left"></i>
        </a>
        <div>
          <div class="hdr-title">Comissões</div>
          <div class="hdr-sub" id="empresaNome">Carregando...</div>
        </div>
      </div>
      <div class="hdr-right">
        <a href="../perfil-funcionario.html" class="icon-btn"><i class="fas fa-user-circle"></i></a>
        <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        <button class="icon-btn" onclick="toggleMenu()"><i class="fas fa-ellipsis-v"></i></button>
      </div>
    </div>
    <!-- Employee chips -->
    <div class="emp-row" id="empRow">
      <div class="loading-txt" style="color:rgba(255,255,255,.35);font-size:12px;padding-bottom:12px;">Carregando...</div>
    </div>
  </header>

  <!-- MENU -->
  <div class="menu-dropdown" id="menuDropdown">
    <a href="../index-funcionario.html"><i class="fas fa-home"></i> Início</a>
    <a href="ordens-funcionario.html"><i class="fas fa-list-alt"></i> Ordens</a>
    <a href="financeiro-funcionario.html"><i class="fas fa-money-bill-wave"></i> Financeiro</a>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
  </div>
  <div class="overlay" id="overlay" onclick="closeMenu()"></div>

  <!-- MAIN -->
  <main class="main">
    <!-- Period filter -->
    <div class="period-bar">
      <button class="period-chip active" id="pre-today"  onclick="setPreset('today')">Hoje</button>
      <button class="period-chip"        id="pre-week"   onclick="setPreset('week')">Semana</button>
      <button class="period-chip"        id="pre-month"  onclick="setPreset('month')">Mês</button>
      <button class="period-chip"        id="pre-abertas" onclick="setPreset('abertas')">Abertas</button>
      <button class="period-chip"        id="pre-custom" onclick="setPreset('custom')">Período</button>
    </div>
    <div class="date-row" id="dateRow">
      <input type="date" id="dInicio">
      <span style="color:var(--muted);font-size:13px;">até</span>
      <input type="date" id="dFim">
      <button class="btn-buscar" onclick="applyCustom()">Buscar</button>
    </div>

    <!-- Stats card -->
    <div id="statsCard"></div>

    <!-- Status filter -->
    <div class="status-filter" id="statusFilter" style="display:none">
      <button class="sf-chip active-all" id="sf-all" onclick="setStatusFilter('')">Todos</button>
      <button class="sf-chip" id="sf-fin" onclick="setStatusFilter('FINALIZADO')">Finalizado</button>
      <button class="sf-chip" id="sf-ag"  onclick="setStatusFilter('AGUARDANDO_PAGAMENTO')">Aguardando</button>
      <button class="sf-chip" id="sf-em"  onclick="setStatusFilter('EM_ANDAMENTO')">Em andamento</button>
    </div>

    <!-- Orders list -->
    <div class="section-lbl" id="listLabel" style="display:none">Ordens a receber</div>
    <div id="orderList"></div>

    <!-- Debits section -->
    <div class="section-lbl" id="debitLabel" style="display:none;margin-top:14px">Débitos pendentes</div>
    <div id="debitList"></div>
  </main>

  <!-- MOBILE NAV -->
  <nav id="mobileNav"></nav>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <i id="toastIco" class="fas fa-check-circle"></i>
    <span id="toastMsg"></span>
  </div>

  <script src="../api.js"></script>
  <script src="utils-funcionario.js"></script>
  <script>
    const PAGE_TITLE  = 'Comissões';
    const PAGE_ACTIVE = 'comissoes';

    let funcionarios       = [];
    let selectedId         = null;
    // Dados retornados pelo getDadosComissao
    let ordensComissao     = []; // ordens com comissaoPaga: false
    let adiantamentosPend  = []; // adiantamentos com status PENDENTE
    let debitosOS          = []; // OS com pagamento DEBITO_FUNCIONARIO
    let activePreset       = 'today';
    let activeStatusFilter = '';
    let dateInicio         = '';
    let dateFim            = '';

    // ── INIT ──
    document.addEventListener('DOMContentLoaded', async () => {
      if (!validateFuncionarioAccess()) return;

      const perms = JSON.parse(localStorage.getItem('permissoes') || '[]');
      if (!perms.includes('gerenciar_funcionarios')) {
        showToast('Sem permissão para comissões', 'error');
        setTimeout(() => { window.location.href = '../index-funcionario.html'; }, 1500);
        return;
      }

      document.getElementById('mobileNav').innerHTML = createMobileNav(PAGE_ACTIVE);
      await loadUserInfo();
      setPreset('today', false);
      await loadFuncionarios();
    });

    // ── PERÍODO ──
    function setPreset(preset, reload = true) {
      activePreset = preset;
      document.querySelectorAll('.period-chip').forEach(c => c.classList.remove('active'));
      document.getElementById('pre-' + preset)?.classList.add('active');
      const dateRow = document.getElementById('dateRow');

      if (preset === 'custom') { dateRow.classList.add('show'); return; }
      dateRow.classList.remove('show');

      const now   = new Date();
      const pad   = n => String(n).padStart(2, '0');
      const fmt   = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const today = fmt(now);

      if (preset === 'today') {
        dateInicio = today; dateFim = today;
      } else if (preset === 'week') {
        const mon = new Date(now);
        mon.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
        dateInicio = fmt(mon); dateFim = today;
      } else if (preset === 'month') {
        dateInicio = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
        dateFim = today;
      } else if (preset === 'abertas') {
        // Sem datas: backend retorna todas as comissões pendentes (sem limite de data)
        dateInicio = ''; dateFim = '';
      }

      if (reload && selectedId) loadOrdens();
    }

    function applyCustom() {
      dateInicio = document.getElementById('dInicio').value;
      dateFim    = document.getElementById('dFim').value;
      if (!dateInicio || !dateFim) { showToast('Selecione as duas datas', 'error'); return; }
      if (dateInicio > dateFim)    { showToast('Data inicial deve ser antes da final', 'error'); return; }
      if (selectedId) loadOrdens();
    }

    // ── STATUS FILTER ──
    function setStatusFilter(status) {
      activeStatusFilter = status;
      document.querySelectorAll('.sf-chip').forEach(c => { c.className = 'sf-chip'; });
      const map = { '':'active-all', 'FINALIZADO':'active-fin', 'AGUARDANDO_PAGAMENTO':'active-ag', 'EM_ANDAMENTO':'active-em' };
      const ids = { '':'sf-all', 'FINALIZADO':'sf-fin', 'AGUARDANDO_PAGAMENTO':'sf-ag', 'EM_ANDAMENTO':'sf-em' };
      document.getElementById(ids[status])?.classList.add(map[status]);
      renderOrdens();
    }

    // ── MULTI-WASH: retorna o ganho do lavador numa ordem ──
    function getWasherShare(order, lavadorId) {
      const washers = [];
      if (Array.isArray(order.ordemLavadores) && order.ordemLavadores.length > 0) {
        order.ordemLavadores.forEach(ol => {
          const id = ol.lavadorId || ol.id;
          if (id) washers.push({ id, ganho: typeof ol.ganho === 'number' ? ol.ganho : undefined });
        });
      } else if (order.lavadorId) {
        const ganho = typeof order.comissao === 'number' ? order.comissao : undefined;
        washers.push({ id: order.lavadorId, ganho });
      }
      if (!washers.length) return 0;

      // Se o registro já tem ganho individual calculado, usa direto
      const existing = washers.find(w => w.id === lavadorId && typeof w.ganho === 'number');
      if (existing) return existing.ganho;

      // Fallback: divide proporcionalmente
      const pct = order.lavador?.comissao ?? 0;
      const totalCents = Math.round((order.valorTotal || 0) * (pct / 100) * 100);
      if (totalCents <= 0) return 0;
      const base = Math.floor(totalCents / washers.length);
      let remainder = totalCents % washers.length;
      const shareMap = {};
      washers.forEach(w => {
        let cents = base;
        if (remainder > 0) { cents += 1; remainder--; }
        shareMap[w.id] = cents / 100;
      });
      return shareMap[lavadorId] || 0;
    }

    // ── FUNCIONÁRIOS ──
    async function loadFuncionarios() {
      try {
        const r = await window.api.getLavadores();
        funcionarios = r.lavadores || r || [];

        if (!funcionarios.length) {
          document.getElementById('empRow').innerHTML =
            '<span style="color:rgba(255,255,255,.3);font-size:12px;padding-bottom:12px;">Nenhum funcionário</span>';
          document.getElementById('statsCard').innerHTML = emptyHtml('fa-users', 'Nenhum funcionário', 'Cadastre funcionários para ver comissões.');
          return;
        }

        renderEmpChips();
        selectedId = funcionarios[0].id;
        document.getElementById('empRow').querySelector(`[data-id="${selectedId}"]`)?.classList.add('active');
        await loadOrdens();
      } catch (e) {
        document.getElementById('empRow').innerHTML =
          '<span style="color:rgba(255,255,255,.35);font-size:12px;padding-bottom:12px;">Erro ao carregar</span>';
        showToast('Erro ao carregar funcionários', 'error');
      }
    }

    function renderEmpChips() {
      const colors = ['#2563eb','#059669','#f59e0b','#ef4444','#8b5cf6','#f97316'];
      document.getElementById('empRow').innerHTML = funcionarios.map((f, i) => {
        const inicial = (f.nome || 'F').charAt(0).toUpperCase();
        const color   = colors[i % colors.length];
        return `
          <button class="emp-chip" data-id="${f.id}" onclick="selectFuncionario('${f.id}')">
            <div class="emp-avatar" style="background:${color}22;color:${color}">${inicial}</div>
            ${f.nome.split(' ')[0]}
          </button>`;
      }).join('');
    }

    async function selectFuncionario(id) {
      selectedId = id;
      document.querySelectorAll('.emp-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.id === id);
      });
      await loadOrdens();
    }

    // ── CARREGAR DADOS (usa getDadosComissao — mesma fonte do admin) ──
    async function loadOrdens() {
      document.getElementById('statsCard').innerHTML = loadingHtml();
      document.getElementById('orderList').innerHTML = '';
      document.getElementById('debitList').innerHTML = '';
      document.getElementById('statusFilter').style.display = 'none';
      document.getElementById('listLabel').style.display    = 'none';
      document.getElementById('debitLabel').style.display   = 'none';

      try {
        const params = { lavadorId: selectedId };
        // Para "abertas": sem datas → backend retorna todas as pendentes
        if (dateInicio && dateFim) {
          params.dataInicio = dateInicio;
          params.dataFim    = dateFim;
        }

        const resp = await window.api.getDadosComissao(params);
        ordensComissao    = resp.comissoes    || [];
        adiantamentosPend = resp.adiantamentos || [];
        debitosOS         = resp.debitosOS    || [];

        renderStats();
        renderOrdens();
        renderDebitos();

        document.getElementById('statusFilter').style.display = ordensComissao.length ? 'flex'  : 'none';
        document.getElementById('listLabel').style.display    = ordensComissao.length ? 'block' : 'none';

        const temDebitos = adiantamentosPend.length > 0 || debitosOS.length > 0;
        document.getElementById('debitLabel').style.display = temDebitos ? 'block' : 'none';
      } catch (e) {
        document.getElementById('statsCard').innerHTML = emptyHtml('fa-exclamation-triangle', 'Erro ao carregar', 'Tente novamente.');
        showToast('Erro ao carregar comissões', 'error');
      }
    }

    // ── STATS ──
    function renderStats() {
      const func = funcionarios.find(f => f.id === selectedId);
      if (!func) return;
      const pct = parseFloat(func.comissao) || 0;

      // Comissão bruta: soma o ganho deste lavador em cada ordem pendente
      const totalComissao = ordensComissao.reduce((s, o) => s + getWasherShare(o, selectedId), 0);

      // Débitos: adiantamentos pendentes + débitos de OS
      const totalAdianto  = adiantamentosPend.reduce((s, a) => s + (parseFloat(a.valor) || 0), 0);
      const totalDebOS    = debitosOS.reduce((s, o) => s + getWasherShare(o, selectedId), 0);
      const totalDebitos  = totalAdianto + totalDebOS;

      // Saldo real a receber
      const saldoLiquido  = totalComissao - totalDebitos;

      const labelPeriodo = { today: 'Hoje', week: 'Esta semana', month: 'Este mês', abertas: 'Todas abertas', custom: 'Período' }[activePreset] || '';

      document.getElementById('statsCard').innerHTML = `
        <div class="stats-card">
          <div class="stats-name">
            ${func.nome}
            <span class="stats-comiss-pct">${pct}% comissão</span>
          </div>
          <div class="stats-total-label">A receber (líquido) — ${labelPeriodo}</div>
          <div class="stats-total-value" style="color:${saldoLiquido < 0 ? 'var(--red)' : '#fff'}">${formatCurrency(saldoLiquido)}</div>
          <div class="stats-grid">
            <div class="stats-pill">
              <div class="stats-pill-val">${ordensComissao.length}</div>
              <div class="stats-pill-lbl">Ordens</div>
            </div>
            <div class="stats-pill">
              <div class="stats-pill-val">${formatCurrency(totalComissao)}</div>
              <div class="stats-pill-lbl">Comissão</div>
            </div>
            <div class="stats-pill">
              <div class="stats-pill-val" style="color:${totalDebitos > 0 ? '#fca5a5' : '#6ee7b7'}">${formatCurrency(totalDebitos)}</div>
              <div class="stats-pill-lbl">Débitos</div>
            </div>
          </div>
        </div>`;
    }

    // ── RENDER ORDENS PENDENTES ──
    function renderOrdens() {
      const list = document.getElementById('orderList');
      const func = funcionarios.find(f => f.id === selectedId);
      if (!func) return;

      let filtered = ordensComissao;
      if (activeStatusFilter) filtered = ordensComissao.filter(o => o.status === activeStatusFilter);

      if (!filtered.length) {
        list.innerHTML = emptyHtml('fa-receipt', 'Sem ordens pendentes', activeStatusFilter ? 'Nenhuma ordem com esse status.' : 'Nenhuma comissão a receber no período.');
        return;
      }

      const STATUS_LABEL = {
        FINALIZADO: 'Finalizado', AGUARDANDO_PAGAMENTO: 'Aguardando',
        EM_ANDAMENTO: 'Em andamento', PENDENTE: 'Pendente', CANCELADO: 'Cancelado',
      };
      const pct = parseFloat(func.comissao) || 0;

      list.innerHTML = `<div class="orders-list">${filtered.map(o => {
        const comiss  = getWasherShare(o, selectedId);
        const valor   = parseFloat(o.valorTotal) || 0;
        const status  = o.status || 'PENDENTE';
        const sLabel  = STATUS_LABEL[status] || status;
        const data    = o.createdAt ? new Date(o.createdAt).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', timeZone:'America/Sao_Paulo' }) : '';
        const hora    = o.createdAt ? new Date(o.createdAt).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', timeZone:'America/Sao_Paulo' }) : '';
        const cliente = o.cliente?.nome || '—';
        const modelo  = o.veiculo?.modelo || '';
        const placa   = o.veiculo?.placa  || '';
        const svc     = o.servico?.nome   || o.tipoVeiculo || '';

        return `
          <div class="ord-card">
            <div class="ord-accent acc-${status}"></div>
            <div class="ord-body">
              <div class="ord-top">
                <div>
                  <div class="ord-num">#${o.numeroOrdem || o.id?.slice(0,8)}</div>
                  <div class="ord-date">${data}${hora ? ' · ' + hora : ''}</div>
                </div>
                <span class="s-badge s-${status}">${sLabel}</span>
              </div>
              <div class="ord-client">${cliente}</div>
              <div class="ord-meta">
                ${modelo ? `<span class="tag-model">${modelo}</span>` : ''}
                ${placa  ? `<span class="tag-plate">${placa}</span>`  : ''}
                ${svc    ? `<span class="tag-svc">${svc}</span>`      : ''}
              </div>
              <div class="ord-divider"></div>
              <div class="ord-bottom">
                <div class="ord-valor">Valor OS: <strong>${formatCurrency(valor)}</strong></div>
                <div class="ord-comiss">
                  <span class="comiss-pill">${pct}%</span>
                  <span class="comiss-val">${formatCurrency(comiss)}</span>
                </div>
              </div>
            </div>
          </div>`;
      }).join('')}</div>`;
    }

    // ── RENDER DÉBITOS PENDENTES ──
    function renderDebitos() {
      const list = document.getElementById('debitList');
      const allDebits = [
        ...adiantamentosPend.map(a => ({
          tipo: 'adiantamento',
          label: a.descricao || 'Adiantamento (Vale)',
          sub: a.data ? new Date(a.data).toLocaleDateString('pt-BR') : '—',
          valor: parseFloat(a.valor) || 0,
        })),
        ...debitosOS.map(d => ({
          tipo: 'debitos_os',
          label: `Débito OS #${d.numeroOrdem || d.id?.slice(0,8)}`,
          sub: d.dataFim ? new Date(d.dataFim).toLocaleDateString('pt-BR', { timeZone:'America/Sao_Paulo' }) : '—',
          valor: getWasherShare(d, selectedId),
        })),
      ].filter(d => d.valor > 0);

      if (!allDebits.length) {
        list.innerHTML = '';
        return;
      }

      list.innerHTML = `<div class="orders-list">${allDebits.map(d => `
        <div class="ord-card">
          <div class="ord-accent" style="background:var(--red)"></div>
          <div class="ord-body">
            <div class="ord-top">
              <div>
                <div class="ord-num">${d.tipo === 'adiantamento' ? 'ADIANTAMENTO' : 'DÉBITO OS'}</div>
                <div class="ord-date">${d.sub}</div>
              </div>
              <span class="s-badge" style="background:rgba(239,68,68,.1);color:#b91c1c">Pendente</span>
            </div>
            <div class="ord-client">${d.label}</div>
            <div class="ord-divider"></div>
            <div class="ord-bottom">
              <div class="ord-valor">A descontar</div>
              <div class="ord-comiss">
                <span class="comiss-val" style="color:var(--red)">-${formatCurrency(d.valor)}</span>
              </div>
            </div>
          </div>
        </div>`).join('')}</div>`;
    }

    // ── HELPERS ──
    function formatCurrency(v) {
      return 'R$ ' + Number(v || 0).toFixed(2).replace('.', ',');
    }

    function loadingHtml() {
      return `<div class="loading-wrap"><div class="spin"></div><div class="loading-txt">Carregando...</div></div>`;
    }

    function emptyHtml(ico, title, sub) {
      return `<div class="empty-wrap">
        <div class="empty-ico"><i class="fas ${ico}"></i></div>
        <div class="empty-title">${title}</div>
        <div class="empty-sub">${sub}</div>
      </div>`;
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      const i = document.getElementById('toastIco');
      document.getElementById('toastMsg').textContent = msg;
      t.className = `toast ${type}`;
      i.className = `fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function toggleMenu() {
      document.getElementById('menuDropdown').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeMenu() {
      document.getElementById('menuDropdown').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    }
  </script>
</body>
</html>
