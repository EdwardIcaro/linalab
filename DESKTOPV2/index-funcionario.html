<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lina X - Painel do Funcionário</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #0066cc;
      --primary-dk: #004ea3;
      --amber:      #f59e0b;
      --amber-dk:   #d97706;
      --bg:         #eef2f8;
      --card:       #ffffff;
      --text:       #111827;
      --muted:      #6b7280;
      --border:     #e5e7eb;
      --shadow:     0 1px 4px rgba(0,0,0,0.08);
      --shadow-md:  0 4px 14px rgba(0,0,0,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(160deg, #004ea3 0%, #0066cc 100%);
      padding: 16px 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      color: white;
      font-weight: 900;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .brand-info { min-width: 0; }
    .brand-empresa {
      font-size: 15px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      display: block;
    }
    .brand-tag {
      font-size: 10px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-logout {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      color: white;
      padding: 8px 13px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.18s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.24); }
    .btn-logout:active { transform: scale(0.96); }

    .header-greeting {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .greeting-text {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
    }
    .greeting-name {
      font-size: 14px;
      font-weight: 700;
      color: white;
    }
    .date-chip {
      margin-left: auto;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    /* ===== MAIN ===== */
    .main {
      padding: 16px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 500px;
      margin: 0 auto;
    }

    /* ===== STATS STRIP ===== */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 13px;
      padding: 11px 8px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-size: 19px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 3px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* ===== HERO BUTTON (Fila de Entrada) ===== */
    .hero-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #f59e0b 0%, #e08b00 100%);
      border-radius: 18px;
      padding: 18px 20px;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(245,158,11,0.35);
      transition: transform 0.14s, box-shadow 0.14s;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
    }
    .hero-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(245,158,11,0.2);
    }

    .hero-icon {
      width: 50px; height: 50px;
      background: rgba(255,255,255,0.22);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: white;
      flex-shrink: 0;
    }

    .hero-body { flex: 1; min-width: 0; }
    .hero-label {
      font-size: 17px;
      font-weight: 800;
      color: white;
      margin-bottom: 2px;
    }
    .hero-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      font-weight: 500;
    }

    .hero-arrow {
      color: rgba(255,255,255,0.65);
      font-size: 15px;
      flex-shrink: 0;
    }

    /* ===== SECTION LABEL ===== */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      padding: 0 2px;
      margin-top: 4px;
    }

    /* ===== NAV GRID ===== */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      background: var(--card);
      border-radius: 15px;
      padding: 15px 13px;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.14s, box-shadow 0.14s;
      cursor: pointer;
      border: none;
      width: 100%;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .nav-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background 0.15s;
    }
    .nav-btn:active::after {
      background: rgba(0,0,0,0.04);
    }
    .nav-btn:active {
      transform: scale(0.96);
      box-shadow: none;
    }
    .nav-btn.full-width {
      grid-column: 1 / -1;
    }

    .nav-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
    }

    .nav-body { flex: 1; min-width: 0; }
    .nav-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .nav-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .nav-arrow {
      color: #d1d5db;
      font-size: 11px;
      flex-shrink: 0;
    }

    /* Icon color variants */
    .ic-blue   { background: rgba(0,102,204,0.1);   color: #0066cc; }
    .ic-green  { background: rgba(5,150,105,0.1);   color: #059669; }
    .ic-purple { background: rgba(124,58,237,0.1);  color: #7c3aed; }
    .ic-teal   { background: rgba(13,148,136,0.1);  color: #0d9488; }
    .ic-amber  { background: rgba(217,119,6,0.1);   color: #d97706; }
    .ic-indigo { background: rgba(99,102,241,0.1);  color: #6366f1; }
    .ic-rose   { background: rgba(225,29,72,0.1);   color: #e11d48; }
    .ic-slate  { background: rgba(100,116,139,0.1); color: #475569; }

    /* ===== PROFILE LINK ===== */
    .profile-link {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border-radius: 13px;
      padding: 13px 14px;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.14s;
      border: 1px solid var(--border);
    }
    .profile-link:active { transform: scale(0.97); }

    .profile-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dk));
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .profile-arrow {
      color: #d1d5db;
      font-size: 11px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-box {
      background: var(--card);
      border-radius: 16px;
      padding: 44px 24px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .empty-box i { font-size: 44px; color: #d1d5db; margin-bottom: 14px; display: block; }
    .empty-box h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-box p { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ===== CONFIRM DIALOG ===== */
    .confirm-dialog {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .confirm-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .confirm-box {
      position: relative; background: white; border-radius: 18px; padding: 24px;
      max-width: 340px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .confirm-box h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .confirm-box p { font-size: 14px; color: #6b7280; margin-bottom: 20px; line-height: 1.5; }
    .confirm-buttons { display: flex; gap: 10px; }
    .btn-cancel, .btn-confirm {
      flex: 1; padding: 12px; border-radius: 11px; border: none;
      cursor: pointer; font-weight: 700; font-size: 14px; transition: opacity 0.18s;
    }
    .btn-cancel { background: #f3f4f6; color: #374151; }
    .btn-confirm { background: #dc3545; color: white; }
    .btn-cancel:hover { background: #e5e7eb; }
    .btn-confirm:hover { opacity: 0.88; }

    /* ===== DESKTOP CENTERING ===== */
    @media (min-width: 501px) {
      .header { padding: 18px 20px 22px; }
      .main { padding: 20px 20px 32px; gap: 14px; }
      .nav-btn { padding: 18px 16px; }
      .nav-label { font-size: 15px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-row">
      <div class="brand">
        <div class="brand-logo">LX</div>
        <div class="brand-info">
          <span class="brand-empresa" id="empresaNome">Carregando...</span>
          <span class="brand-tag">Painel do Funcionário</span>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        Sair
      </button>
    </div>
    <div class="header-greeting">
      <span class="greeting-text">Olá,</span>
      <span class="greeting-name" id="usuarioNome">...</span>
      <span class="date-chip" id="datePill"></span>
    </div>
  </header>

  <main class="main">

    <!-- STATS (somente com permissão ver_dashboard) -->
    <div class="stats-strip" id="statsStrip" style="display:none">
      <div class="stat-card">
        <div class="stat-value" id="statOrdens">-</div>
        <div class="stat-label">Ordens</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statClientes">-</div>
        <div class="stat-label">Clientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statFat">-</div>
        <div class="stat-label">Hoje</div>
      </div>
    </div>

    <!-- HERO: Fila de Entrada (visível se gerenciar_ordens) -->
    <a href="funcionario/fila-entrada-funcionario.html" class="hero-btn" id="heroFila" style="display:none">
      <div class="hero-icon">
        <i class="fas fa-bolt"></i>
      </div>
      <div class="hero-body">
        <div class="hero-label">Fila de Entrada</div>
        <div class="hero-sub">Lançamento rápido de veículos</div>
      </div>
      <i class="fas fa-chevron-right hero-arrow"></i>
    </a>

    <!-- SEÇÃO NAVEGAÇÃO -->
    <div class="section-label" id="sectionLabel" style="display:none">Navegação</div>

    <!-- GRID DE BOTÕES -->
    <div class="nav-grid" id="navGrid"></div>

    <!-- EMPTY STATE -->
    <div class="empty-box" id="emptyState" style="display:none">
      <i class="fas fa-lock"></i>
      <h3>Sem permissões</h3>
      <p>Você ainda não tem acesso a nenhuma função.<br>Fale com o administrador da empresa.</p>
    </div>

    <!-- PERFIL (sempre visível) -->
    <a href="perfil.html" class="profile-link" id="profileLink" style="display:none">
      <div class="profile-avatar" id="profileInitial">?</div>
      <div class="profile-info">
        <span class="profile-name" id="profileName">Meu Perfil</span>
        <span class="profile-sub">Ver e editar meus dados</span>
      </div>
      <i class="fas fa-chevron-right profile-arrow"></i>
    </a>

  </main>

  <script src="api.js"></script>
  <script>
    // Definição dos botões por permissão
    const NAV_PAGES = [
      {
        permission: 'gerenciar_ordens',
        label: 'Nova Ordem',
        sub: 'Criar serviço',
        icon: 'fa-plus-circle',
        color: 'ic-blue',
        href: 'funcionario/nova-ordem-funcionario.html'
      },
      {
        permission: 'gerenciar_ordens',
        label: 'Ordens',
        sub: 'Histórico de serviços',
        icon: 'fa-list-alt',
        color: 'ic-green',
        href: 'funcionario/ordens-funcionario.html'
      },
      {
        permission: 'gerenciar_clientes',
        label: 'Clientes',
        sub: 'Base de clientes',
        icon: 'fa-users',
        color: 'ic-purple',
        href: 'funcionario/clientes-funcionario.html'
      },
      {
        permission: 'gerenciar_funcionarios',
        label: 'Equipe',
        sub: 'Lavadores',
        icon: 'fa-hard-hat',
        color: 'ic-teal',
        href: 'funcionario/funcionarios-funcionario.html'
      },
      {
        permission: 'gerenciar_funcionarios',
        label: 'Comissões',
        sub: 'Ganhos da equipe',
        icon: 'fa-hand-holding-usd',
        color: 'ic-rose',
        href: 'funcionario/comissoes-funcionario.html'
      },
      {
        permission: 'ver_financeiro',
        label: 'Financeiro',
        sub: 'Caixa e receitas',
        icon: 'fa-money-bill-wave',
        color: 'ic-amber',
        href: 'funcionario/financeiro-funcionario.html'
      },
      {
        permission: 'config_ver_servicos',
        label: 'Serviços',
        sub: 'Tabela de preços',
        icon: 'fa-wrench',
        color: 'ic-indigo',
        href: 'funcionario/servicos-funcionario.html'
      },
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      // Chip de data
      const now = new Date();
      const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      document.getElementById('datePill').textContent =
        `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

      // Dados do usuário
      await loadUserData();

      const permissoes = JSON.parse(localStorage.getItem('permissoes') || '[]');

      // Hero: Fila de Entrada
      if (permissoes.includes('gerenciar_ordens')) {
        document.getElementById('heroFila').style.display = 'flex';
      }

      // Grid de navegação
      renderNavGrid(permissoes);

      // Stats (só se tiver permissão)
      if (permissoes.includes('ver_dashboard')) {
        loadStats();
      }
    });

    async function loadUserData() {
      const usuarioNome = localStorage.getItem('usuarioNome') || 'Funcionário';
      let empresaNome = localStorage.getItem('empresaNome');

      if (!empresaNome) {
        const empresaId = localStorage.getItem('empresaId');
        if (empresaId) {
          try {
            const data = await window.api.getEmpresaById(empresaId);
            empresaNome = data.nome || data.name || 'Minha Empresa';
            localStorage.setItem('empresaNome', empresaNome);
          } catch { empresaNome = 'Minha Empresa'; }
        } else {
          empresaNome = 'Minha Empresa';
        }
      }

      document.getElementById('empresaNome').textContent = empresaNome;

      // Primeiro nome apenas no header greeting
      const primeiroNome = usuarioNome.split(' ')[0];
      document.getElementById('usuarioNome').textContent = primeiroNome;

      // Perfil
      document.getElementById('profileName').textContent = usuarioNome;
      document.getElementById('profileInitial').textContent = primeiroNome.charAt(0).toUpperCase();
      document.getElementById('profileLink').style.display = 'flex';
    }

    function renderNavGrid(permissoes) {
      const grid = document.getElementById('navGrid');

      // Deduplica permissões já mostradas (ex: gerenciar_ordens aparece 2x mas Nova Ordem e Ordens são distintos)
      const visibles = NAV_PAGES.filter(p => permissoes.includes(p.permission));

      if (visibles.length === 0 && !permissoes.includes('gerenciar_ordens')) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      if (visibles.length > 0) {
        document.getElementById('sectionLabel').style.display = 'block';
      }

      grid.innerHTML = visibles.map((p, i) => {
        const isLastOdd = visibles.length % 2 !== 0 && i === visibles.length - 1;
        return `
          <a href="${p.href}" class="nav-btn${isLastOdd ? ' full-width' : ''}">
            <div class="nav-icon ${p.color}">
              <i class="fas ${p.icon}"></i>
            </div>
            <div class="nav-body">
              <span class="nav-label">${p.label}</span>
              <span class="nav-sub">${p.sub}</span>
            </div>
            <i class="fas fa-chevron-right nav-arrow"></i>
          </a>
        `;
      }).join('');
    }

    async function loadStats() {
      const strip = document.getElementById('statsStrip');
      strip.style.display = 'grid';
      try {
        const [stats, clientes] = await Promise.all([
          window.api.getOrdensStats ? window.api.getOrdensStats() : Promise.resolve({}),
          window.api.getClientes ? window.api.getClientes(1, 1) : Promise.resolve({ total: 0 })
        ]);
        document.getElementById('statOrdens').textContent = stats.total ?? '-';
        document.getElementById('statClientes').textContent = clientes.total ?? '-';
        const fat = stats.faturamentoDia || stats.faturamento || 0;
        document.getElementById('statFat').textContent = fat > 0
          ? 'R$\u00a0' + fat.toLocaleString('pt-BR', { maximumFractionDigits: 0 })
          : 'R$\u00a00';
      } catch { /* silencioso */ }
    }

    function showConfirm(title, message, onConfirm) {
      const dialog = document.createElement('div');
      dialog.className = 'confirm-dialog';
      dialog.innerHTML = `
        <div class="confirm-overlay"></div>
        <div class="confirm-box">
          <h2>${title}</h2>
          <p>${message}</p>
          <div class="confirm-buttons">
            <button class="btn-cancel">Cancelar</button>
            <button class="btn-confirm">Sair</button>
          </div>
        </div>
      `;
      document.body.appendChild(dialog);
      dialog.querySelector('.btn-cancel').addEventListener('click', () => dialog.remove());
      dialog.querySelector('.confirm-overlay').addEventListener('click', () => dialog.remove());
      dialog.querySelector('.btn-confirm').addEventListener('click', () => {
        dialog.remove();
        onConfirm();
      });
    }

    function logout() {
      showConfirm('Sair', 'Tem certeza que deseja sair?', () => {
        localStorage.clear();
        window.location.href = 'login.html';
      });
    }
  </script>
</body>
</html>
